<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Animal Explorer — North America</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090f09;--card:#121e12;--border:#1e341e;--text:#ddeacc;--sub:#6a8a5a;--accent:#f0d07a;--mammal:#2e6e20;--reptile:#7a3a10;--bird:#164880;--fish:#086060;--insect:#706000;--amphibian:#4a1878}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;padding:.9rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500}
.back-btn{padding:.32rem .85rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.logo{font-size:1.2rem;color:var(--accent)}
.disc-badge{padding:.3rem .75rem;border:1px solid rgba(240,208,122,.25);border-radius:20px;font:.78rem Arial,sans-serif;color:var(--accent);cursor:pointer;background:rgba(240,208,122,.06)}
.disc-panel{display:none;padding:.6rem 1.4rem;background:#0a130a;border-bottom:1px solid var(--border)}
.disc-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:.3rem}
.disc-bar{height:100%;background:linear-gradient(90deg,#3a7820,var(--accent));border-radius:3px;transition:width .5s}
.disc-panel p{font:.73rem Arial,sans-serif;color:var(--sub)}.disc-panel p span{color:var(--accent)}
.ticker-wrap{display:flex;align-items:center;gap:.5rem;font:italic .76rem/1.3 Arial,sans-serif;color:var(--sub);width:300px;flex-shrink:0}
.ticker-label{color:var(--accent);font-style:normal;font-weight:bold;white-space:nowrap}
#ticker-track{overflow:hidden;flex:1;min-width:0;position:relative;height:1.3em;cursor:default}
#ticker{position:absolute;white-space:nowrap;will-change:transform;opacity:0}
.controls{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.65rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:150px;max-width:240px}
.search-wrap svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--sub);fill:none;pointer-events:none}
.search-input{width:100%;padding:.36rem .75rem .36rem 1.9rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;color:var(--text);font:.8rem Arial,sans-serif;outline:none}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--sub)}
.pill{padding:.32rem .8rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font:.76rem Arial,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active[data-cat=all]{background:var(--accent);border-color:var(--accent);color:#111;font-weight:bold}
.pill.active[data-cat=mammals]{background:var(--mammal);border-color:var(--mammal);color:#fff;font-weight:bold}
.pill.active[data-cat=reptiles]{background:var(--reptile);border-color:var(--reptile);color:#fff;font-weight:bold}
.pill.active[data-cat=birds]{background:var(--bird);border-color:var(--bird);color:#fff;font-weight:bold}
.pill.active[data-cat=fish]{background:var(--fish);border-color:var(--fish);color:#fff;font-weight:bold}
.pill.active[data-cat=insects]{background:var(--insect);border-color:var(--insect);color:#fff;font-weight:bold}
.pill.active[data-cat=amphibians]{background:var(--amphibian);border-color:var(--amphibian);color:#fff;font-weight:bold}
.surprise-btn{padding:.36rem .95rem;border:none;border-radius:20px;background:linear-gradient(135deg,#3a1880,#7030d0);color:#fff;font:.76rem Arial,sans-serif;cursor:pointer;white-space:nowrap}
.map-section{border-bottom:2px solid var(--border)}
#world-map{height:380px;width:100%}
.map-hint{text-align:center;padding:.3rem;color:var(--sub);font:1rem Arial,sans-serif;background:#0b140b;border-bottom:1px solid var(--border)}
.leaflet-container{background:#060e1e}
.animal-map-marker{width:34px;height:34px;border-radius:50%;background:rgba(9,15,9,.9);border:2px solid rgba(240,208,122,.5);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.6)}
.animal-map-marker:hover{transform:scale(1.25);border-color:var(--accent)}
.animal-map-marker.discovered{border-color:var(--accent);background:rgba(240,208,122,.15)}
.results-section{padding:1.2rem 1.4rem}
.results-header{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.9rem}
.results-header h2{font-size:1.1rem;color:var(--accent)}
#results-count{color:var(--sub);font:.78rem Arial,sans-serif}
#reset-btn{margin-left:auto;padding:.26rem .7rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.74rem Arial,sans-serif;border-radius:20px;cursor:pointer}
#reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.9rem}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--card);animation:slideUp .3s ease backwards;transition:box-shadow .3s,border-color .25s;position:relative}
.card:hover{box-shadow:0 10px 28px rgba(0,0,0,.6);border-color:rgba(240,208,122,.35)}
.card-photo{height:155px;position:relative;overflow:hidden}
.card-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4.5rem;z-index:1;transition:opacity .3s}
.card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;transition:transform .5s,opacity .3s}
.card:hover .card-photo img{transform:scale(1.07)}
.card-overlay{position:absolute;inset:0 0 auto 0;height:155px;background:rgba(5,10,5,.88);backdrop-filter:blur(2px);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:.9rem;text-align:center;z-index:3;opacity:0;transition:opacity .2s}
.card:hover .card-overlay{opacity:1}
.card-overlay p{font:.78rem/1.5 Arial,sans-serif;color:#dde;margin-bottom:.4rem}
.card-overlay small{font:.68rem Arial,sans-serif;color:var(--accent)}
.card-info{padding:.6rem .85rem .7rem;position:relative}
.card-name{font-size:.88rem;margin-bottom:.28rem}
.card-row{display:flex;align-items:center;justify-content:space-between}
.card-check{position:absolute;top:.5rem;right:.7rem;width:17px;height:17px;border-radius:50%;background:var(--accent);color:#111;font:.7rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase;letter-spacing:.3px}
.b-mammals{background:rgba(46,110,32,.28);color:#70d450;border:1px solid rgba(46,110,32,.45)}
.b-reptiles{background:rgba(122,58,16,.28);color:#e08040;border:1px solid rgba(122,58,16,.45)}
.b-birds{background:rgba(22,72,128,.28);color:#58b0f0;border:1px solid rgba(22,72,128,.45)}
.b-fish{background:rgba(8,96,96,.28);color:#30d8d8;border:1px solid rgba(8,96,96,.45)}
.b-insects{background:rgba(112,96,0,.28);color:#e0cc30;border:1px solid rgba(112,96,0,.45)}
.b-amphibians{background:rgba(74,24,120,.28);color:#c070f0;border:1px solid rgba(74,24,120,.45)}
.s-badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase}
.s-LC{background:rgba(32,110,32,.2);color:#60d060;border:1px solid rgba(32,110,32,.4)}
.s-NT{background:rgba(190,170,0,.15);color:#d8c840;border:1px solid rgba(190,170,0,.3)}
.s-VU{background:rgba(190,110,0,.15);color:#e09030;border:1px solid rgba(190,110,0,.3)}
.s-EN{background:rgba(190,55,0,.15);color:#e05828;border:1px solid rgba(190,55,0,.3)}
.s-CR{background:rgba(190,0,0,.15);color:#e02828;border:1px solid rgba(190,0,0,.3)}
.bg-mammals{background:linear-gradient(135deg,#0e220a,#183818)}.bg-reptiles{background:linear-gradient(135deg,#200e04,#381808)}
.bg-birds{background:linear-gradient(135deg,#060e28,#0e1e44)}.bg-fish{background:linear-gradient(135deg,#021414,#063030)}
.bg-insects{background:linear-gradient(135deg,#141000,#282002)}.bg-amphibians{background:linear-gradient(135deg,#0e041c,#1c0838)}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--sub);font:1rem Arial,sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#111c11;border:1px solid #2a422a;border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:scale(.94) translateY(10px);transition:transform .22s}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-close{position:absolute;top:.8rem;right:.8rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font:.92rem Arial,sans-serif;line-height:30px;text-align:center;z-index:2}
.modal-close:hover{background:rgba(255,255,255,.22)}
.modal-hero{height:230px;position:relative;overflow:hidden;border-radius:16px 16px 0 0}
.modal-hero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .3s}
.modal-hero img.loaded{opacity:1}
.modal-hero .fallback-hero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6.5rem;z-index:0}
.modal-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(17,28,17,.9) 0%,transparent 55%);z-index:2}
.modal-hero-title{position:absolute;bottom:.9rem;left:1.3rem;z-index:3}
.modal-hero-title h2{font-size:1.6rem;line-height:1.1;margin-bottom:.25rem}
.modal-hero-title em{color:var(--sub);font:.85rem Arial,sans-serif}
.modal-body{padding:1.1rem 1.4rem 1.6rem}
.modal-badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
.modal-desc{font:.88rem/1.72 Georgia,serif;margin-bottom:1rem;color:#ccd8bb}
.facts-head{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.45rem}
.facts-list{list-style:none;margin-bottom:.9rem}
.facts-list li{display:flex;gap:.5rem;align-items:flex-start;padding:.34rem 0;border-bottom:1px solid var(--border);font:.82rem/1.55 Arial,sans-serif;opacity:0;transform:translateX(-8px);transition:opacity .3s,transform .3s}
.facts-list li.visible{opacity:1;transform:none}.facts-list li:last-child{border-bottom:none}
.facts-list li::before{content:'▸';color:var(--accent);flex-shrink:0;margin-top:1px}
.habitat-section{margin-top:.7rem;padding:.75rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px}
.habitat-title{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.35rem}
.habitat-name{font:.8rem Arial,sans-serif;color:var(--sub);margin-bottom:.55rem}
.habitat-btns{display:flex;gap:.45rem;flex-wrap:wrap}
.habitat-btn{padding:.33rem .82rem;border-radius:20px;border:none;cursor:pointer;font:.74rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;gap:.32rem;transition:transform .15s;text-decoration:none}
.habitat-btn:hover{transform:translateY(-2px)}
.hbtn-sat{background:rgba(19,66,26,.8);color:#90d890}.hbtn-sv{background:rgba(66,19,24,.8);color:#d89090}
.modal-nav{display:flex;justify-content:space-between;margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--border)}
.modal-nav button{padding:.38rem .95rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer}
.modal-nav button:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:560px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.6rem}.card-photo,.card-overlay{height:125px}#world-map{height:240px}}
</style>
<script src="icons.js"></script>
<link rel="stylesheet" href="theme.css"/>
</head>
<body>
<header>
  <a class="back-btn" href="hub.html">← All Continents</a>
  <div class="logo">🌎 North America — Wildlife Explorer</div>
  <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap">
    <div class="ticker-wrap"><span class="ticker-label">Fact:</span><div id="ticker-track"><span id="ticker"></span></div></div>
    <div class="disc-badge" onclick="toggleDisc()"><span id="disc-count">0/60</span> explored</div>
  </div>
</header>
<div class="disc-panel" id="disc-panel">
  <div class="disc-bar-wrap"><div class="disc-bar" id="disc-bar" style="width:0%"></div></div>
  <p>Explored <span id="disc-text">0</span> of <span id="disc-total">60</span> North American animals</p>
</div>
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke-linecap="round"/></svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search animals…" autocomplete="off"/>
  </div>
  <button class="pill active" data-cat="all">All</button>
  <button class="pill" data-cat="mammals">🐻 Mammals</button>
  <button class="pill" data-cat="reptiles">🐊 Reptiles</button>
  <button class="pill" data-cat="birds">🦅 Birds</button>
  <button class="pill" data-cat="fish">🦈 Fish</button>
  <button class="pill" data-cat="insects">🦋 Insects</button>
  <button class="pill" data-cat="amphibians">🐸 Amphibians</button>
  <button class="surprise-btn" onclick="surpriseMe()">🎲 Surprise!</button>
</div>
<div class="map-section"><div id="world-map"></div></div>
<p class="map-hint">🛰 Satellite imagery · Click animal pins to explore</p>
<section class="results-section">
  <div class="results-header">
    <h2 id="results-title">All North American Animals</h2>
    <span id="results-count"></span>
    <button id="reset-btn" style="display:none" onclick="resetCat()">✕ Clear filter</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none">🔭 No animals found.</div>
</section>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ANIMALS=[
{name:'Grizzly Bear',scientific:'Ursus arctos horribilis',emoji:'🐻',category:'mammals',status:'Least Concern',wiki:'Grizzly_bear',lat:44.43,lon:-110.59,habitat:'Yellowstone National Park, Wyoming',
desc:'One of North America\'s most powerful animals is surprisingly gentle in diet — up to 80% plants, berries, and insects — yet capable of running at 55 km/h.',
facts:['Can smell food from over 29 km away — most acute olfaction of any land mammal','Run at 55 km/h over short distances — faster than a racehorse','Shoulder hump is solid muscle used for powerful digging — not fat','Eat up to 20,000 calories per day before winter hibernation','80% of their diet is plants, berries, and insects — not large prey']},

{name:'American Bison',scientific:'Bison bison',emoji:'🦬',category:'mammals',status:'Near Threatened',wiki:'American_bison',lat:43.75,lon:-102.49,habitat:'Badlands, South Dakota',
desc:'Once numbering 60 million and reduced to under 1,000 by 1890 — now the USA\'s national mammal — the American bison is North America\'s defining conservation comeback story.',
facts:['Once roamed in herds of 60 million — the largest animal aggregation in history','Reduced to under 1,000 by 1890 through deliberate slaughter; now 500,000','Can run at 65 km/h despite weighing up to 900 kg','Jump fences over 1.5 m high from a standing start — they are not slow animals','Their wallows create wetlands that increase biodiversity for dozens of other species']},

{name:'Gray Wolf',scientific:'Canis lupus',emoji:'🐺',category:'mammals',status:'Least Concern',wiki:'Gray_wolf',lat:44.80,lon:-110.55,habitat:'Yellowstone National Park, Wyoming',
desc:'The apex predator whose reintroduction to Yellowstone triggered a trophic cascade that changed the behaviour of rivers, shrubs, and songbirds — the power of keystone species revealed.',
facts:['Yellowstone reintroduction in 1995 reshaped entire river systems through a trophic cascade','Pack territories can exceed 1,000 km²','Howls carry 16 km in open terrain — primary long-distance communication','Mate for life; both parents and older siblings help raise pups','Can travel 200 km in a single day when following prey herds']},

{name:'Polar Bear',scientific:'Ursus maritimus',emoji:'🐻‍❄️',category:'mammals',status:'Vulnerable',wiki:'Polar_bear',lat:58.77,lon:-93.82,habitat:'Churchill, Manitoba, Canada',
desc:'The world\'s largest land predator and the only bear that is a true hypercarnivore — living almost entirely on ringed seals and dependent on sea ice for survival in a warming world.',
facts:['Largest land predator on Earth — males average 450 kg; record is 1,002 kg','Fur appears white but each hair is actually transparent and hollow','Black skin beneath fur absorbs solar radiation — a natural solar heating system','Can swim 100 km non-stop in open Arctic water between ice floes','Population predicted to decline 30% by 2050 due to sea ice loss']},

{name:'Moose',scientific:'Alces alces',emoji:'🦌',category:'mammals',status:'Least Concern',wiki:'Moose',lat:60.50,lon:-147.50,habitat:'Kenai Peninsula, Alaska',
desc:'The world\'s largest member of the deer family towers up to 2.3 m at the shoulder, yet is a surprisingly fast swimmer and has been observed diving to eat aquatic plants from lake bottoms.',
facts:['World\'s largest deer — bulls weigh up to 700 kg with antler spans of 1.8 m','Excellent swimmers — cross lakes up to 20 km wide and can dive to 5.5 m depth','Can run at 55 km/h and maintain 30 km/h for many km','Long legs allow them to wade through deep snow that stops other animals','Responsible for more human injuries in North America than any other wild animal']},

{name:'American Black Bear',scientific:'Ursus americanus',emoji:'🐻',category:'mammals',status:'Least Concern',wiki:'American_black_bear',lat:35.70,lon:-83.50,habitat:'Great Smoky Mountains, Tennessee',
desc:'The most abundant bear species in the world — over 800,000 in North America — the black bear is both more omnivorous and less aggressive than the grizzly, thriving alongside expanding human populations.',
facts:['Most abundant bear in the world — over 800,000 across North America','Not always black — colour ranges from jet black to cinnamon and even creamy white','Excellent tree climbers from birth — cubs can climb before they can walk well','Sense of smell is 7× stronger than a bloodhound\'s — can detect food from 20 km','Spend 5–7 months in winter torpor — heart rate drops from 40 to 8 beats per minute']},

{name:'Pronghorn',scientific:'Antilocapra americana',emoji:'🦌',category:'mammals',status:'Least Concern',wiki:'Pronghorn',lat:43.00,lon:-104.00,habitat:'Wyoming Great Basin',
desc:'The second-fastest land animal on Earth — reaching 88 km/h and sustaining 56 km/h for many km — evolved its speed to outrun a cheetah that has been extinct in North America for 10,000 years.',
facts:['Second-fastest land animal: bursts of 88 km/h; sustains 56 km/h for over 6 km','Speed evolved to outrun American cheetahs now extinct for 10,000 years','Eyes are the size of an elephant\'s despite its small head — 320° field of view','Can run 10× longer than a cheetah at high speed due to extraordinary lung capacity','Only horned animal that sheds and regrows its horns annually — unique among bovids']},

{name:'Mountain Lion',scientific:'Puma concolor',emoji:'🦁',category:'mammals',status:'Least Concern',wiki:'Cougar',lat:36.50,lon:-118.50,habitat:'Sierra Nevada, California',
desc:'The most widely distributed wild land mammal in the Western Hemisphere — from Yukon to Patagonia — the mountain lion holds more record names (puma, cougar, catamount, panther) than any other mammal.',
facts:['Most names of any mammal — over 40 common names in English alone','Widest range of any terrestrial mammal in the Western Hemisphere','Can leap 4.5 m vertically and 12 m horizontally','A litter is born camouflaged with spots that fade in the first year','Cannot roar — communicates with chirps, whistles, and a haunting scream']},

{name:'Beluga Whale',scientific:'Delphinapterus leucas',emoji:'🐳',category:'mammals',status:'Least Concern',wiki:'Beluga_whale',lat:63.00,lon:-90.50,habitat:'Hudson Bay, Canada',
desc:'The "canary of the sea" — so named for its rich vocabulary of whistles, clicks, and chirps — the beluga is one of the most vocal cetaceans and can flex its melon to change the shape of its sound beam.',
facts:['Called the "canary of the sea" for its exceptionally varied vocal repertoire','Can flex the melon (forehead) to change the direction and shape of echolocation beams','Lack a dorsal fin — an adaptation for swimming under sea ice without snagging','Can reverse direction while swimming and swim backwards with ease','Annual migrations of thousands follow the same routes used by ancestors for millennia']},

{name:'West Indian Manatee',scientific:'Trichechus manatus',emoji:'🐘',category:'mammals',status:'Vulnerable',wiki:'West_Indian_manatee',lat:27.50,lon:-82.50,habitat:'Crystal River, Florida',
desc:'The gentle giant of Florida\'s waterways — a fully aquatic herbivore that consumes 10% of its body weight in seagrass daily, and must surface every 3–5 minutes to breathe.',
facts:['Must surface to breathe every 3–5 minutes, even while sleeping (sleep at the surface)','Consumes 10–15% of body weight in seagrass and aquatic plants every day','Closest living relatives are elephants and hyraxes — not other marine mammals','Can rotate each tooth across the jaw, replacing worn molars throughout life (polyphyodonty)','Population recovering from near-extinction thanks to protected water zones and speed limits']},

{name:'Narwhal',scientific:'Monodon monoceros',emoji:'🦄',category:'mammals',status:'Least Concern',wiki:'Narwhal',lat:72.00,lon:-80.00,habitat:'Baffin Bay, Nunavut',
desc:'The "unicorn of the sea" — the narwhal\'s extraordinary spiral tusk is actually a modified tooth with 10 million nerve endings exposed on its surface, possibly used as a highly sensitive sensory organ.',

{name:'Nine-banded Armadillo',scientific:'Dasypus novemcinctus',emoji:'🐾',category:'mammals',status:'Least Concern',wiki:'Nine-banded_armadillo',lat:30.00,lon:-97.00,habitat:'Central Texas',

{name:'Black-footed Ferret',scientific:'Mustela nigripes',emoji:'🐾',category:'mammals',status:'Endangered',wiki:'Black-footed_ferret',lat:43.00,lon:-104.00,habitat:'Thunder Basin, Wyoming',

{name:'Snowshoe Hare',scientific:'Lepus americanus',emoji:'🐰',category:'mammals',status:'Least Concern',wiki:'Snowshoe_hare',lat:55.50,lon:-120.00,habitat:'Boreal Forest, British Columbia',

{name:'American Pika',scientific:'Ochotona princeps',emoji:'🐾',category:'mammals',status:'Least Concern',wiki:'American_pika',lat:37.80,lon:-119.50,habitat:'Yosemite High Country, California',

{name:'Sea Otter',scientific:'Enhydra lutris',emoji:'🦦',category:'mammals',status:'Endangered',wiki:'Sea_otter',lat:36.60,lon:-121.90,habitat:'Monterey Bay, California',

{name:'White-tailed Deer',scientific:'Odocoileus virginianus',emoji:'🦌',category:'mammals',status:'Least Concern',wiki:'White-tailed_deer',lat:44.00,lon:-89.00,habitat:'Wisconsin',

{name:'Humpback Whale',scientific:'Megaptera novaeangliae',emoji:'🐋',category:'mammals',status:'Least Concern',wiki:'Humpback_whale',lat:46.00,lon:-124.00,habitat:'Pacific Coast, Oregon/Washington',

{name:'American Crocodile',scientific:'Crocodylus acutus',emoji:'🐊',category:'reptiles',status:'Vulnerable',wiki:'American_crocodile',lat:25.20,lon:-80.80,habitat:'Florida Bay & Caribbean Coast',

{name:'Leatherback Sea Turtle',scientific:'Dermochelys coriacea',emoji:'🐢',category:'reptiles',status:'Vulnerable',wiki:'Leatherback_sea_turtle',lat:10.50,lon:-61.50,habitat:'Trinidad, Caribbean',

{name:'Ruby-throated Hummingbird',scientific:'Archilochus colubris',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Ruby-throated_hummingbird',lat:38.00,lon:-84.00,habitat:'Kentucky bluegrass region',

{name:'Chinook Salmon',scientific:'Oncorhynchus tshawytscha',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Chinook_salmon',lat:47.50,lon:-121.00,habitat:'Cascade Mountains, Washington',

{name:'Lake Sturgeon',scientific:'Acipenser fulvescens',emoji:'🐟',category:'fish',status:'Vulnerable',wiki:'Lake_sturgeon',lat:43.50,lon:-83.50,habitat:'Lake Huron, Michigan',

{name:'Sockeye Salmon',scientific:'Oncorhynchus nerka',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Sockeye_salmon',lat:51.00,lon:-125.00,habitat:'Johnstone Strait, British Columbia',

{name:'Atlantic Horseshoe Crab',scientific:'Limulus polyphemus',emoji:'🦀',category:'fish',status:'Vulnerable',wiki:'Atlantic_horseshoe_crab',lat:39.00,lon:-75.00,habitat:'Delaware Bay, New Jersey',

{name:'Largemouth Bass',scientific:'Micropterus salmoides',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Largemouth_bass',lat:31.00,lon:-87.00,habitat:'Alabama River System',

// INSECTS
{name:'Monarch Butterfly',scientific:'Danaus plexippus',emoji:'🦋',category:'insects',status:'Endangered',wiki:'Monarch_butterfly',lat:19.62,lon:-100.25,habitat:'Monarch Biosphere Reserve, Michoacán',
desc:'Monarchs perform one of Earth\'s great migrations — flying 4,800 km from Canada to Mexican mountains using a sun compass in their antennae — a journey taking 3–4 generations to complete.',
facts:['Migrates 4,800 km from Canada to a 12 km² stand of oyamel fir trees in Michoacán, Mexico','No individual completes the full round trip — it takes 3–4 generations in each direction','Navigates using a time-compensated sun compass located in their antennae','Milkweed toxins make them poisonous to most birds — experienced birds avoid them entirely','Eastern population has declined 84% in two decades; Western population declined 99.9%']},

{name:'Luna Moth',scientific:'Actias luna',emoji:'🦋',category:'insects',status:'Least Concern',wiki:'Luna_moth',lat:38.00,lon:-84.00,habitat:'Eastern Deciduous Forests, Kentucky',

facts:['Adults have no mouth — cannot eat; survive 7–10 days on fat reserves from the larval stage','Long trailing tail streamers confuse bat echolocation, causing bats to miss the critical body','Wingspan up to 11.4 cm — one of the largest moths in North America','Pale green wings fade rapidly in sunlight — adults rarely seen in daylight for this reason','Named for the moon-like eyespots on its hindwings — "Luna" from the Latin for moon']},

{name:'Eastern Firefly',scientific:'Photinus pyralis',emoji:'✨',category:'insects',status:'Least Concern',wiki:'Photinus_pyralis',lat:35.70,lon:-84.00,habitat:'Great Smoky Mountains, Tennessee',
desc:'The common firefly produces cold light using luciferin — a chemical reaction so efficient that 100% of the energy becomes light with no heat wasted, making it the most efficient light production in nature.',
facts:['Light production is 100% efficient — zero heat generated (compare: incandescent bulbs at 10%)','Chemical light is produced by luciferase enzyme oxidising luciferin molecules','Each species has a distinct flashing pattern — females select mates by pattern','Smokies synchronised fireflies (Photinus carolinus) flash in unison — a rare phenomenon drawing thousands of visitors','Larvae glow too — called glowworms; the light warns predators they taste bad']},

{name:'American Bumblebee',scientific:'Bombus pensylvanicus',emoji:'🐝',category:'insects',status:'Vulnerable',wiki:'American_bumblebee',lat:38.00,lon:-95.00,habitat:'Tallgrass Prairie, Kansas',
desc:'Once one of North America\'s most common pollinators, the American bumblebee has declined 90% in just 20 years and disappeared entirely from many states where it was once abundant.',
facts:['Declined 90% in abundance over just 20 years — one of the fastest vertebrate-comparable declines for an insect','Extirpated from over 8 eastern states where it was previously common','Uses "buzz pollination" — vibrating wings at 400 Hz to shake pollen loose from flowers no other bee can access','Can thermoregulate — warm their flight muscles by shivering to fly in near-freezing temperatures','Queens can fly even in rain at speeds up to 54 km/h']},

{name:'Mountain Pine Beetle',scientific:'Dendroctonus ponderosae',emoji:'🪲',category:'insects',status:'Least Concern',wiki:'Mountain_pine_beetle',lat:50.00,lon:-119.00,habitat:'Interior British Columbia',
desc:'A native insect that has become one of the most ecologically devastating forces in North American history — killing over 70,000 km² of pine forest in a single outbreak driven by warming temperatures.',
facts:['Has killed over 70,000 km² of BC pine forest — the largest insect outbreak in North American history','Infestation scale increased 100-fold as warming winters allowed beetles to survive at higher altitudes','Trees signal attack with chemical defences — overwhelming defences by mass attack (3–4 beetles per cm²)','Killed trees turn red then grey — satellite images reveal the colour change across entire mountain ranges','The dead trees become both carbon sources and wildfire fuel — creating a climate-change feedback loop']},

{name:'Cecropia Moth',scientific:'Hyalophora cecropia',emoji:'🦋',category:'insects',status:'Least Concern',wiki:'Cecropia_moth',lat:42.00,lon:-85.00,habitat:'Deciduous Forests, Michigan',

facts:['Largest moth native to North America — wingspan up to 16 cm','Adults have no functional mouth — cannot eat; survive 2 weeks on larval fat reserves','Males can detect a single molecule of female pheromone from over 3 km away','Silken cocoon is so tough that Iroquois people used it as a rattle in ceremonies','Spectacular wings bear eyespots, white crescent moons, and red and tan banding']},

// AMPHIBIANS
{name:'American Bullfrog',scientific:'Lithobates catesbeianus',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'American_bullfrog',lat:29.95,lon:-90.07,habitat:'Mississippi Delta, Louisiana',
desc:'North America\'s largest native frog will eat almost anything it can overpower — a voracious predator now listed as one of the world\'s 100 worst invasive species on every continent where it was introduced.',
facts:['Largest frog in North America — up to 20 cm long; will eat anything fitting in its mouth','Will swallow prey up to half its own body size: fish, snakes, small birds, and other frogs','Listed among the world\'s 100 worst invasive species on 4 continents where it was introduced','Call carries up to 1 km on a still night — the characteristic "jug-o-rum" sound of eastern wetlands','Tadpoles spend 1–2 full years before metamorphosis — much longer than most North American frogs']},

{name:'Eastern Hellbender',scientific:'Cryptobranchus alleganiensis',emoji:'🐸',category:'amphibians',status:'Near Threatened',wiki:'Hellbender',lat:37.00,lon:-80.00,habitat:'Appalachian Mountain Streams, Virginia',

{name:'Axolotl',scientific:'Ambystoma mexicanum',emoji:'🐸',category:'amphibians',status:'Critically Endangered',wiki:'Axolotl',lat:19.45,lon:-99.10,habitat:'Lake Xochimilco, Mexico City',

{name:'California Red-legged Frog',scientific:'Rana draytonii',emoji:'🐸',category:'amphibians',status:'Vulnerable',wiki:'California_red-legged_frog',lat:37.50,lon:-122.00,habitat:'Marin County, California',

}
];

const SC={'Least Concern':'LC','Near Threatened':'NT','Vulnerable':'VU','Endangered':'EN','Critically Endangered':'CR'};
let activeCat='all',searchQ='',currentList=[],currentModal=null;
const disc=new Set(JSON.parse(localStorage.getItem('ae_na_disc')||'[]'));
const wiki={};let map=null,markers=[];
async function getWikiImg(t){if(wiki[t]!==undefined)return wiki[t];try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`);const d=await r.json();const u=d.originalimage?.source||d.thumbnail?.source||null;wiki[t]=u;return u;}catch{wiki[t]=null;return null;}}
function initMap(){map=L.map('world-map',{center:[45,-95],zoom:3,minZoom:2,maxZoom:18});L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:18}).addTo(map);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{attribution:'',maxZoom:18,opacity:0.55}).addTo(map);updateMarkers();map.on('zoomend moveend',updateMarkers);}
function updateMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];if(map.getZoom()<3)return;filtered().forEach(a=>{const el=L.divIcon({html:`<div class="animal-map-marker${disc.has(ANIMALS.indexOf(a))?' discovered':''}" title="${a.name}">${catIcon(a.category)}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,17]});const m=L.marker([a.lat,a.lon],{icon:el}).addTo(map);m.on('click',()=>openModal(ANIMALS.indexOf(a)));markers.push(m);});}
function filtered(){const q=searchQ.toLowerCase().trim();return ANIMALS.filter(a=>{const cm=activeCat==='all'||a.category===activeCat;const sm=!q||a.name.toLowerCase().includes(q)||a.scientific.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q)||a.facts.some(f=>f.toLowerCase().includes(q));return cm&&sm;});}
function renderCards(){const grid=document.getElementById('cards-grid');const empty=document.getElementById('empty-state');const list=filtered();currentList=list;document.getElementById('results-count').textContent=list.length+' animal'+(list.length===1?'':'s');document.getElementById('results-title').textContent=activeCat==='all'?'All North American Animals':'N. American '+cap(activeCat);document.getElementById('reset-btn').style.display=activeCat==='all'?'none':'inline-block';if(!list.length){grid.innerHTML='';empty.style.display='block';return;}empty.style.display='none';grid.innerHTML=list.map((a,i)=>{const idx=ANIMALS.indexOf(a);return `<div class="card" onclick="openModal(${idx})" style="animation-delay:${i*22}ms"><div class="card-photo bg-${a.category}"><span class="card-fallback">${catIcon(a.category)}</span><img data-wiki="${a.wiki}" alt="${a.name}" loading="lazy"/></div><div class="card-overlay"><p>${a.facts[0].substring(0,88)}…</p><small>TAP TO EXPLORE <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></small></div><div class="card-info">${disc.has(idx)?'<span class="card-check"><svg class="svg-ic"><use href="#ic-check"/></svg></span>':''}<div class="card-name">${a.name}</div><div class="card-row"><span class="badge b-${a.category}">${a.category}</span></div></div></div>`;}).join('');grid.querySelectorAll('img[data-wiki]').forEach(img=>{getWikiImg(img.dataset.wiki).then(u=>{if(u){img.src=u;img.onload=()=>{img.classList.add('loaded');img.previousElementSibling.style.opacity=0};}});});}
function openModal(idx){const a=ANIMALS[idx];const sc=SC[a.status]||'LC';const inL=currentList.indexOf(a);const pr=inL>0?ANIMALS.indexOf(currentList[inL-1]):null;const nx=inL<currentList.length-1?ANIMALS.indexOf(currentList[inL+1]):null;const sat=`https://maps.google.com/maps?q=${a.lat},${a.lon}&t=k`;const sv=`https://maps.google.com/maps?q=${a.lat},${a.lon}&layer=c&cbll=${a.lat},${a.lon}`;document.getElementById('modal-content').innerHTML=`<div class="modal-hero bg-${a.category}"><div class="fallback-hero">${catIcon(a.category)}</div><img data-wiki="${a.wiki}" alt="${a.name}"/><div class="modal-hero-grad"></div><div class="modal-hero-title"><h2>${a.name}</h2><em>${a.scientific}</em></div></div><div class="modal-body"><div class="modal-badges"><span class="badge b-${a.category}">${a.category}</span><span class="s-badge s-${sc}">${a.status}</span></div><p class="modal-desc">${a.desc}</p><div class="facts-head">Wild Facts</div><ul class="facts-list" id="facts-list">${a.facts.map(f=>`<li>${f}</li>`).join('')}</ul><div class="habitat-section"><div class="habitat-title">Habitat</div><div class="habitat-name"><svg class="svg-ic"><use href="#ic-pin"/></svg> ${a.habitat}</div><div class="habitat-btns"><a href="${sat}" target="_blank" class="habitat-btn hbtn-sat"><svg class="svg-ic"><use href="#ic-satellite"/></svg> Google Maps Satellite</a><a href="${sv}" target="_blank" class="habitat-btn hbtn-sv"><svg class="svg-ic"><use href="#ic-camera"/></svg> Google Street View</a></div></div><div class="modal-nav"><button onclick="event.stopPropagation();openModal(${pr})" ${pr===null?'disabled style="opacity:.3"':''}><svg class="svg-ic"><use href="#ic-arrow-left"/></svg> Prev</button><button onclick="event.stopPropagation();openModal(${nx})" ${nx===null?'disabled style="opacity:.3"':''}>Next <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></button></div></div>`;document.getElementById('modal-overlay').classList.add('open');document.body.style.overflow='hidden';currentModal=idx;disc.add(idx);localStorage.setItem('ae_na_disc',JSON.stringify([...disc]));updateDiscUI();const img=document.querySelector('#modal-content .modal-hero img');getWikiImg(a.wiki).then(u=>{if(u&&img){img.src=u;img.onload=()=>img.classList.add('loaded');}});setTimeout(()=>{document.querySelectorAll('#facts-list li').forEach((li,i)=>{setTimeout(()=>li.classList.add('visible'),i*70);});},180);}
function updateDiscUI(){const n=disc.size,t=ANIMALS.length;document.getElementById('disc-count').textContent=`${n}/${t}`;document.getElementById('disc-text').textContent=n;document.getElementById('disc-total').textContent=t;document.getElementById('disc-bar').style.width=`${(n/t)*100}%`;}
function toggleDisc(){const p=document.getElementById('disc-panel');p.style.display=p.style.display==='block'?'none':'block';}
function surpriseMe(){const l=filtered();if(!l.length)return;openModal(ANIMALS.indexOf(l[Math.floor(Math.random()*l.length)]));}
function resetCat(){activeCat='all';document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));renderCards();updateMarkers();}
function cap(s){return s[0].toUpperCase()+s.slice(1)}
function initTicker(){const facts=ANIMALS.flatMap(a=>a.facts.map(f=>a.name+' — '+f)).sort(()=>Math.random()-.5);const track=document.getElementById('ticker-track');const el=document.getElementById('ticker');let idx=0,anim=null,paused=false;function playNext(){el.style.transition='opacity 0.4s';el.style.opacity='0';setTimeout(()=>{el.textContent=facts[idx++%facts.length];el.style.transition='none';const cw=track.clientWidth;el.style.transform=`translateX(${cw}px)`;void el.offsetWidth;el.style.transition='opacity 0.4s';el.style.opacity='1';const tw=el.scrollWidth;const dur=(cw+tw)/50*1000;if(anim)anim.cancel();anim=el.animate([{transform:`translateX(${cw}px)`},{transform:`translateX(-${tw}px)`}],{duration:dur,easing:'linear',fill:'forwards'});if(paused)anim.pause();anim.onfinish=()=>setTimeout(playNext,400);},400);}track.addEventListener('mouseenter',()=>{paused=true;if(anim)anim.pause();});track.addEventListener('mouseleave',()=>{paused=false;if(anim)anim.play();});playNext();}
document.addEventListener('DOMContentLoaded',()=>{initMap();renderCards();updateDiscUI();initTicker();});
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',function(){document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));this.classList.add('active');activeCat=this.dataset.cat;renderCards();updateMarkers();}));
document.getElementById('search-input').addEventListener('input',function(){searchQ=this.value;renderCards();updateMarkers();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
document.getElementById('modal-close').addEventListener('click',closeModal);
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';currentModal=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='ArrowRight'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i<currentList.length-1)openModal(ANIMALS.indexOf(currentList[i+1]));}if(e.key==='ArrowLeft'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i>0)openModal(ANIMALS.indexOf(currentList[i-1]));}});
</script>
<script src="paw-cursor.js" defer></script>
</body>
</html>
