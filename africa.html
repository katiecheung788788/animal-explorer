<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Animal Explorer — Africa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090f09;--card:#121e12;--border:#1e341e;--text:#ddeacc;--sub:#6a8a5a;--accent:#f0d07a;
  --mammal:#2e6e20;--reptile:#7a3a10;--bird:#164880;--fish:#086060;--insect:#706000;--amphibian:#4a1878}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;
  padding:.9rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:500}
.back-btn{padding:.32rem .85rem;background:transparent;border:1px solid var(--border);
  color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.logo{font-size:1.2rem;color:var(--accent)}
.disc-badge{padding:.3rem .75rem;border:1px solid rgba(240,208,122,.25);border-radius:20px;
  font:.78rem Arial,sans-serif;color:var(--accent);cursor:pointer;background:rgba(240,208,122,.06);transition:background .2s}
.disc-badge:hover{background:rgba(240,208,122,.12)}
.disc-panel{display:none;padding:.6rem 1.4rem;background:#0a130a;border-bottom:1px solid var(--border)}
.disc-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:.3rem}
.disc-bar{height:100%;background:linear-gradient(90deg,#3a7820,var(--accent));border-radius:3px;transition:width .5s}
.disc-panel p{font:.73rem Arial,sans-serif;color:var(--sub)}
.disc-panel p span{color:var(--accent)}
.ticker-wrap{display:flex;align-items:center;gap:.5rem;font:italic .76rem/1.3 Arial,sans-serif;color:var(--sub);width:300px;flex-shrink:0}
.ticker-label{color:var(--accent);font-style:normal;font-weight:bold;white-space:nowrap}
#ticker-track{overflow:hidden;flex:1;min-width:0;position:relative;height:1.3em;cursor:default}
#ticker{position:absolute;white-space:nowrap;will-change:transform;opacity:0}
.controls{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
  padding:.65rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:150px;max-width:240px}
.search-wrap svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--sub);fill:none;pointer-events:none}
.search-input{width:100%;padding:.36rem .75rem .36rem 1.9rem;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:20px;color:var(--text);font:.8rem Arial,sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--sub)}
.pill{padding:.32rem .8rem;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--sub);font:.76rem Arial,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active[data-cat=all]        {background:var(--accent);border-color:var(--accent);color:#111;font-weight:bold}
.pill.active[data-cat=mammals]    {background:var(--mammal);border-color:var(--mammal);color:#fff;font-weight:bold}
.pill.active[data-cat=reptiles]   {background:var(--reptile);border-color:var(--reptile);color:#fff;font-weight:bold}
.pill.active[data-cat=birds]      {background:var(--bird);border-color:var(--bird);color:#fff;font-weight:bold}
.pill.active[data-cat=fish]       {background:var(--fish);border-color:var(--fish);color:#fff;font-weight:bold}
.pill.active[data-cat=insects]    {background:var(--insect);border-color:var(--insect);color:#fff;font-weight:bold}
.pill.active[data-cat=amphibians] {background:var(--amphibian);border-color:var(--amphibian);color:#fff;font-weight:bold}
.surprise-btn{padding:.36rem .95rem;border:none;border-radius:20px;background:linear-gradient(135deg,#3a1880,#7030d0);
  color:#fff;font:.76rem Arial,sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;white-space:nowrap}
.surprise-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(112,48,208,.45)}
.map-section{border-bottom:2px solid var(--border)}
#world-map{height:380px;width:100%}
.map-hint{text-align:center;padding:.3rem;color:var(--sub);font:1rem Arial,sans-serif;
  background:#0b140b;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.leaflet-container{background:#060e1e}
.animal-map-marker{width:34px;height:34px;border-radius:50%;background:rgba(9,15,9,.9);
  border:2px solid rgba(240,208,122,.5);display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.6)}
.animal-map-marker:hover{transform:scale(1.25);border-color:var(--accent)}
.animal-map-marker.discovered{border-color:var(--accent);background:rgba(240,208,122,.15)}
.results-section{padding:1.2rem 1.4rem}
.results-header{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.9rem}
.results-header h2{font-size:1.1rem;color:var(--accent)}
#results-count{color:var(--sub);font:.78rem Arial,sans-serif}
#reset-btn{margin-left:auto;padding:.26rem .7rem;background:transparent;border:1px solid var(--border);
  color:var(--sub);font:.74rem Arial,sans-serif;border-radius:20px;cursor:pointer;transition:all .15s}
#reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.9rem}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--border);
  background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.4);animation:slideUp .3s ease backwards;
  transition:box-shadow .3s,border-color .25s;position:relative}
.card:hover{box-shadow:0 10px 28px rgba(0,0,0,.6);border-color:rgba(240,208,122,.35)}
.card-photo{height:155px;position:relative;overflow:hidden}
.card-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4.5rem;z-index:1;transition:opacity .3s}
.card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;transition:transform .5s,opacity .3s}
.card:hover .card-photo img{transform:scale(1.07)}
.card-overlay{position:absolute;inset:0 0 auto 0;height:155px;background:rgba(5,10,5,.88);
  backdrop-filter:blur(2px);display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:.9rem;text-align:center;z-index:3;opacity:0;transition:opacity .2s}
.card:hover .card-overlay{opacity:1}
.card-overlay p{font:.78rem/1.5 Arial,sans-serif;color:#dde;margin-bottom:.4rem}
.card-overlay small{font:.68rem Arial,sans-serif;color:var(--accent)}
.card-info{padding:.6rem .85rem .7rem;position:relative}
.card-name{font-size:.88rem;margin-bottom:.28rem}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:.4rem}
.card-region{color:var(--sub);font:.68rem Arial,sans-serif}
.card-check{position:absolute;top:.5rem;right:.7rem;width:17px;height:17px;border-radius:50%;
  background:var(--accent);color:#111;font:.7rem Arial,sans-serif;font-weight:bold;
  display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase;letter-spacing:.3px}
.b-mammals   {background:rgba(46,110,32,.28);color:#70d450;border:1px solid rgba(46,110,32,.45)}
.b-reptiles  {background:rgba(122,58,16,.28);color:#e08040;border:1px solid rgba(122,58,16,.45)}
.b-birds     {background:rgba(22,72,128,.28);color:#58b0f0;border:1px solid rgba(22,72,128,.45)}
.b-fish      {background:rgba(8,96,96,.28);  color:#30d8d8;border:1px solid rgba(8,96,96,.45)}
.b-insects   {background:rgba(112,96,0,.28); color:#e0cc30;border:1px solid rgba(112,96,0,.45)}
.b-amphibians{background:rgba(74,24,120,.28);color:#c070f0;border:1px solid rgba(74,24,120,.45)}
.s-badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase;letter-spacing:.3px}
.s-LC{background:rgba(32,110,32,.2);color:#60d060;border:1px solid rgba(32,110,32,.4)}
.s-NT{background:rgba(190,170,0,.15);color:#d8c840;border:1px solid rgba(190,170,0,.3)}
.s-VU{background:rgba(190,110,0,.15);color:#e09030;border:1px solid rgba(190,110,0,.3)}
.s-EN{background:rgba(190,55,0,.15);color:#e05828;border:1px solid rgba(190,55,0,.3)}
.s-CR{background:rgba(190,0,0,.15);color:#e02828;border:1px solid rgba(190,0,0,.3)}
.bg-mammals   {background:linear-gradient(135deg,#0e220a,#183818)}
.bg-reptiles  {background:linear-gradient(135deg,#200e04,#381808)}
.bg-birds     {background:linear-gradient(135deg,#060e28,#0e1e44)}
.bg-fish      {background:linear-gradient(135deg,#021414,#063030)}
.bg-insects   {background:linear-gradient(135deg,#141000,#282002)}
.bg-amphibians{background:linear-gradient(135deg,#0e041c,#1c0838)}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--sub);font:1rem Arial,sans-serif}
.empty-state .big{font-size:3rem;margin-bottom:.6rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;
  justify-content:center;z-index:1000;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#111c11;border:1px solid #2a422a;border-radius:16px;max-width:600px;width:100%;
  max-height:90vh;overflow-y:auto;position:relative;transform:scale(.94) translateY(10px);transition:transform .22s}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-close{position:absolute;top:.8rem;right:.8rem;background:rgba(255,255,255,.1);border:none;
  color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font:.92rem Arial,sans-serif;
  line-height:30px;text-align:center;transition:background .15s;z-index:2}
.modal-close:hover{background:rgba(255,255,255,.22)}
.modal-hero{height:230px;position:relative;overflow:hidden;border-radius:16px 16px 0 0}
.modal-hero img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .3s}
.modal-hero img.loaded{opacity:1}
.modal-hero .fallback-hero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6.5rem;z-index:0}
.modal-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(17,28,17,.9) 0%,transparent 55%);z-index:2}
.modal-hero-title{position:absolute;bottom:.9rem;left:1.3rem;z-index:3}
.modal-hero-title h2{font-size:1.6rem;line-height:1.1;margin-bottom:.25rem}
.modal-hero-title em{color:var(--sub);font:.85rem Arial,sans-serif}
.modal-body{padding:1.1rem 1.4rem 1.6rem}
.modal-badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
.modal-desc{font:.88rem/1.72 Georgia,serif;margin-bottom:1rem;color:#ccd8bb}
.facts-head{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.45rem}
.facts-list{list-style:none;margin-bottom:.9rem}
.facts-list li{display:flex;gap:.5rem;align-items:flex-start;padding:.34rem 0;
  border-bottom:1px solid var(--border);font:.82rem/1.55 Arial,sans-serif;
  opacity:0;transform:translateX(-8px);transition:opacity .3s,transform .3s}
.facts-list li.visible{opacity:1;transform:none}
.facts-list li:last-child{border-bottom:none}
.facts-list li::before{content:'▸';color:var(--accent);flex-shrink:0;margin-top:1px}
.habitat-section{margin-top:.7rem;padding:.75rem;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:10px}
.habitat-title{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.35rem}
.habitat-name{font:.8rem Arial,sans-serif;color:var(--sub);margin-bottom:.55rem}
.habitat-btns{display:flex;gap:.45rem;flex-wrap:wrap}
.habitat-btn{padding:.33rem .82rem;border-radius:20px;border:none;cursor:pointer;
  font:.74rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;gap:.32rem;transition:transform .15s;text-decoration:none}
.habitat-btn:hover{transform:translateY(-2px)}
.hbtn-sat{background:rgba(19,66,26,.8);color:#90d890}
.hbtn-sv{background:rgba(66,19,24,.8);color:#d89090}
.modal-nav{display:flex;justify-content:space-between;margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--border)}
.modal-nav button{padding:.38rem .95rem;background:transparent;border:1px solid var(--border);
  color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer;transition:all .15s}
.modal-nav button:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:560px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.6rem}
  .card-photo,.card-overlay{height:125px}#world-map{height:240px}}
</style>
<script src="icons.js"></script>
<link rel="stylesheet" href="theme.css"/>
</head>
<body>
<header>
  <a class="back-btn" href="hub.html">← All Continents</a>
  <div class="logo">🌍 Africa — Wildlife Explorer</div>
  <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap">
    <div class="ticker-wrap"><span class="ticker-label">Fact:</span><div id="ticker-track"><span id="ticker"></span></div></div>
    <div class="disc-badge" onclick="toggleDisc()"><span id="disc-count">0/<span id="disc-total">60</span></span> explored</div>
  </div>
</header>
<div class="disc-panel" id="disc-panel">
  <div class="disc-bar-wrap"><div class="disc-bar" id="disc-bar" style="width:0%"></div></div>
  <p>Explored <span id="disc-text">0</span> of <span id="disc-total2">60</span> African animals</p>
</div>
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke-linecap="round"/></svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search animals…" autocomplete="off"/>
  </div>
  <button class="pill active" data-cat="all">All</button>
  <button class="pill" data-cat="mammals">🐘 Mammals</button>
  <button class="pill" data-cat="reptiles">🐊 Reptiles</button>
  <button class="pill" data-cat="birds">🦅 Birds</button>
  <button class="pill" data-cat="fish">🐟 Fish</button>
  <button class="pill" data-cat="insects">🪲 Insects</button>
  <button class="pill" data-cat="amphibians">🐸 Amphibians</button>
  <button class="surprise-btn" onclick="surpriseMe()">🎲 Surprise!</button>
</div>
<div class="map-section">
  <div id="world-map"></div>
</div>
<p class="map-hint">🛰 Satellite imagery · Click animal pins to explore</p>
<section class="results-section">
  <div class="results-header">
    <h2 id="results-title">All African Animals</h2>
    <span id="results-count"></span>
    <button id="reset-btn" style="display:none" onclick="resetCat()">✕ Clear filter</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none"><div class="big">🔭</div>No animals found.</div>
</section>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ANIMALS=[
{name:'African Bush Elephant',scientific:'Loxodonta africana',emoji:'🐘',category:'mammals',status:'Vulnerable',wiki:'African_bush_elephant',lat:-2.64,lon:37.26,habitat:'Amboseli National Park, Kenya',
 desc:'The largest land animal on Earth, living in matriarch-led herds with deep family bonds, extraordinary memory, and complex emotional lives shared across generations.',
 facts:['Largest land animal — bulls reach 6 tonnes and 3.3 m at the shoulder','Trunks contain over 40,000 muscles and can lift 350 kg or pick up a single blade of grass','Communicate via infrasound too low for human ears — heard by other elephants kilometres away','Grieve their dead, revisiting the bones of family members years later','Drink up to 200 litres of water and consume 300 kg of vegetation per day']},

{name:'African Forest Elephant',scientific:'Loxodonta cyclotis',emoji:'🐘',category:'mammals',status:'Critically Endangered',wiki:'African_forest_elephant',lat:0.50,lon:18.00,habitat:'Congo Basin, DRC',
 desc:'Smaller and darker than the bush elephant, the forest elephant is a separate species and a critical "forest gardener" — dispersing the seeds of over 100 tree species through the Congo Basin.',
 facts:['Recognised as a distinct species from the bush elephant only in 2001','Smaller and rounder ears, and straighter, downward-pointing tusks adapted for forest terrain','Seeds in their dung germinate 3× more successfully than seeds from other dispersers','Population has declined by over 86% in just 31 years','Their paths through the forest create "elephant highways" used by other wildlife']},

{name:'Lion',scientific:'Panthera leo',emoji:'🦁',category:'mammals',status:'Vulnerable',wiki:'Lion',lat:-1.50,lon:35.10,habitat:'Masai Mara, Kenya',
 desc:'The only cats that live in cooperative social groups called prides, lions rule the African savannah with females doing most of the hunting and males defending territory.',
 facts:['Only cats that naturally live in social groups — prides of up to 40 individuals','A roar can be heard 8 km away in still air','Females perform 85–90% of all hunting for the pride','Sleep up to 20 hours a day to conserve energy in the heat','African lion populations have declined 43% in 21 years — now fewer than 25,000 remain']},

{name:'Cheetah',scientific:'Acinonyx jubatus',emoji:'🐆',category:'mammals',status:'Vulnerable',wiki:'Cheetah',lat:-2.33,lon:34.83,habitat:'Serengeti, Tanzania',
 desc:'The fastest land animal reaches 112 km/h in 3 seconds, sacrificing the retractable claws and brute strength of other big cats entirely for speed.',
 facts:['Fastest land animal — bursts of 112 km/h sustained over about 400 metres','Non-retractable claws grip the ground like running spikes for traction','Cannot roar — chirps, purrs, and yelps instead; a distinctive meowing call carries far','Only big cat active primarily in daylight, avoiding competition with nocturnal hunters','Loses up to 50% of kills to stronger scavengers such as lions and hyenas']},

{name:'Leopard',scientific:'Panthera pardus',emoji:'🐆',category:'mammals',status:'Vulnerable',wiki:'Leopard',lat:-24.0,lon:31.5,habitat:'Kruger National Park, South Africa',
 desc:'The most adaptable of all the big cats, the leopard is also the strongest relative to body size — famous for hauling prey heavier than itself into trees to keep it from competitors.',
 facts:['Strongest climber among big cats — hauls prey up to 3× its own weight into tree branches','Most widespread big cat — range spans sub-Saharan Africa to the Russian Far East','A leopard\'s rosette pattern is unique — no two individuals are identical','Melanistic (black) leopards are simply normal leopards with excess melanin pigment','Thrives in urban areas — leopards have been filmed hunting rats in Mumbai at night']},

{name:'Giraffe',scientific:'Giraffa camelopardalis',emoji:'🦒',category:'mammals',status:'Vulnerable',wiki:'Giraffe',lat:-2.71,lon:37.35,habitat:'Amboseli National Park, Kenya',
 desc:'The world\'s tallest animal uses its extraordinary neck to dominate treetop browsing, but also swings it as a devastating weapon in "necking" battles between males.',
 facts:['Tallest land animal on Earth — up to 5.7 m tall','Heart weighs 11 kg and beats 170 times per minute to pump blood to the brain','A single kick from a hind leg can decapitate a lion','Sleeps only 20–30 minutes a day in brief standing naps','No two giraffes share the same coat pattern — as unique as a human fingerprint']},

{name:'Common Hippopotamus',scientific:'Hippopotamus amphibius',emoji:'🦛',category:'mammals',status:'Vulnerable',wiki:'Hippopotamus',lat:4.00,lon:32.50,habitat:'Victoria Nile, Uganda',
 desc:'Despite their plant-eating diet, hippos are Africa\'s most dangerous large land animal — fiercely territorial and capable of running faster than most humans.',
 facts:['Responsible for more human fatalities than lions, leopards, or any other large African mammal','Can run at 30 km/h on land despite weighing up to 3,000 kg','Skin secretes a natural sunscreen and antibiotic known colloquially as "blood sweat"','Spend up to 16 hours daily submerged to thermoregulate and protect their skin','Closest living relatives are cetaceans — whales and dolphins, not pigs']},

{name:'White Rhinoceros',scientific:'Ceratotherium simum',emoji:'🦏',category:'mammals',status:'Near Threatened',wiki:'White_rhinoceros',lat:-28.0,lon:32.0,habitat:'Hluhluwe-iMfolozi Park, KwaZulu-Natal',
 desc:'The world\'s largest land animal after elephants, the white rhino was rescued from near-extinction in the early 1900s in one of conservation\'s earliest success stories.',
 facts:['Second-largest land animal after the elephant — males can exceed 2,300 kg','Name derives from Afrikaans "wijd" (wide) referring to its square lip, not its colour','Reduced to fewer than 50 in 1895; now over 17,000 thanks to intense conservation','Horns are made of compressed keratin — the same material as human fingernails','Live in small groups called "crashes"; males are highly territorial']},

{name:'Black Rhinoceros',scientific:'Diceros bicornis',emoji:'🦏',category:'mammals',status:'Critically Endangered',wiki:'Black_rhinoceros',lat:-3.5,lon:36.0,habitat:'Ngorongoro Crater, Tanzania',
 desc:'The most endangered of the five rhino species, the black rhino has a hooked upper lip for grasping leaves and branches — distinct from the wide, grazing lip of the white rhino.',
 facts:['Critically Endangered — declined 96% between 1970 and 1992 due to poaching','Hooked prehensile upper lip allows it to browse leaves and twigs, unlike white rhinos','Solitary and highly aggressive — will charge with little provocation','One horn can grow to 130 cm in length; record is 150 cm','Despite their reputation, more shy than white rhinos; poor eyesight but excellent hearing']},

{name:'Mountain Gorilla',scientific:'Gorilla beringei beringei',emoji:'🦍',category:'mammals',status:'Endangered',wiki:'Mountain_gorilla',lat:-1.48,lon:29.52,habitat:'Virunga Mountains, Rwanda',

{name:'Nile Perch',scientific:'Lates niloticus',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Nile_perch',lat:-1.0,lon:33.0,habitat:'Lake Victoria, East Africa',

{name:'Bull Shark',scientific:'Carcharhinus leucas',emoji:'🦈',category:'fish',status:'Vulnerable',wiki:'Bull_shark',lat:-18.0,lon:35.5,habitat:'Zambezi River Mouth, Mozambique',

{name:'Goliath Beetle',scientific:'Goliathus goliatus',emoji:'🪲',category:'insects',status:'Least Concern',wiki:'Goliath_beetle',lat:1.00,lon:15.00,habitat:'Congo Rainforest, DRC',

{name:'African Driver Ant',scientific:'Dorylus wilverthi',emoji:'🐜',category:'insects',status:'Least Concern',wiki:'Driver_ant',lat:-4.0,lon:21.5,habitat:'Congo Forest, DRC',

{name:'African Honeybee',scientific:'Apis mellifera scutellata',emoji:'🐝',category:'insects',status:'Least Concern',wiki:'Africanized_bee',lat:-12.0,lon:28.0,habitat:'Zambia',

{name:'Dung Beetle',scientific:'Scarabaeus sacer',emoji:'🪲',category:'insects',status:'Least Concern',wiki:'Dung_beetle',lat:-3.5,lon:30.0,habitat:'Tanzanian Savanna',

}
];

const SC={'Least Concern':'LC','Near Threatened':'NT','Vulnerable':'VU','Endangered':'EN','Critically Endangered':'CR'};
let activeCat='all', searchQ='', currentList=[], currentModal=null;
const disc=new Set(JSON.parse(localStorage.getItem('ae_africa_disc')||'[]'));
const wiki={};
let map=null, markers=[];

async function getWikiImg(title){
  if(wiki[title]!==undefined)return wiki[title];
  try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    const d=await r.json();const u=d.originalimage?.source||d.thumbnail?.source||null;
    wiki[title]=u;return u;}catch{wiki[title]=null;return null;}
}

function initMap(){
  map=L.map('world-map',{center:[0,20],zoom:3,minZoom:2,maxZoom:18});
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {attribution:'Tiles © Esri',maxZoom:18}).addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
    {attribution:'',maxZoom:18,opacity:0.55}).addTo(map);
  updateMarkers();
  map.on('zoomend moveend',updateMarkers);
}

function updateMarkers(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  if(map.getZoom()<3)return;
  filtered().forEach((a,i)=>{
    const el=L.divIcon({html:`<div class="animal-map-marker${disc.has(ANIMALS.indexOf(a))?' discovered':''}" title="${a.name}">${catIcon(a.category)}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,17]});
    const m=L.marker([a.lat,a.lon],{icon:el}).addTo(map);
    m.on('click',()=>openModal(ANIMALS.indexOf(a)));
    markers.push(m);
  });
}

function filtered(){
  const q=searchQ.toLowerCase().trim();
  return ANIMALS.filter(a=>{
    const cm=activeCat==='all'||a.category===activeCat;
    const sm=!q||a.name.toLowerCase().includes(q)||a.scientific.toLowerCase().includes(q)||
              a.desc.toLowerCase().includes(q)||a.facts.some(f=>f.toLowerCase().includes(q));
    return cm&&sm;
  });
}

function renderCards(){
  const grid=document.getElementById('cards-grid');
  const empty=document.getElementById('empty-state');
  const list=filtered();currentList=list;
  document.getElementById('results-count').textContent=list.length+' animal'+(list.length===1?'':'s');
  document.getElementById('results-title').textContent=activeCat==='all'?'All African Animals':'African '+cap(activeCat);
  document.getElementById('reset-btn').style.display=activeCat==='all'?'none':'inline-block';
  if(!list.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=list.map((a,i)=>{
    const idx=ANIMALS.indexOf(a);
    return `<div class="card" onclick="openModal(${idx})" style="animation-delay:${i*25}ms">
      <div class="card-photo bg-${a.category}">
        <span class="card-fallback">${catIcon(a.category)}</span>
        <img data-wiki="${a.wiki}" alt="${a.name}" loading="lazy"/>
      </div>
      <div class="card-overlay"><p>${a.facts[0].substring(0,90)}…</p><small>TAP TO EXPLORE <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></small></div>
      <div class="card-info">
        ${disc.has(idx)?'<span class="card-check"><svg class="svg-ic"><use href="#ic-check"/></svg></span>':''}
        <div class="card-name">${a.name}</div>
        <div class="card-row"><span class="badge b-${a.category}">${a.category}</span><span class="card-region">${catIcon(a.category)}</span></div>
      </div></div>`;
  }).join('');
  grid.querySelectorAll('img[data-wiki]').forEach(img=>{
    getWikiImg(img.dataset.wiki).then(u=>{if(u){img.src=u;img.onload=()=>{img.classList.add('loaded');img.previousElementSibling.style.opacity=0};}});
  });
  grid.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-.5)*12;const y=((e.clientY-r.top)/r.height-.5)*-12;
      c.style.transform=`perspective(700px) rotateX(${y}deg) rotateY(${x}deg) translateY(-4px)`;c.style.transition='none';});
    c.addEventListener('mouseleave',()=>{c.style.transform='';c.style.transition='transform .4s ease';});
  });
}

function openModal(idx){
  const a=ANIMALS[idx];const sc=SC[a.status]||'LC';
  const inL=currentList.indexOf(a);
  const pr=inL>0?ANIMALS.indexOf(currentList[inL-1]):null;
  const nx=inL<currentList.length-1?ANIMALS.indexOf(currentList[inL+1]):null;
  const sat=`https://maps.google.com/maps?q=${a.lat},${a.lon}&t=k`;
  const sv=`https://maps.google.com/maps?q=${a.lat},${a.lon}&layer=c&cbll=${a.lat},${a.lon}`;
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-hero bg-${a.category}">
      <div class="fallback-hero">${catIcon(a.category)}</div>
      <img data-wiki="${a.wiki}" alt="${a.name}"/>
      <div class="modal-hero-grad"></div>
      <div class="modal-hero-title"><h2>${a.name}</h2><em>${a.scientific}</em></div>
    </div>
    <div class="modal-body">
      <div class="modal-badges">
        <span class="badge b-${a.category}">${a.category}</span>
        <span class="s-badge s-${sc}">${a.status}</span>
      </div>
      <p class="modal-desc">${a.desc}</p>
      <div class="facts-head">Wild Facts</div>
      <ul class="facts-list" id="facts-list">${a.facts.map(f=>`<li>${f}</li>`).join('')}</ul>
      <div class="habitat-section">
        <div class="habitat-title">Habitat</div>
        <div class="habitat-name"><svg class="svg-ic"><use href="#ic-pin"/></svg> ${a.habitat}</div>
        <div class="habitat-btns">
          <a href="${sat}" target="_blank" class="habitat-btn hbtn-sat"><svg class="svg-ic"><use href="#ic-satellite"/></svg> Google Maps Satellite</a>
          <a href="${sv}" target="_blank" class="habitat-btn hbtn-sv"><svg class="svg-ic"><use href="#ic-camera"/></svg> Google Street View</a>
        </div>
      </div>
      <div class="modal-nav">
        <button onclick="event.stopPropagation();openModal(${pr})" ${pr===null?'disabled style="opacity:.3"':''}><svg class="svg-ic"><use href="#ic-arrow-left"/></svg> Prev</button>
        <button onclick="event.stopPropagation();openModal(${nx})" ${nx===null?'disabled style="opacity:.3"':''}>Next <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></button>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  currentModal=idx;
  disc.add(idx);
  localStorage.setItem('ae_africa_disc',JSON.stringify([...disc]));
  updateDiscUI();
  const img=document.querySelector('#modal-content .modal-hero img');
  getWikiImg(a.wiki).then(u=>{if(u&&img){img.src=u;img.onload=()=>{img.classList.add('loaded');}}});
  setTimeout(()=>{document.querySelectorAll('#facts-list li').forEach((li,i)=>{setTimeout(()=>li.classList.add('visible'),i*70);});},180);
}

function updateDiscUI(){
  const n=disc.size,t=ANIMALS.length;
  document.getElementById('disc-count').innerHTML=`${n}/<span id="disc-total">${t}</span>`;
  document.getElementById('disc-text').textContent=n;
  document.getElementById('disc-total2').textContent=t;
  document.getElementById('disc-bar').style.width=`${(n/t)*100}%`;
}
function toggleDisc(){const p=document.getElementById('disc-panel');p.style.display=p.style.display==='block'?'none':'block';}
function surpriseMe(){const l=filtered();if(!l.length)return;openModal(ANIMALS.indexOf(l[Math.floor(Math.random()*l.length)]));}
function resetCat(){activeCat='all';document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));renderCards();updateMarkers();}
function cap(s){return s[0].toUpperCase()+s.slice(1)}

function initTicker(){const facts=ANIMALS.flatMap(a=>a.facts.map(f=>a.name+' — '+f)).sort(()=>Math.random()-.5);const track=document.getElementById('ticker-track');const el=document.getElementById('ticker');let idx=0,anim=null,paused=false;function playNext(){el.style.transition='opacity 0.4s';el.style.opacity='0';setTimeout(()=>{el.textContent=facts[idx++%facts.length];el.style.transition='none';const cw=track.clientWidth;el.style.transform=`translateX(${cw}px)`;void el.offsetWidth;el.style.transition='opacity 0.4s';el.style.opacity='1';const tw=el.scrollWidth;const dur=(cw+tw)/50*1000;if(anim)anim.cancel();anim=el.animate([{transform:`translateX(${cw}px)`},{transform:`translateX(-${tw}px)`}],{duration:dur,easing:'linear',fill:'forwards'});if(paused)anim.pause();anim.onfinish=()=>setTimeout(playNext,400);},400);}track.addEventListener('mouseenter',()=>{paused=true;if(anim)anim.pause();});track.addEventListener('mouseleave',()=>{paused=false;if(anim)anim.play();});playNext();}

document.addEventListener('DOMContentLoaded',()=>{
  initMap();renderCards();updateDiscUI();initTicker();
});
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',function(){
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');activeCat=this.dataset.cat;renderCards();updateMarkers();
}));
document.getElementById('search-input').addEventListener('input',function(){searchQ=this.value;renderCards();updateMarkers();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
document.getElementById('modal-close').addEventListener('click',closeModal);
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';currentModal=null;}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='ArrowRight'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i<currentList.length-1)openModal(ANIMALS.indexOf(currentList[i+1]));}
  if(e.key==='ArrowLeft'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i>0)openModal(ANIMALS.indexOf(currentList[i-1]));}
});
</script>
<script src="paw-cursor.js" defer></script>
</body>
</html>
