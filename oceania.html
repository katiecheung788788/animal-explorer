<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Animal Explorer — Oceania</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090f09;--card:#121e12;--border:#1e341e;--text:#ddeacc;--sub:#6a8a5a;--accent:#f0d07a;--mammal:#2e6e20;--reptile:#7a3a10;--bird:#164880;--fish:#086060;--insect:#706000;--amphibian:#4a1878}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;padding:.9rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500}
.back-btn{padding:.32rem .85rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.logo{font-size:1.2rem;color:var(--accent)}
.disc-badge{padding:.3rem .75rem;border:1px solid rgba(240,208,122,.25);border-radius:20px;font:.78rem Arial,sans-serif;color:var(--accent);cursor:pointer;background:rgba(240,208,122,.06)}
.disc-panel{display:none;padding:.6rem 1.4rem;background:#0a130a;border-bottom:1px solid var(--border)}
.disc-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:.3rem}
.disc-bar{height:100%;background:linear-gradient(90deg,#3a7820,var(--accent));border-radius:3px;transition:width .5s}
.disc-panel p{font:.73rem Arial,sans-serif;color:var(--sub)}.disc-panel p span{color:var(--accent)}
.ticker-wrap{display:flex;align-items:center;gap:.5rem;font:italic .76rem/1.3 Arial,sans-serif;color:var(--sub);width:300px;flex-shrink:0}
.ticker-label{color:var(--accent);font-style:normal;font-weight:bold;white-space:nowrap}
#ticker-track{overflow:hidden;flex:1;min-width:0;position:relative;height:1.3em;cursor:default}
#ticker{position:absolute;white-space:nowrap;will-change:transform;opacity:0}
.controls{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.65rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:150px;max-width:240px}
.search-wrap svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--sub);fill:none;pointer-events:none}
.search-input{width:100%;padding:.36rem .75rem .36rem 1.9rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;color:var(--text);font:.8rem Arial,sans-serif;outline:none}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--sub)}
.pill{padding:.32rem .8rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font:.76rem Arial,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active[data-cat=all]{background:var(--accent);border-color:var(--accent);color:#111;font-weight:bold}
.pill.active[data-cat=mammals]{background:var(--mammal);border-color:var(--mammal);color:#fff;font-weight:bold}
.pill.active[data-cat=reptiles]{background:var(--reptile);border-color:var(--reptile);color:#fff;font-weight:bold}
.pill.active[data-cat=birds]{background:var(--bird);border-color:var(--bird);color:#fff;font-weight:bold}
.pill.active[data-cat=fish]{background:var(--fish);border-color:var(--fish);color:#fff;font-weight:bold}
.pill.active[data-cat=insects]{background:var(--insect);border-color:var(--insect);color:#fff;font-weight:bold}
.pill.active[data-cat=amphibians]{background:var(--amphibian);border-color:var(--amphibian);color:#fff;font-weight:bold}
.surprise-btn{padding:.36rem .95rem;border:none;border-radius:20px;background:linear-gradient(135deg,#3a1880,#7030d0);color:#fff;font:.76rem Arial,sans-serif;cursor:pointer;white-space:nowrap}
.map-section{border-bottom:2px solid var(--border)}
#world-map{height:380px;width:100%}
.map-hint{text-align:center;padding:.3rem;color:var(--sub);font:1rem Arial,sans-serif;background:#0b140b;border-bottom:1px solid var(--border)}
.leaflet-container{background:#060e1e}
.animal-map-marker{width:34px;height:34px;border-radius:50%;background:rgba(9,15,9,.9);border:2px solid rgba(240,208,122,.5);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.6)}
.animal-map-marker:hover{transform:scale(1.25);border-color:var(--accent)}
.animal-map-marker.discovered{border-color:var(--accent);background:rgba(240,208,122,.15)}
.results-section{padding:1.2rem 1.4rem}
.results-header{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.9rem}
.results-header h2{font-size:1.1rem;color:var(--accent)}
#results-count{color:var(--sub);font:.78rem Arial,sans-serif}
#reset-btn{margin-left:auto;padding:.26rem .7rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.74rem Arial,sans-serif;border-radius:20px;cursor:pointer}
#reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.9rem}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--card);animation:slideUp .3s ease backwards;transition:box-shadow .3s,border-color .25s;position:relative}
.card:hover{box-shadow:0 10px 28px rgba(0,0,0,.6);border-color:rgba(240,208,122,.35)}
.card-photo{height:155px;position:relative;overflow:hidden}
.card-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4.5rem;z-index:1;transition:opacity .3s}
.card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;transition:transform .5s,opacity .3s}
.card:hover .card-photo img{transform:scale(1.07)}
.card-overlay{position:absolute;inset:0 0 auto 0;height:155px;background:rgba(5,10,5,.88);backdrop-filter:blur(2px);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:.9rem;text-align:center;z-index:3;opacity:0;transition:opacity .2s}
.card:hover .card-overlay{opacity:1}
.card-overlay p{font:.78rem/1.5 Arial,sans-serif;color:#dde;margin-bottom:.4rem}
.card-overlay small{font:.68rem Arial,sans-serif;color:var(--accent)}
.card-info{padding:.6rem .85rem .7rem;position:relative}
.card-name{font-size:.88rem;margin-bottom:.28rem}
.card-row{display:flex;align-items:center;justify-content:space-between}
.card-check{position:absolute;top:.5rem;right:.7rem;width:17px;height:17px;border-radius:50%;background:var(--accent);color:#111;font:.7rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase;letter-spacing:.3px}
.b-mammals{background:rgba(46,110,32,.28);color:#70d450;border:1px solid rgba(46,110,32,.45)}
.b-reptiles{background:rgba(122,58,16,.28);color:#e08040;border:1px solid rgba(122,58,16,.45)}
.b-birds{background:rgba(22,72,128,.28);color:#58b0f0;border:1px solid rgba(22,72,128,.45)}
.b-fish{background:rgba(8,96,96,.28);color:#30d8d8;border:1px solid rgba(8,96,96,.45)}
.b-insects{background:rgba(112,96,0,.28);color:#e0cc30;border:1px solid rgba(112,96,0,.45)}
.b-amphibians{background:rgba(74,24,120,.28);color:#c070f0;border:1px solid rgba(74,24,120,.45)}
.s-badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase}
.s-LC{background:rgba(32,110,32,.2);color:#60d060;border:1px solid rgba(32,110,32,.4)}
.s-NT{background:rgba(190,170,0,.15);color:#d8c840;border:1px solid rgba(190,170,0,.3)}
.s-VU{background:rgba(190,110,0,.15);color:#e09030;border:1px solid rgba(190,110,0,.3)}
.s-EN{background:rgba(190,55,0,.15);color:#e05828;border:1px solid rgba(190,55,0,.3)}
.s-CR{background:rgba(190,0,0,.15);color:#e02828;border:1px solid rgba(190,0,0,.3)}
.bg-mammals{background:linear-gradient(135deg,#0e220a,#183818)}.bg-reptiles{background:linear-gradient(135deg,#200e04,#381808)}
.bg-birds{background:linear-gradient(135deg,#060e28,#0e1e44)}.bg-fish{background:linear-gradient(135deg,#021414,#063030)}
.bg-insects{background:linear-gradient(135deg,#141000,#282002)}.bg-amphibians{background:linear-gradient(135deg,#0e041c,#1c0838)}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--sub);font:1rem Arial,sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#111c11;border:1px solid #2a422a;border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:scale(.94) translateY(10px);transition:transform .22s}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-close{position:absolute;top:.8rem;right:.8rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font:.92rem Arial,sans-serif;line-height:30px;text-align:center;z-index:2}
.modal-close:hover{background:rgba(255,255,255,.22)}
.modal-hero{height:230px;position:relative;overflow:hidden;border-radius:16px 16px 0 0}
.modal-hero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .3s}
.modal-hero img.loaded{opacity:1}
.modal-hero .fallback-hero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6.5rem;z-index:0}
.modal-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(17,28,17,.9) 0%,transparent 55%);z-index:2}
.modal-hero-title{position:absolute;bottom:.9rem;left:1.3rem;z-index:3}
.modal-hero-title h2{font-size:1.6rem;line-height:1.1;margin-bottom:.25rem}
.modal-hero-title em{color:var(--sub);font:.85rem Arial,sans-serif}
.modal-body{padding:1.1rem 1.4rem 1.6rem}
.modal-badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
.modal-desc{font:.88rem/1.72 Georgia,serif;margin-bottom:1rem;color:#ccd8bb}
.facts-head{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.45rem}
.facts-list{list-style:none;margin-bottom:.9rem}
.facts-list li{display:flex;gap:.5rem;align-items:flex-start;padding:.34rem 0;border-bottom:1px solid var(--border);font:.82rem/1.55 Arial,sans-serif;opacity:0;transform:translateX(-8px);transition:opacity .3s,transform .3s}
.facts-list li.visible{opacity:1;transform:none}.facts-list li:last-child{border-bottom:none}
.facts-list li::before{content:'▸';color:var(--accent);flex-shrink:0;margin-top:1px}
.habitat-section{margin-top:.7rem;padding:.75rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px}
.habitat-title{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.35rem}
.habitat-name{font:.8rem Arial,sans-serif;color:var(--sub);margin-bottom:.55rem}
.habitat-btns{display:flex;gap:.45rem;flex-wrap:wrap}
.habitat-btn{padding:.33rem .82rem;border-radius:20px;border:none;cursor:pointer;font:.74rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;gap:.32rem;transition:transform .15s;text-decoration:none}
.habitat-btn:hover{transform:translateY(-2px)}
.hbtn-sat{background:rgba(19,66,26,.8);color:#90d890}.hbtn-sv{background:rgba(66,19,24,.8);color:#d89090}
.modal-nav{display:flex;justify-content:space-between;margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--border)}
.modal-nav button{padding:.38rem .95rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer}
.modal-nav button:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:560px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.6rem}.card-photo,.card-overlay{height:125px}#world-map{height:240px}}
</style>
<script src="icons.js"></script>
<link rel="stylesheet" href="theme.css"/>
</head>
<body>
<header>
  <a class="back-btn" href="hub.html">← All Continents</a>
  <div class="logo">🌏 Oceania — Wildlife Explorer</div>
  <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap">
    <div class="ticker-wrap"><span class="ticker-label">Fact:</span><div id="ticker-track"><span id="ticker"></span></div></div>
    <div class="disc-badge" onclick="toggleDisc()"><span id="disc-count">0/60</span> explored</div>
  </div>
</header>
<div class="disc-panel" id="disc-panel">
  <div class="disc-bar-wrap"><div class="disc-bar" id="disc-bar" style="width:0%"></div></div>
  <p>Explored <span id="disc-text">0</span> of <span id="disc-total">60</span> Oceanian animals</p>
</div>
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke-linecap="round"/></svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search animals…" autocomplete="off"/>
  </div>
  <button class="pill active" data-cat="all">All</button>
  <button class="pill" data-cat="mammals">🦘 Mammals</button>
  <button class="pill" data-cat="reptiles">🐊 Reptiles</button>
  <button class="pill" data-cat="birds">🦜 Birds</button>
  <button class="pill" data-cat="fish">🦈 Fish</button>
  <button class="pill" data-cat="insects">🦋 Insects</button>
  <button class="pill" data-cat="amphibians">🐸 Amphibians</button>
  <button class="surprise-btn" onclick="surpriseMe()">🎲 Surprise!</button>
</div>
<div class="map-section"><div id="world-map"></div></div>
<p class="map-hint">🛰 Satellite imagery · Click animal pins to explore</p>
<section class="results-section">
  <div class="results-header">
    <h2 id="results-title">All Oceanian Animals</h2>
    <span id="results-count"></span>
    <button id="reset-btn" style="display:none" onclick="resetCat()">✕ Clear filter</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none">🔭 No animals found.</div>
</section>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ANIMALS=[
// MAMMALS
{name:'Red Kangaroo',scientific:'Macropus rufus',emoji:'🦘',category:'mammals',status:'Least Concern',wiki:'Red_kangaroo',lat:-25.00,lon:134.00,habitat:'Central Australia, NT',
desc:'The largest marsupial on Earth — and the largest native land animal in Australia — the red kangaroo can outrun a horse over distance, uses its tail as a fifth limb, and the female maintains a biological diapause that keeps a second embryo on standby.',
facts:['Largest marsupial — males over 90 kg; can outrun a horse over long distances (70 km/h bursts)','Female\'s reproductive system carries 3 "classes" of young simultaneously — joey outside, joey in pouch, embryo in diapause','Embryo "diapause" — development paused at blastocyst stage; resumes if the pouch joey dies','Unique hopping gait stores energy in tendons — energetically cheaper to travel fast than slow','Can survive without drinking water — metabolic water from dry vegetation meets all requirements in cool conditions']},

{name:'Common Wombat',scientific:'Vombatus ursinus',emoji:'🐾',category:'mammals',status:'Least Concern',wiki:'Common_wombat',lat:-36.00,lon:148.00,habitat:'Kosciuszko National Park, NSW',
desc:'The only marsupial to produce cubic faeces — a unique adaptation allowing wombats to stack scent marks on rocks and logs without them rolling away — and the animal with the hardest rump in the mammal world.',
facts:['Only animal on Earth that produces cubic faeces — square cross-section achieved in the final intestinal section','Rump is solid cartilage — used to block burrow entrances; a predator\'s skull is crushed against the burrow ceiling','Burrows extend up to 30 m long with multiple chambers — a refuge for dozens of other animals','Extremely slow digestion — takes 14 days to process food through their specialised gut','Speed is deceptive — they sprint at 40 km/h over short distances despite their stocky build']},

{name:'Koala',scientific:'Phascolarctos cinereus',emoji:'🐨',category:'mammals',status:'Vulnerable',wiki:'Koala',lat:-27.00,lon:153.00,habitat:'Southeast Queensland',
desc:'Australia\'s most iconic marsupial — the koala\'s brain is small enough to not fill its skull (cushioned by fluid), a consequence of specialising entirely on the most toxin-laden food source accepted by any mammal: eucalyptus leaves.',
facts:['Only mammal (besides primates and koalas) to have fingerprints — koala prints are indistinguishable from human prints in crime labs','Brain has fluid cushioning because low-nutrient diet cannot support larger brain tissue','Sleeps 18–22 hours per day to conserve energy from its low-calorie eucalyptus diet','Feeds on as few as 50 of over 700 eucalyptus species — selection linked to toxin chemistry; some individuals detoxify different species','Mothers feed joeys "pap" — a specialised form of soft faeces — to transfer gut bacteria needed to digest eucalyptus toxins']},

{name:'Platypus',scientific:'Ornithorhynchus anatinus',emoji:'🦆',category:'mammals',status:'Near Threatened',wiki:'Platypus',lat:-37.00,lon:149.00,habitat:'Snowy River, NSW/VIC Border',
desc:'The animal that so baffled European scientists that the first specimen sent to London was suspected to be a taxidermist\'s hoax — the platypus is one of only five mammal species that lays eggs and one of very few venomous mammals.',
facts:['When the first specimen reached London in 1799, scientists believed it was a taxidermist\'s fraud','One of only five monotremes (egg-laying mammals) on Earth','Males have hollow spurs on hind ankles delivering venom causing extreme pain unresponsive to morphine','Bill contains 40,000 electroreceptors detecting the electrical fields of shrimp, worms, and crayfish under mud','Has no stomach — oesophagus connects directly to the intestine; a trait otherwise seen only in fish']},

{name:'Short-beaked Echidna',scientific:'Tachyglossus aculeatus',emoji:'🦔',category:'mammals',status:'Least Concern',wiki:'Short-beaked_echidna',lat:-33.00,lon:151.00,habitat:'NSW National Parks',
desc:'The most widespread native mammal in Australia — the echidna is one of just five egg-laying mammals and has the largest prefrontal cortex relative to brain size of any mammal, suggesting extraordinary problem-solving capacity.',
facts:['Second-largest prefrontal cortex relative to brain size of any mammal — outperforms many primates in maze tests','Lays a leathery egg directly into its pouch — the developing puggle hatches after just 10 days','Spines are modified hairs of hollow keratin — can erect to 50 mm and withstand 200 kg of compression','No teeth at all — crushes ants and termites between keratinised pads on the tongue and the palate','Core body temperature (32°C) is the lowest of any active mammal; can drop to 5°C during torpor']},

{name:'Tasmanian Devil',scientific:'Sarcophilus harrisii',emoji:'😈',category:'mammals',status:'Endangered',wiki:'Tasmanian_devil',lat:-43.00,lon:147.00,habitat:'Freycinet Peninsula, Tasmania',
desc:'The world\'s largest carnivorous marsupial — screaming its alarming call into the Tasmanian night — the Tasmanian devil\'s bite force is extraordinary for its size, and it faces extinction from a contagious cancer unique in the animal world.',
facts:['Largest carnivorous marsupial on Earth','Faces extinction from Devil Facial Tumour Disease (DFTD) — one of only 3 known contagious cancers in the world','Bite force of 553 Newtons — the highest relative to body size of any extant mammal','Can consume 40% of body weight in a single feeding — consuming every part of a carcass including bone','Screaming calls (harrs, coughs, growls) evolved for establishing dominance at communal carcass feedings — not aggression']},

{name:'Quokka',scientific:'Setonix brachyurus',emoji:'🦘',category:'mammals',status:'Vulnerable',wiki:'Quokka',lat:-32.00,lon:115.60,habitat:'Rottnest Island, Western Australia',
desc:'Named by 17th-century Dutch sailors who thought they had found "a wild cat" — the quokka\'s perpetual facial expression launched the selfie phenomenon that now threatens the species through tourist disturbance and disease transmission.',
facts:['Named "quokka" by Dutch sailors in 1696 who noted it (incorrectly) as a large rat','Facial muscles cause a permanent expression resembling a smile — origin of the "happiest animal" internet meme','Females can "throw" a joey from the pouch when threatened by a predator — sacrificing young to escape','Can survive without water by metabolising fat — survives dry Rottnest summers without drinking','Found on only a handful of WA offshore islands; tourism is now a significant threat to island populations']},

{name:'Dingo',scientific:'Canis lupus dingo',emoji:'🐕',category:'mammals',status:'Vulnerable',wiki:'Dingo',lat:-26.00,lon:131.00,habitat:'Uluru-Kata Tjuta, NT',
desc:'Australia\'s apex predator — a wild dog descended from domesticated Asian dogs brought to Australia 3,500 years ago — the dingo plays a keystone role in suppressing feral cat and fox populations that devastate native wildlife.',
facts:['Arrived in Australia ~3,500 years ago — likely brought by seafarers from Southeast Asia; not a native species yet now ecologically essential','Apex predator whose presence suppresses feral cats and foxes — net benefit to native fauna','Cannot bark — only howl, whine, and growl; the bark was lost after separation from domesticated dogs','Skull morphology is distinct from both domestic dogs and wolves — a genuinely unique canid','The Dingo Fence (5,614 km) is the longest fence in the world — built to keep dingoes out of SE Australia']},

{name:'Dugong',scientific:'Dugong dugon',emoji:'🐘',category:'mammals',status:'Vulnerable',wiki:'Dugong',lat:-16.00,lon:146.00,habitat:'Great Barrier Reef lagoon, Queensland',
desc:'The only strictly herbivorous marine mammal in the world — the dugong grazes exclusively on seagrass and can consume 40 kg per day — and its closest living relative is the elephant, sharing an 8-million-year divergence from a common terrestrial ancestor.',
facts:['Only strictly herbivorous marine mammal in the world — eats only seagrass','Closest living relative is the elephant — shared a terrestrial ancestor 8 million years ago','Grazes seagrass by uprooting entire plants with its muscular snout — leaves furrow trails on the seafloor','Must surface to breathe every 3–6 minutes; can stay down for 11 minutes when resting','Basis for mermaid mythology — sailors hallucinating from dehydration described dugongs as mermaids from a distance']},

{name:'Southern Right Whale',scientific:'Eubalaena australis',emoji:'🐋',category:'mammals',status:'Least Concern',wiki:'Southern_right_whale',lat:-35.00,lon:136.00,habitat:'Great Australian Bight',
desc:'Named by whalers as "the right whale to hunt" — slow, floats when dead, provides much oil — the Southern right whale was hunted almost to extinction; Australia\'s Head of the Bight offers the world\'s best land-based whale viewing.',
facts:['Named the "right whale" to kill — slow enough to catch, floats when dead, huge oil yield; was hunted catastrophically','Callosities on the head are unique to each individual — used to identify whales over decades','Testes weigh up to 525 kg — the largest in the animal kingdom; high sperm competition from multiple mates','Males do not fight for females — instead compete through sperm; females mate with multiple males','Population recovering; Head of Bight cliff-top viewing area is the world\'s best land-based whale-watching']},

{name:'Lumholtz\'s Tree-kangaroo',scientific:'Dendrolagus lumholtzi',emoji:'🦘',category:'mammals',status:'Near Threatened',wiki:'Lumholtz\'s_tree-kangaroo',lat:-17.00,lon:145.00,habitat:'Queensland Wet Tropics, Atherton Tablelands',
desc:'A kangaroo that lives in trees — with rotating wrists, gripping paws, and a long tail for balance that no ground-dwelling kangaroo possesses — the tree-kangaroo is the product of 10 million years of reverse evolution from a terrestrial ancestor.',
facts:['Evolved from terrestrial kangaroos — reversed evolution re-developing wrist rotation, gripping forelimbs, and climbing ability','Can jump down from 18 m without injury — cushioned by thick leg pads and using the tail as a rudder','Limbs are equally long (ground kangaroos have much longer hind legs) — an adaptation for climbing','Mothers\' pouches open at the rear — so joeys are held securely during vertical climbing','One of only two tree-kangaroo species in Australia; the rest of the 14 species live in New Guinea']},

{name:'Eastern Quoll',scientific:'Dasyurus viverrinus',emoji:'🐾',category:'mammals',status:'Endangered',wiki:'Eastern_quoll',lat:-43.50,lon:147.00,habitat:'Bruny Island, Tasmania',
desc:'Extinct on mainland Australia since the 1960s — surviving only in Tasmania and on several predator-free islands — the eastern quoll is a fierce nocturnal predator that once ranged from Queensland to South Australia.',
facts:['Extinct on mainland Australia since the 1960s — eliminated by introduced foxes and feral cats','Surviving in Tasmania and several predator-free island sanctuaries; mainland reintroductions began in 2018','Raises 6 young simultaneously — more offspring than any other Dasyuridae (quoll family)','Spots disappear on the tail — unique distinguishing feature from the spotted-tailed quoll','Predators in captivity have been trained using aversion conditioning to avoid baited cane toad bodies — a conservation innovation']},

{name:'Sugar Glider',scientific:'Petaurus breviceps',emoji:'🐾',category:'mammals',status:'Least Concern',wiki:'Sugar_glider',lat:-33.00,lon:151.00,habitat:'Blue Mountains, NSW',
desc:'A marsupial that glides up to 50 m between trees using a membrane stretched between wrist and ankle — the sugar glider detects eucalyptus flowers by smell from over 100 m and communicates with over 11 distinct vocalisations.',
facts:['Glides up to 50 m — the gliding membrane (patagium) stretches from wrist to ankle','Can adjust direction mid-glide by changing the tension of each side of the patagium independently','11 distinct vocalisations identified — one of the most vocal marsupials','Scent-marks food sources and colony members using glands on head, chest, and cloaca','Lives in colonies of up to 10 adults — all sharing one tree hollow; groups are territorial']},

{name:'Numbat',scientific:'Myrmecobius fasciatus',emoji:'🦡',category:'mammals',status:'Endangered',wiki:'Numbat',lat:-33.00,lon:117.00,habitat:'Dryandra Woodland, Western Australia',
desc:'Australia\'s faunal emblem of Western Australia — the only day-active marsupial and the only marsupial that feeds exclusively on termites — the numbat uses a tongue 11 cm long to extract 20,000 termites per day from their galleries.',
facts:['Only fully diurnal (day-active) marsupial','Only marsupial that eats exclusively termites — an estimated 20,000 per day','Tongue is 11 cm long — longer than its body head and extends rapidly to probe termite galleries','Fewer than 1,000 adults survive in the wild — one of Australia\'s most endangered mammals','WA state faunal emblem — conservation-bred individuals have been reintroduced to predator-free reserves across WA and SA']},

{name:'Leadbeater\'s Possum',scientific:'Gymnobelideus leadbeateri',emoji:'🐾',category:'mammals',status:'Critically Endangered',wiki:'Leadbeater\'s_possum',lat:-37.50,lon:145.70,habitat:'Victorian Alps, Central Highlands',
desc:'Victoria\'s faunal emblem was thought extinct for 50 years before a rediscovery in 1961 — it exists only in old-growth Mountain Ash forest where hollow trees 150+ years old provide nest sites, and logging and fire have fragmented its habitat catastrophically.',
facts:['Thought extinct for 50 years — rediscovered in 1961 in the Victorian Alps','Requires Mountain Ash trees over 150 years old with natural hollows — only 1% of remaining forest qualifies','Victorian state faunal emblem','Population has fallen from 7,500 to under 1,000 in just 30 years due to logging and the 2009 Black Saturday fires','A keystone forest species — dozens of other animals depend on the same large hollow trees']},

{name:'Sperm Whale',scientific:'Physeter macrocephalus',emoji:'🐳',category:'mammals',status:'Vulnerable',wiki:'Sperm_whale',lat:-40.00,lon:175.00,habitat:'Kaikōura, New Zealand',
desc:'The largest toothed animal on Earth — with the biggest brain of any creature that has ever lived — the sperm whale can dive to 3,000 m, navigate in total darkness using clicks so loud they can stun squid, and communicate across entire ocean basins.',
facts:['Largest toothed animal on Earth — and the largest brain of any animal that has ever lived','Dives to 3,000 m depth for up to 2 hours — the deepest dive recorded for any warm-blooded animal','Clicks (codas) are so loud (236 dB) they may stun squid — and carry across entire ocean basins','Spermaceti organ in the head — focused clicking for echolocation and possibly communication across oceans','Ambergris — a waxy intestinal secretion — is used in perfumes; a lump can be worth $700,000']},

{name:'Bottlenose Dolphin',scientific:'Tursiops aduncus',emoji:'🐬',category:'mammals',status:'Least Concern',wiki:'Indo-Pacific_bottlenose_dolphin',lat:-25.00,lon:113.00,habitat:'Shark Bay, Western Australia',
desc:'The Monkey Mia dolphins of Shark Bay — wild Indo-Pacific bottlenose dolphins that have voluntarily interacted with humans since the 1960s — are among the world\'s most famous wild animals and have contributed enormously to dolphin science.',
facts:['Shark Bay females are the only non-primate population known to use tools routinely — carry conical sponges on their beaks to dig in seabed','Monkey Mia: wild dolphins began voluntarily approaching humans in the 1960s — interactions that launched cetacean behavioural science','Maintain social relationships with up to 100 individual dolphins — recognised by unique ID calls','Can enter unihemispheric slow-wave sleep — one brain hemisphere sleeps while the other remains alert','Echolocation calls are unique to each individual — functionally equivalent to a name']},

// REPTILES
{name:'Saltwater Crocodile',scientific:'Crocodylus porosus',emoji:'🐊',category:'reptiles',status:'Least Concern',wiki:'Saltwater_crocodile',lat:-12.50,lon:130.00,habitat:'Adelaide River, Northern Territory',
desc:'The largest reptile on Earth — males regularly exceeding 5 m and 500 kg, with records approaching 7 m — and the apex predator of the Northern Australian coastline, capable of killing buffalo, sharks, and humans with the most powerful bite ever recorded.',
facts:['Largest living reptile — males regularly 5–6 m; the world record is 6.17 m and 1,075 kg','Bite force of 16,460 Newtons — the strongest bite ever recorded for any living animal','Ambush predators — can remain motionless at the surface for hours with only nostrils above water','Regularly travel 900 km at sea between river systems — the "saltwater croc" is genuinely oceanic','Mothers guard nests and carry hatchlings to water in their mouths — exceptional maternal behaviour for a reptile']},

{name:'Inland Taipan',scientific:'Oxyuranus microlepidotus',emoji:'🐍',category:'reptiles',status:'Least Concern',wiki:'Inland_taipan',lat:-28.00,lon:141.00,habitat:'Channel Country, SW Queensland',
desc:'The world\'s most venomous snake — a single bite contains enough venom to kill 289 adult humans or 250,000 mice — yet has never caused a recorded human fatality in the wild due to its remote habitat and extremely docile nature.',
facts:['Most venomous snake in the world — enough venom per bite to kill 289 humans or 250,000 mice','Never caused a confirmed human fatality in the wild — extremely shy and retreats when encountered','Found only in the remote black soil plains of the Channel Country — one of Earth\'s most remote habitats','Venom composition changes seasonally — more toxic in winter when its prey (the Long-haired Rat) requires it','Also called the "fierce snake" — a misnomer; it is actually one of the most docile snakes when encountered']},

{name:'Frilled-neck Lizard',scientific:'Chlamydosaurus kingii',emoji:'🦎',category:'reptiles',status:'Least Concern',wiki:'Frilled-neck_lizard',lat:-15.00,lon:131.00,habitat:'Pine Creek, Northern Territory',
desc:'Australia\'s most theatrical reptile — the frilled lizard erects its vivid orange, red, and yellow neck frill as large as a dinner plate when threatened — then turns and runs bipedally on its hind legs to the nearest tree.',
facts:['Frill is cartilage-supported skin up to 30 cm across — erected hydraulically using hyoid bones','Runs bipedally (on two hind legs) when escaping — achieving 25 km/h in this upright position','Appeared on Australia\'s 2-cent coin from 1966 to 1991 — one of Australia\'s most recognised animals','Spends 90% of its life in trees — comes to ground mainly to feed and during the wet season mating season','Male frills are larger and more vivid than females — frill size directly influences mate choice']},

{name:'Thorny Devil',scientific:'Moloch horridus',emoji:'🦎',category:'reptiles',status:'Least Concern',wiki:'Thorny_devil',lat:-25.00,lon:126.00,habitat:'Great Victoria Desert, WA',
desc:'An ant-eating lizard that drinks through its skin — the thorny devil\'s entire body surface is covered in hygroscopic scales that wick water toward the mouth by capillary action — allowing it to rehydrate by simply standing on damp sand.',
facts:['Drinks through its skin — hygroscopic scale microstructure wicks water from damp sand to the mouth by capillary action','Eats only ants — specifically small black species; laps them up one at a time — up to 1,000 per day','Named "Moloch" — the false head (a bulge on the neck raised at predators) misdirects attacks away from the real head','Changes colour from yellow-brown to dark grey in seconds depending on temperature and threat level','Can live for 20 years — extremely long-lived for a lizard of its size']},

{name:'Green Sea Turtle',scientific:'Chelonia mydas',emoji:'🐢',category:'reptiles',status:'Endangered',wiki:'Green_sea_turtle',lat:-23.50,lon:152.00,habitat:'Great Barrier Reef, Queensland',
desc:'The only sea turtle that becomes vegetarian after juvenilehood — switching from jellyfish to seagrass and algae — and returning to the exact beach where it hatched to nest, navigating thousands of kilometres using Earth\'s magnetic field.',
facts:['Unique among sea turtles in eating only plants as adults — seagrass and algae; juveniles eat jellyfish and invertebrates','Return to their exact birth beach to nest — using Earth\'s magnetic field signature of the beach as a GPS waypoint','Can hold breath for up to 7 hours while sleeping on the seafloor','Green colour is from their algae diet — visible in fat deposits, not the shell or skin itself','Raine Island in QLD: the world\'s largest green turtle nesting site — up to 15,000 females in a single season']},

{name:'Lace Monitor',scientific:'Varanus varius',emoji:'🦎',category:'reptiles',status:'Least Concern',wiki:'Lace_monitor',lat:-33.00,lon:152.00,habitat:'Ku-ring-gai Chase NP, NSW',
desc:'Australia\'s second-largest lizard — a true apex mesopredator that climbs trees to raid nests, excavates crocodile nests for eggs, and can sprint at 40 km/h — the lace monitor is intelligent enough to open camp coolers.',
facts:['Australia\'s second-largest lizard — up to 2 m long and 14 kg','Climbs trees with ease — forked tongue, excellent spatial memory, and powerful claws — raids birds\' nests routinely','Excavates termite mounds to lay eggs — the termite mound maintains precisely 30°C, ideal for egg incubation','Forked tongue delivers odour molecules to Jacobson\'s organ — effectively "smells in stereo", detecting gradient directions','Intelligent enough to remove lids from camping coolers — documented in national parks repeatedly']},

{name:'Hawksbill Sea Turtle',scientific:'Eretmochelys imbricata',emoji:'🐢',category:'reptiles',status:'Critically Endangered',wiki:'Hawksbill_sea_turtle',lat:-16.00,lon:145.00,habitat:'Coral Sea, Great Barrier Reef',
desc:'The specialist of the coral reef — the hawksbill sea turtle\'s narrow pointed beak extracts sponges from crevices inaccessible to other animals, making it the primary controller of sponge growth on Indo-Pacific coral reefs.',
facts:['Primary consumer of sponges on coral reefs — without hawksbills, sponges outcompete coral and collapse reefs','Hawksbill turtle can eat sponges that are toxic to all other animals — complex detoxification mechanism','Shell pattern ("tortoiseshell") drove them to near-extinction — historically the most traded sea turtle','Brain size relative to body is the largest of any sea turtle — most complex behavioural repertoire','Critically Endangered: total nesting population estimated at only 8,000 females globally']},

// BIRDS
{name:'Emu',scientific:'Dromaius novaehollandiae',emoji:'🦤',category:'birds',status:'Least Concern',wiki:'Emu',lat:-25.00,lon:121.00,habitat:'Murchison, Western Australia',
desc:'The world\'s second-largest bird and Australia\'s national emblem — the emu\'s legs are powerful enough to kick through a wooden fence, it can run at 50 km/h, and the male alone incubates the eggs for 56 days without eating.',
facts:['Second-largest bird in the world — up to 1.9 m tall and 60 kg','Males incubate eggs for 56 days without eating, drinking, or defecating — losing a third of their body weight','Can run at 50 km/h over long distances — faster than most horses','Australia fought and lost the "Great Emu War" of 1932 — military operation against emus failed after 10 days','Cannot fly but have vestigial wings — used to cool the body like a fan in hot weather']},

{name:'Southern Cassowary',scientific:'Casuarius casuarius',emoji:'🦤',category:'birds',status:'Vulnerable',wiki:'Southern_cassowary',lat:-17.00,lon:145.80,habitat:'Daintree Rainforest, Queensland',
desc:'The world\'s most dangerous bird — with a 12-cm dagger claw capable of disembowelling a human in a single kick — the cassowary is also the most important seed disperser in Australian rainforests, swallowing fruits up to 10 cm across.',
facts:['Certified as the world\'s most dangerous bird by the Guinness World Records','Dagger claw (inner toe) reaches 12 cm — has killed humans with a single kick (evisceration)','Swallows entire fruit up to 10 cm across — seeds pass intact through gut and are deposited far from parent trees','Primary disperser of 238 rainforest plant species — many trees cannot regenerate without cassowary dispersal','The bony casque on the head is not for defence — may be a resonator for deep booming calls']},

{name:'Laughing Kookaburra',scientific:'Dacelo novaeguineae',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Laughing_kookaburra',lat:-33.00,lon:151.00,habitat:'Sydney, NSW',
desc:'The world\'s largest kingfisher — despite never fishing — the kookaburra\'s laughing call at dawn and dusk is the sonic signature of the Australian bush and is used in virtually every jungle film ever made, regardless of location.',
facts:['World\'s largest kingfisher — eats primarily insects, lizards, snakes, and rodents; rarely fish','Laughing call is the most used stock sound effect in jungle film scenes — heard in Tarzan, Indiana Jones, and countless others','Monogamous and territorial — the laugh is a group territorial proclamation; families call in chorus','Can kill a venomous snake by bashing it repeatedly against a branch to break its spine','Family groups cooperate in raising young — older siblings from previous years act as "helpers" for new chicks']},

{name:'Sulphur-crested Cockatoo',scientific:'Cacatua galerita',emoji:'🦜',category:'birds',status:'Least Concern',wiki:'Sulphur-crested_cockatoo',lat:-33.00,lon:151.00,habitat:'Sydney Suburban Areas, NSW',
desc:'The most intelligent bird in Australia — sulphur-crested cockatoos have been documented opening garbage bins using tools (a stick wedged under the lid), and this technique spread through social learning across Sydney neighbourhoods.',
facts:['Documented using a stick to open garbage bin lids — then the technique spread through social learning in different Sydney suburbs','Can live for 80 years in captivity — among the longest-lived birds','Large flocks fly vast distances daily — navigating by landmark memory stored for decades','Capable of solving 5-step sequential puzzle tasks that take human children years to master','Chew through wood as an act of play and social bonding — causes millions of dollars of property damage annually in Australian cities']},

{name:'Superb Lyrebird',scientific:'Menura novaehollandiae',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Superb_lyrebird',lat:-38.00,lon:145.00,habitat:'Dandenong Ranges, Victoria',
desc:'The world\'s most accomplished vocal mimic — capable of reproducing chainsaws, camera shutters, car alarms, and other lyrebird songs — and its elaborate tail displays require 7 years to grow before the male can successfully attract a mate.',
facts:['Most accomplished mimic in the bird world — reproduces chainsaws, camera shutters, human voices, and entire birdsong sequences','Male builds a mound display platform and performs for females — tail develops over 7 years before becoming display-ready','Tail feathers take 3 months to grow following their annual moult','The lyrebird call has been recorded spreading novel sounds (logging machinery) through populations — cultural transmission of sound','Featured on the Australian 10-cent coin since 1966']},

{name:'Wedge-tailed Eagle',scientific:'Aquila audax',emoji:'🦅',category:'birds',status:'Least Concern',wiki:'Wedge-tailed_eagle',lat:-25.00,lon:128.00,habitat:'Gibson Desert, WA',
desc:'Australia\'s largest bird of prey — with a wingspan of 2.3 m — the wedge-tailed eagle rides thermals to 2,000 m and can spot a rabbit from 1.5 km, and when two birds lock talons in mid-air combat they may plummet together before breaking apart.',
facts:['Australia\'s largest bird of prey — wingspan to 2.3 m','Can spiral to 2,000 m altitude on thermals without a single wingbeat — detecting prey from extraordinary height','Engaged in aerial combat by locking talons with rivals and tumbling together — sometimes unable to separate','Has been deliberately trained by hang-gliders to leave them alone — by using an eagle image decoy on the glider','Pairs mate for life and return to the same nest (eyrie) for up to 50 years — some eyries are over 2 m deep']},

{name:'Satin Bowerbird',scientific:'Ptilonorhynchus violaceus',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Satin_bowerbird',lat:-35.00,lon:149.00,habitat:'Brindabella Ranges, ACT',
desc:'A bird that makes art — the male satin bowerbird spends weeks constructing and decorating an avenue bower with blue objects specifically to attract females, and the quality of his collection and construction is the primary criterion females use to choose a mate.',
facts:['Builds an "avenue bower" of sticks decorated exclusively with blue objects — blueberries, feathers, plastic, glass','Females evaluate bower quality as the primary criterion for mate selection — the most visually aesthetic breeding system known','Males steal decorations from rival bowers and replace them with worthless items — documented deception','Young males spend 5–7 years learning bower-building techniques before attracting a female','Females visit an average of 3–4 bowers before making a choice; re-evaluate for up to 6 weeks']},

{name:'Kakapo',scientific:'Strigops habroptilus',emoji:'🦜',category:'birds',status:'Critically Endangered',wiki:'Kakapo',lat:-46.00,lon:167.00,habitat:'Whenua Hou (Codfish Island), New Zealand',
desc:'The world\'s heaviest parrot, the only flightless parrot, and the longest-lived bird on Earth (100+ years) — the kakapo has a boom-and-bust reproductive cycle triggered only by the fruiting of rimu trees, making it extraordinarily difficult to protect.',
facts:['World\'s heaviest parrot — up to 4 kg; also the only flightless parrot','Can live over 100 years — the longest lifespan of any bird species','Reproduces only in years when rimu trees fruit heavily — sometimes a 5-year gap between breeding seasons','Only 246 individuals alive as of 2023 — every individual is named and individually managed','Has the lowest metabolic rate of any bird and the highest basal body fat reserves — adaptations for long fasting between food pulses']},

{name:'Brown Kiwi',scientific:'Apteryx australis',emoji:'🐦',category:'birds',status:'Vulnerable',wiki:'Brown_kiwi',lat:-39.00,lon:176.00,habitat:'Hawke\'s Bay, North Island, New Zealand',
desc:'New Zealand\'s national bird and one of the most unusual birds on Earth — the kiwi has cat-like whiskers, mammal-like bone marrow, nostrils at the tip of its bill, and lays an egg so large relative to body size that a human equivalent would be 50 kg.',
facts:['Nostrils at the TIP of the bill — unique among birds; sniffs out earthworms and grubs buried underground','Egg is 20% of the female\'s body weight — equivalent to a human giving birth to an 11 kg baby','Has cat-like facial whiskers (vibrissae) — unique among birds; used for touch navigation in dark forest','DNA is closer to the extinct elephant bird of Madagascar than to the Australian emu — ancient dispersal mystery','Male alone incubates the egg for 70–85 days — the longest incubation period relative to size of any bird']},

{name:'Tui',scientific:'Prosthemadera novaeseelandiae',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Tui_(bird)',lat:-36.87,lon:174.76,habitat:'Waitakere Ranges, Auckland, NZ',
desc:'New Zealand\'s most accomplished native singer — the tui has two voice boxes (syrinx) and produces complex songs that include frequencies beyond human hearing, mimicking other birds, and generating polyphonic chords simultaneously.',
facts:['Has two voice boxes (syrinx) — can produce two notes simultaneously and polyphonic chords','Communicates partly in ultrasonic frequencies beyond human hearing','Feeds primarily on nectar — the most important native pollinator for many New Zealand flowering trees','The white throat tuft is unique — gives the bird its alternate name "parson bird" from 19th-century colonists','Population has recovered strongly since possum and rat control began in NZ bush restoration projects']},

{name:'Black Swan',scientific:'Cygnus atratus',emoji:'🦢',category:'birds',status:'Least Concern',wiki:'Black_swan',lat:-31.00,lon:115.80,habitat:'Swan River, Perth, Western Australia',
desc:'For centuries, Europeans used "black swan" as a phrase for the impossible — until Dutch explorer Willem de Vlamingh encountered them on a Western Australian river in 1697, changing the phrase into one for the unexpectedly impactful.',
facts:['Gave the world the "black swan event" concept (Nassim Taleb) — a metaphor for the impossible that turns out to be real','Discovered by Dutch explorer de Vlamingh in 1697 — immediately changed the "impossibility" phrase in European philosophy','Mates for life; 6% of pairs are same-sex male couples who steal nests and eggs from female pairs — a documented natural behaviour','Western Australia\'s state bird — appears on the state flag','Can fly at 50 km/h and travel hundreds of km between wetlands during drought']},

{name:'Little Penguin',scientific:'Eudyptula minor',emoji:'🐧',category:'birds',status:'Least Concern',wiki:'Little_penguin',lat:-38.30,lon:145.10,habitat:'Phillip Island, Victoria',
desc:'The world\'s smallest penguin — just 33 cm tall — the little penguin returns to the same burrow every night and the Phillip Island Penguin Parade (where hundreds march ashore after dark) is Australia\'s second most-visited wildlife experience.',
facts:['World\'s smallest penguin — just 33 cm tall and 1.5 kg','Returns to the exact same burrow every night throughout a 20-year lifespan','Phillip Island colony: 32,000 penguins parade ashore every night — Australia\'s most visited wildlife event','Can dive to 72 m depth and hold breath for 60 seconds','Uses ultraviolet patterns in plumage visible to other penguins (but not humans) as individual ID markers']},

{name:'Rainbow Lorikeet',scientific:'Trichoglossus moluccanus',emoji:'🦜',category:'birds',status:'Least Concern',wiki:'Rainbow_lorikeet',lat:-27.00,lon:153.00,habitat:'Brisbane, Queensland',
desc:'The most vivid parrot in Australia — a living rainbow that feeds exclusively on nectar and pollen — the rainbow lorikeet\'s brush-tipped tongue and crop design is so different from seed-eating parrots that ornithologists once classified them in their own family.',
facts:['Tongue is brush-tipped — laps pollen and nectar from flowers; no ability to digest seeds','So different from seed-eating parrots that for many years was classified in a separate family (Loriidae)','Flocks of 1,000+ descend at dusk to communal roosts — producing deafening screeching heard for 2 km','Wild populations established in Tasmania, New Zealand, and Hong Kong from escaped pets','Remarkable colour: blue head, orange-red breast, green back — each section using different pigment types']},

{name:'Superb Fairy-wren',scientific:'Malurus cyaneus',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Superb_fairywren',lat:-35.00,lon:149.00,habitat:'Canberra Nature Parks, ACT',
desc:'A biological paradox — females appear to prefer the best-quality males while simultaneously mating with males outside the pair bond 75% of the time — making the fairy-wren one of the most intensively studied birds in evolutionary biology.',
facts:['75% of offspring in a clutch are fathered by males outside the pair bond — one of the highest infidelity rates in any bird','Males sing a "purring" call only heard by the female immediately before copulation — unique private courtship signal','Feeding helpers: male offspring from previous years help their mother feed new chicks — cooperative breeding','The blue plumage of breeding males is among the most vivid of any bird in Australia','Females teach their unhatched eggs a secret password call — hatchlings who use the correct call are fed preferentially']},

// FISH
{name:'Whale Shark',scientific:'Rhincodon typus',emoji:'🦈',category:'fish',status:'Endangered',wiki:'Whale_shark',lat:-23.00,lon:113.00,habitat:'Ningaloo Reef, Western Australia',
desc:'The world\'s largest fish — reaching 18 m — the whale shark gathers at Ningaloo Reef every March–July in one of the most reliable aggregations of any large marine animal, filtering 6,000 litres of water per hour for tiny zooplankton.',
facts:['World\'s largest fish — up to 18 m and 20+ tonnes; reliably aggregates at Ningaloo every March–July','Filters 6,000 litres of water per hour through gill rakers — 5 pairs of metre-wide gills','Spots are unique to each individual — used to identify them in photo-ID databases across decades','Can live for 130 years — one of the longest-lived fish','Despite their size, feeds exclusively on plankton, fish eggs, and small fish — completely harmless to humans']},

{name:'Leafy Sea Dragon',scientific:'Phycodurus eques',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Leafy_seadragon',lat:-35.00,lon:137.00,habitat:'Yorke Peninsula, South Australia',
desc:'Among the most extraordinary camouflage in nature — the leafy sea dragon\'s leaf-like appendages are purely cosmetic; they have no function in swimming, which is performed by near-invisible pectoral and dorsal fins vibrating up to 35 times per second.',
facts:['Leaf appendages are purely cosmetic — propulsion comes from near-invisible pectoral fins vibrating 35 times per second','Mates for life — pairs synchronise their colour changes and movement during extended courtship dances','Males carry the eggs attached to a brood patch under the tail — no pouch','South Australia\'s marine emblem — found only in southern and western Australian waters','Camouflage so perfect they are effectively invisible among kelp at rest — researchers must use bright lights to find them']},

{name:'Barramundi',scientific:'Lates calcarifer',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Barramundi',lat:-15.00,lon:131.00,habitat:'Daly River, Northern Territory',
desc:'Australia\'s most iconic sport fish begins life as a male and becomes a female at 3–5 years old — a sequential hermaphrodite — and can survive dry season by burying in mud, making it one of the most adaptable fish in the tropical north.',
facts:['Sequential protandrous hermaphrodite — all individuals born male; change to female at age 3–5','Can survive in brackish, fresh, or marine water — switches between habitats for different life stages','Survives dry season in temporary pools by becoming torpid — dramatically lowers metabolism','Australia\'s most sought-after sportfish — famous for acrobatic leaps when hooked','Farmed at industrial scale in Australia, Thailand, Malaysia — one of the most important aquaculture species in Asia-Pacific']},

{name:'Murray Cod',scientific:'Maccullochella peelii',emoji:'🐟',category:'fish',status:'Vulnerable',wiki:'Murray_cod',lat:-34.50,lon:143.00,habitat:'Murray River, Victoria/NSW',
desc:'Australia\'s largest freshwater fish and one of the longest-lived — individuals can reach 1.8 m and 113 kg with a lifespan of over 50 years — and is a keystone predator of the Murray-Darling basin that is itself under threat.',
facts:['Australia\'s largest freshwater fish — up to 1.8 m and 113 kg; can live over 50 years','Males aggressively guard and fan eggs for weeks — one of few large freshwater fish to display paternal care','Once so abundant that settlers reported rivers were "teeming" — populations have declined 90% from overfishing and dams','Listed as a Vulnerable species in the Murray-Darling Basin — the epicentre of Australian water allocation conflict','Can detect low-frequency vibrations from swimming prey up to 10 m away using the lateral line system']},

{name:'Reef Manta Ray',scientific:'Mobula alfredi',emoji:'🐟',category:'fish',status:'Vulnerable',wiki:'Reef_manta_ray',lat:-23.00,lon:113.00,habitat:'Ningaloo Reef, WA',
desc:'The largest ray in the world by wingspan — reaching 5.5 m from wing tip to wing tip — the reef manta ray has the largest brain-to-body ratio of any fish and has passed the mirror self-recognition test, suggesting self-awareness.',
facts:['Largest ray in the world by wingspan — up to 5.5 m; weight up to 3,000 kg','Largest brain-to-body ratio of any fish — passed the mirror test, suggesting self-awareness in a fish for the first time','Returns to the same cleaning station (reef site where cleaner wrasses remove parasites) for decades','Can leap fully out of the water (breaching) — possibly communication or parasite removal','Filter feeds by corkscrewing through plankton-dense water with mouth wide open — cephalic fins funnel food in']},

{name:'Epaulette Shark',scientific:'Hemiscyllium ocellatum',emoji:'🦈',category:'fish',status:'Least Concern',wiki:'Epaulette_shark',lat:-18.00,lon:147.00,habitat:'Lizard Island, Great Barrier Reef',
desc:'A shark that walks on land — the epaulette shark uses its pectoral and pelvic fins to crawl across exposed reef flats between tide pools, and can survive 60 times longer without oxygen than a human can, enabling it to tolerate stranded-in-air conditions.',
facts:['Can walk on land using pectoral and pelvic fins to traverse exposed reef flats between tide pools','Can survive 60 minutes with zero oxygen — by shutting down non-essential brain functions (controlled anoxia)','Only 0.9 m long — one of the smallest sharks in the reef ecosystem','Spots near the "shoulder" (pectoral fin) mimic eyes — designed to make it look larger to predators','Lays eggs in spiral egg cases (mermaid\'s purses) fixed to the reef substrate']},

{name:'Potato Cod',scientific:'Epinephelus tukula',emoji:'🐟',category:'fish',status:'Vulnerable',wiki:'Potato_grouper',lat:-15.00,lon:146.00,habitat:'Cod Hole, Ribbon Reefs, GBR',
desc:'A gentle giant of the Great Barrier Reef — the potato cod can reach 2 m and 110 kg, has lived at Cod Hole for decades, and individual fish have become so accustomed to divers that they allow themselves to be petted.',
facts:['Can reach 2 m and 110 kg — one of the largest reef fish on the Great Barrier Reef','Cod Hole individuals have been present for decades — same fish identified by divers across 30 years','Sequential hermaphrodite — all fish begin as females and transform to males at large body size','Feeds by opening mouth rapidly — vacuums fish, octopus, and crustaceans into its gape by suction','A protogynous hermaphrodite: sex change triggered by social cues — when the dominant male disappears, the largest female changes sex']},

// INSECTS
{name:'Ulysses Butterfly',scientific:'Papilio ulysses',emoji:'🦋',category:'insects',status:'Least Concern',wiki:'Ulysses_butterfly',lat:-17.00,lon:145.70,habitat:'Daintree Rainforest, Queensland',
desc:'The electric blue of the Ulysses butterfly\'s wings has no pigment — it is entirely structural colour from nanostructured scale surfaces — and is so vivid that tour boats in Queensland use butterfly decoys to attract them for wildlife tourism.',
facts:['Blue colour is structural, not pigment — nanostructure of scale surfaces diffracts only blue wavelengths','So vivid that Queensland rainforest tour boats use blue decoys to attract butterflies','Wingspan of 14 cm — the largest swallowtail butterfly in Australia','Females choose mates partly based on wing iridescence intensity — a signal of genetic health','Host plants are exclusively rutaceous trees (Evodia and Melicope) — limiting distribution to specific rainforest types']},

{name:'Lord Howe Island Stick Insect',scientific:'Dryococelus australis',emoji:'🪲',category:'insects',status:'Critically Endangered',wiki:'Dryococelus_australis',lat:-31.60,lon:159.00,habitat:'Ball\'s Pyramid, Lord Howe Island',
desc:'The "rarest insect on Earth" — thought extinct for 80 years when a tiny colony of 24 insects was discovered clinging to a single Melaleuca bush on a volcanic sea stack — the stick insect is so large it was called the "tree lobster" by early settlers.',
facts:['Rediscovered in 2001 on Ball\'s Pyramid — a volcanic sea stack 20 km from Lord Howe Island — thought extinct since 1930','Only 24 individuals found on a single Melaleuca bush clinging to the cliff face at night','Called "tree lobster" by 19th-century settlers due to its size (15 cm) and shiny dark exoskeleton','Captive breeding programme at Melbourne Zoo has raised the population to over 10,000 from the original 24','Rats introduced to Lord Howe Island in 1918 wiped out the entire population on the main island within 2 years']},

{name:'Giant Burrowing Cockroach',scientific:'Macropanesthia rhinocephala',emoji:'🪲',category:'insects',status:'Least Concern',wiki:'Giant_burrowing_cockroach',lat:-17.00,lon:145.00,habitat:'Tropical Queensland',
desc:'The world\'s heaviest cockroach — up to 35 g and 8 cm — the giant burrowing cockroach is entirely unlike the pest species: it lives in permanent burrows, raises its young for 9 months, and helps recycle leaf litter in Queensland forests.',
facts:['World\'s heaviest cockroach — up to 35 g; completely unlike pest cockroaches in ecology','Raises its young for 9 months in a burrow — one of the most intensive parental investments of any insect','Only eats decomposing leaf litter — a significant ecosystem recycler in tropical Queensland forests','Lives up to 10 years — extraordinarily long for an insect','Popular as a pet in Australia — legal to keep; illegal to export; must be licensed in some states']},

{name:'Bull Ant',scientific:'Myrmecia gulosa',emoji:'🐜',category:'insects',status:'Least Concern',wiki:'Bull_ant',lat:-35.00,lon:149.00,habitat:'Canberra Bushland, ACT',
desc:'Australia\'s most dangerous ant — capable of killing a human through anaphylaxis — the bull ant was the first insect shown to have colour vision, navigates by memorising visual landmarks, and hunts entirely as solitary individuals rather than in columns.',
facts:['Australia\'s most dangerous ant — sting causes anaphylaxis; several human deaths recorded','First insect demonstrated to have colour vision (Charles Turner, 1912)','Hunts as a solitary individual — does not follow pheromone trails like most ants','Navigates by panoramic landmark memory — creates a photographic map of the terrain within 30 m of the nest','Can live for up to 5 years — extraordinarily long for a worker ant']},

// AMPHIBIANS
{name:'Green Tree Frog',scientific:'Litoria caerulea',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Australian_green_tree_frog',lat:-15.00,lon:133.00,habitat:'Darwin, Northern Territory',
desc:'Australia\'s most beloved amphibian — often found inside toilet cisterns, drainpipes, and letterboxes — the green tree frog is a natural antibiotic factory; its skin produces 2 peptides (caerins) that have shown effectiveness against HIV and some cancers.',
facts:['Skin produces caerins — peptides with demonstrated antiviral activity against HIV and some cancer cell lines in lab conditions','Skin also produces phyllocaerulein — a cholecystokinin analogue used to study appetite regulation in humans','Often found inside toilet cisterns — coolness and moisture make them irresistible; completely harmless','Can survive 30% dehydration — one of the most drought-tolerant frogs in Australia','Lives up to 16 years in captivity — among the longest-lived frogs in the world']},

{name:'Corroboree Frog',scientific:'Pseudophryne corroboree',emoji:'🐸',category:'amphibians',status:'Critically Endangered',wiki:'Southern_corroboree_frog',lat:-36.50,lon:148.50,habitat:'Kosciuszko National Park, NSW',
desc:'One of Australia\'s most endangered frogs — fewer than 200 remain in the wild — the corroboree frog is unique because it synthesises its own poison (pumiliotoxin) rather than sequestering it from food, the only known vertebrate to do so.',
facts:['Produces its own pumiliotoxin — does not need dietary precursors like poison dart frogs; only vertebrate known to self-synthesise alkaloid toxins','Fewer than 200 remain in the wild in the Snowy Mountains — one of the world\'s rarest frogs','Declined primarily from chytrid fungus (Batrachochytrium dendrobatidis) — the same pathogen decimating frogs globally','Vivid black and yellow warning pattern — effective aposematism backed by genuine toxicity','Each male is isolated; breeds in terrestrial nests (moss, leaf litter) — not in water; eggs hatch when rain washes them to a pool']},

{name:'Water-holding Frog',scientific:'Cyclorana platycephala',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Water-holding_frog',lat:-25.00,lon:134.00,habitat:'Simpson Desert, Central Australia',
desc:'The ultimate desert survivor — the water-holding frog can burrow into clay soil, secrete a waterproof mucus cocoon around itself, and remain dormant underground for up to 7 years, sustaining itself on stored water absorbed through the skin.',
facts:['Can survive underground for up to 7 years — sealed in a cocoon of shed skin and mucus','Absorbs water through the skin and stores it in its bladder and lymph spaces — making the frog feel like a water-balloon','Indigenous Australians knew to dig up these frogs when no other water source was available','Emerges after desert rain, breeds explosively (the entire reproductive cycle completes in days, not weeks)','The mucous cocoon is hygroscopic — slowly absorbs atmospheric humidity to reduce desiccation rate']},

{name:'Giant White-lipped Tree Frog',scientific:'Litoria infrafrenata',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'White-lipped_tree_frog',lat:-9.00,lon:148.00,habitat:'PNG Eastern Highlands',
desc:'The world\'s largest tree frog — females reach 13 cm — named for the distinctive white stripe along the lower lip, the white-lipped tree frog ranges from Queensland through Papua New Guinea and is the largest arboreal frog on Earth.',
facts:['World\'s largest tree frog — females to 13 cm; males to 10 cm','Distinctive white line along lower lip — from which the species is named; visible at distance','Ranges from northern Queensland through all of PNG — one of the few frog species with such a large contiguous range','Call is an extremely loud, harsh "honk" heard several hundred metres away — resonated through a vocal sac','Toepads are proportionally enormous — allowing adhesion to near-vertical glass surfaces with ease']},

{name:'Tusked Frog',scientific:'Adelotus brevis',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Tusked_frog',lat:-27.00,lon:152.00,habitat:'Sunshine Coast Hinterland, SE Queensland',
desc:'The only frog in Australia with true tooth-like projections from the lower jaw — "tusks" used by males to fight each other for access to nest sites, producing a species where males bear the costs of intense combat instead of elaborate display.',
facts:['Only Australian frog species where males have true tooth-like projections (tusks) used in combat','Males fight over ownership of terrestrial foam nests built under leaf litter near water','Females inspect and select males at nest sites — a reversal of the typical frog mate-choice pattern','Males are smaller than females — unusual for a combat-oriented species; "reversed sexual size dimorphism"','Foam nests keep eggs moist above the water level — eggs only enter water when foam breaks down at hatching']},

{name:'Magnificent Tree Frog',scientific:'Litoria splendida',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Magnificent_tree_frog',lat:-17.00,lon:125.00,habitat:'Kimberley, Western Australia',
desc:'Found only in the Kimberley region of Western Australia — near gorges and permanent water holes — the magnificent tree frog is one of the most habitat-restricted frogs in Australia and is identified by its elaborate pattern of parotoid glands and tympanic tubercles.',
facts:['Found exclusively in the Kimberley region — one of Australia\'s most geographically restricted frogs','Has prominent parotoid glands behind the eyes AND raised tubercles around the tympanic membrane — unique combination','Males call from cliff faces above gorge pools — call resonates powerfully in the rock gorge environment','Coexists with freshwater crocodiles at most Kimberley water holes — completely unaffected by crocodile presence','Often seen in tourist areas around gorge car parks — accustomed to human presence but completely wild']
}
];

const SC={'Least Concern':'LC','Near Threatened':'NT','Vulnerable':'VU','Endangered':'EN','Critically Endangered':'CR','Data Deficient':'DD'};
let activeCat='all',searchQ='',currentList=[],currentModal=null;
const disc=new Set(JSON.parse(localStorage.getItem('ae_oc_disc')||'[]'));
const wiki={};let map=null,markers=[];
async function getWikiImg(t){if(wiki[t]!==undefined)return wiki[t];try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`);const d=await r.json();const u=d.originalimage?.source||d.thumbnail?.source||null;wiki[t]=u;return u;}catch{wiki[t]=null;return null;}}
function initMap(){map=L.map('world-map',{center:[-25,134],zoom:3,minZoom:2,maxZoom:18});L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:18}).addTo(map);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{attribution:'',maxZoom:18,opacity:0.55}).addTo(map);updateMarkers();map.on('zoomend moveend',updateMarkers);}
function updateMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];if(map.getZoom()<3)return;filtered().forEach(a=>{const el=L.divIcon({html:`<div class="animal-map-marker${disc.has(ANIMALS.indexOf(a))?' discovered':''}" title="${a.name}">${catIcon(a.category)}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,17]});const m=L.marker([a.lat,a.lon],{icon:el}).addTo(map);m.on('click',()=>openModal(ANIMALS.indexOf(a)));markers.push(m);});}
function filtered(){const q=searchQ.toLowerCase().trim();return ANIMALS.filter(a=>{const cm=activeCat==='all'||a.category===activeCat;const sm=!q||a.name.toLowerCase().includes(q)||a.scientific.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q)||a.facts.some(f=>f.toLowerCase().includes(q));return cm&&sm;});}
function renderCards(){const grid=document.getElementById('cards-grid');const empty=document.getElementById('empty-state');const list=filtered();currentList=list;document.getElementById('results-count').textContent=list.length+' animal'+(list.length===1?'':'s');document.getElementById('results-title').textContent=activeCat==='all'?'All Oceanian Animals':'Oceanian '+cap(activeCat);document.getElementById('reset-btn').style.display=activeCat==='all'?'none':'inline-block';if(!list.length){grid.innerHTML='';empty.style.display='block';return;}empty.style.display='none';grid.innerHTML=list.map((a,i)=>{const idx=ANIMALS.indexOf(a);return `<div class="card" onclick="openModal(${idx})" style="animation-delay:${i*22}ms"><div class="card-photo bg-${a.category}"><span class="card-fallback">${catIcon(a.category)}</span><img data-wiki="${a.wiki}" alt="${a.name}" loading="lazy"/></div><div class="card-overlay"><p>${a.facts[0].substring(0,88)}…</p><small>TAP TO EXPLORE <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></small></div><div class="card-info">${disc.has(idx)?'<span class="card-check"><svg class="svg-ic"><use href="#ic-check"/></svg></span>':''}<div class="card-name">${a.name}</div><div class="card-row"><span class="badge b-${a.category}">${a.category}</span></div></div></div>`;}).join('');grid.querySelectorAll('img[data-wiki]').forEach(img=>{getWikiImg(img.dataset.wiki).then(u=>{if(u){img.src=u;img.onload=()=>{img.classList.add('loaded');img.previousElementSibling.style.opacity=0};}});});}
function openModal(idx){const a=ANIMALS[idx];const sc=SC[a.status]||'LC';const inL=currentList.indexOf(a);const pr=inL>0?ANIMALS.indexOf(currentList[inL-1]):null;const nx=inL<currentList.length-1?ANIMALS.indexOf(currentList[inL+1]):null;const sat=`https://maps.google.com/maps?q=${a.lat},${a.lon}&t=k`;const sv=`https://maps.google.com/maps?q=${a.lat},${a.lon}&layer=c&cbll=${a.lat},${a.lon}`;document.getElementById('modal-content').innerHTML=`<div class="modal-hero bg-${a.category}"><div class="fallback-hero">${catIcon(a.category)}</div><img data-wiki="${a.wiki}" alt="${a.name}"/><div class="modal-hero-grad"></div><div class="modal-hero-title"><h2>${a.name}</h2><em>${a.scientific}</em></div></div><div class="modal-body"><div class="modal-badges"><span class="badge b-${a.category}">${a.category}</span><span class="s-badge s-${sc}">${a.status}</span></div><p class="modal-desc">${a.desc}</p><div class="facts-head">Wild Facts</div><ul class="facts-list" id="facts-list">${a.facts.map(f=>`<li>${f}</li>`).join('')}</ul><div class="habitat-section"><div class="habitat-title">Habitat</div><div class="habitat-name"><svg class="svg-ic"><use href="#ic-pin"/></svg> ${a.habitat}</div><div class="habitat-btns"><a href="${sat}" target="_blank" class="habitat-btn hbtn-sat"><svg class="svg-ic"><use href="#ic-satellite"/></svg> Google Maps Satellite</a><a href="${sv}" target="_blank" class="habitat-btn hbtn-sv"><svg class="svg-ic"><use href="#ic-camera"/></svg> Google Street View</a></div></div><div class="modal-nav"><button onclick="event.stopPropagation();openModal(${pr})" ${pr===null?'disabled style="opacity:.3"':''}><svg class="svg-ic"><use href="#ic-arrow-left"/></svg> Prev</button><button onclick="event.stopPropagation();openModal(${nx})" ${nx===null?'disabled style="opacity:.3"':''}>Next <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></button></div></div>`;document.getElementById('modal-overlay').classList.add('open');document.body.style.overflow='hidden';currentModal=idx;disc.add(idx);localStorage.setItem('ae_oc_disc',JSON.stringify([...disc]));updateDiscUI();const img=document.querySelector('#modal-content .modal-hero img');getWikiImg(a.wiki).then(u=>{if(u&&img){img.src=u;img.onload=()=>img.classList.add('loaded');}});setTimeout(()=>{document.querySelectorAll('#facts-list li').forEach((li,i)=>{setTimeout(()=>li.classList.add('visible'),i*70);});},180);}
function updateDiscUI(){const n=disc.size,t=ANIMALS.length;document.getElementById('disc-count').textContent=`${n}/${t}`;document.getElementById('disc-text').textContent=n;document.getElementById('disc-total').textContent=t;document.getElementById('disc-bar').style.width=`${(n/t)*100}%`;}
function toggleDisc(){const p=document.getElementById('disc-panel');p.style.display=p.style.display==='block'?'none':'block';}
function surpriseMe(){const l=filtered();if(!l.length)return;openModal(ANIMALS.indexOf(l[Math.floor(Math.random()*l.length)]));}
function resetCat(){activeCat='all';document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));renderCards();updateMarkers();}
function cap(s){return s[0].toUpperCase()+s.slice(1)}
function initTicker(){const facts=ANIMALS.flatMap(a=>a.facts.map(f=>a.name+' — '+f)).sort(()=>Math.random()-.5);const track=document.getElementById('ticker-track');const el=document.getElementById('ticker');let idx=0,anim=null,paused=false;function playNext(){el.style.transition='opacity 0.4s';el.style.opacity='0';setTimeout(()=>{el.textContent=facts[idx++%facts.length];el.style.transition='none';const cw=track.clientWidth;el.style.transform=`translateX(${cw}px)`;void el.offsetWidth;el.style.transition='opacity 0.4s';el.style.opacity='1';const tw=el.scrollWidth;const dur=(cw+tw)/50*1000;if(anim)anim.cancel();anim=el.animate([{transform:`translateX(${cw}px)`},{transform:`translateX(-${tw}px)`}],{duration:dur,easing:'linear',fill:'forwards'});if(paused)anim.pause();anim.onfinish=()=>setTimeout(playNext,400);},400);}track.addEventListener('mouseenter',()=>{paused=true;if(anim)anim.pause();});track.addEventListener('mouseleave',()=>{paused=false;if(anim)anim.play();});playNext();}
document.addEventListener('DOMContentLoaded',()=>{initMap();renderCards();updateDiscUI();initTicker();});
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',function(){document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));this.classList.add('active');activeCat=this.dataset.cat;renderCards();updateMarkers();}));
document.getElementById('search-input').addEventListener('input',function(){searchQ=this.value;renderCards();updateMarkers();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
document.getElementById('modal-close').addEventListener('click',closeModal);
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';currentModal=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='ArrowRight'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i<currentList.length-1)openModal(ANIMALS.indexOf(currentList[i+1]));}if(e.key==='ArrowLeft'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i>0)openModal(ANIMALS.indexOf(currentList[i-1]));}});
</script>
<script src="paw-cursor.js" defer></script>
