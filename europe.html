<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Animal Explorer — Europe</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090f09;--card:#121e12;--border:#1e341e;--text:#ddeacc;--sub:#6a8a5a;--accent:#f0d07a;--mammal:#2e6e20;--reptile:#7a3a10;--bird:#164880;--fish:#086060;--insect:#706000;--amphibian:#4a1878}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;padding:.9rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500}
.back-btn{padding:.32rem .85rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.logo{font-size:1.2rem;color:var(--accent)}
.disc-badge{padding:.3rem .75rem;border:1px solid rgba(240,208,122,.25);border-radius:20px;font:.78rem Arial,sans-serif;color:var(--accent);cursor:pointer;background:rgba(240,208,122,.06)}
.disc-panel{display:none;padding:.6rem 1.4rem;background:#0a130a;border-bottom:1px solid var(--border)}
.disc-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:.3rem}
.disc-bar{height:100%;background:linear-gradient(90deg,#3a7820,var(--accent));border-radius:3px;transition:width .5s}
.disc-panel p{font:.73rem Arial,sans-serif;color:var(--sub)}.disc-panel p span{color:var(--accent)}
.ticker-wrap{display:flex;align-items:center;gap:.5rem;font:italic .76rem/1.3 Arial,sans-serif;color:var(--sub);width:300px;flex-shrink:0}
.ticker-label{color:var(--accent);font-style:normal;font-weight:bold;white-space:nowrap}
#ticker-track{overflow:hidden;flex:1;min-width:0;position:relative;height:1.3em;cursor:default}
#ticker{position:absolute;white-space:nowrap;will-change:transform;opacity:0}
.controls{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.65rem 1.4rem;background:#0d160d;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:150px;max-width:240px}
.search-wrap svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--sub);fill:none;pointer-events:none}
.search-input{width:100%;padding:.36rem .75rem .36rem 1.9rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;color:var(--text);font:.8rem Arial,sans-serif;outline:none}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--sub)}
.pill{padding:.32rem .8rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font:.76rem Arial,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active[data-cat=all]{background:var(--accent);border-color:var(--accent);color:#111;font-weight:bold}
.pill.active[data-cat=mammals]{background:var(--mammal);border-color:var(--mammal);color:#fff;font-weight:bold}
.pill.active[data-cat=reptiles]{background:var(--reptile);border-color:var(--reptile);color:#fff;font-weight:bold}
.pill.active[data-cat=birds]{background:var(--bird);border-color:var(--bird);color:#fff;font-weight:bold}
.pill.active[data-cat=fish]{background:var(--fish);border-color:var(--fish);color:#fff;font-weight:bold}
.pill.active[data-cat=insects]{background:var(--insect);border-color:var(--insect);color:#fff;font-weight:bold}
.pill.active[data-cat=amphibians]{background:var(--amphibian);border-color:var(--amphibian);color:#fff;font-weight:bold}
.surprise-btn{padding:.36rem .95rem;border:none;border-radius:20px;background:linear-gradient(135deg,#3a1880,#7030d0);color:#fff;font:.76rem Arial,sans-serif;cursor:pointer;white-space:nowrap}
.map-section{border-bottom:2px solid var(--border)}
#world-map{height:380px;width:100%}
.map-hint{text-align:center;padding:.3rem;color:var(--sub);font:1rem Arial,sans-serif;background:#0b140b;border-bottom:1px solid var(--border)}
.leaflet-container{background:#060e1e}
.animal-map-marker{width:34px;height:34px;border-radius:50%;background:rgba(9,15,9,.9);border:2px solid rgba(240,208,122,.5);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.6)}
.animal-map-marker:hover{transform:scale(1.25);border-color:var(--accent)}
.animal-map-marker.discovered{border-color:var(--accent);background:rgba(240,208,122,.15)}
.results-section{padding:1.2rem 1.4rem}
.results-header{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.9rem}
.results-header h2{font-size:1.1rem;color:var(--accent)}
#results-count{color:var(--sub);font:.78rem Arial,sans-serif}
#reset-btn{margin-left:auto;padding:.26rem .7rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.74rem Arial,sans-serif;border-radius:20px;cursor:pointer}
#reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.9rem}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--card);animation:slideUp .3s ease backwards;transition:box-shadow .3s,border-color .25s;position:relative}
.card:hover{box-shadow:0 10px 28px rgba(0,0,0,.6);border-color:rgba(240,208,122,.35)}
.card-photo{height:155px;position:relative;overflow:hidden}
.card-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4.5rem;z-index:1;transition:opacity .3s}
.card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;transition:transform .5s,opacity .3s}
.card:hover .card-photo img{transform:scale(1.07)}
.card-overlay{position:absolute;inset:0 0 auto 0;height:155px;background:rgba(5,10,5,.88);backdrop-filter:blur(2px);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:.9rem;text-align:center;z-index:3;opacity:0;transition:opacity .2s}
.card:hover .card-overlay{opacity:1}
.card-overlay p{font:.78rem/1.5 Arial,sans-serif;color:#dde;margin-bottom:.4rem}
.card-overlay small{font:.68rem Arial,sans-serif;color:var(--accent)}
.card-info{padding:.6rem .85rem .7rem;position:relative}
.card-name{font-size:.88rem;margin-bottom:.28rem}
.card-row{display:flex;align-items:center;justify-content:space-between}
.card-check{position:absolute;top:.5rem;right:.7rem;width:17px;height:17px;border-radius:50%;background:var(--accent);color:#111;font:.7rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase;letter-spacing:.3px}
.b-mammals{background:rgba(46,110,32,.28);color:#70d450;border:1px solid rgba(46,110,32,.45)}
.b-reptiles{background:rgba(122,58,16,.28);color:#e08040;border:1px solid rgba(122,58,16,.45)}
.b-birds{background:rgba(22,72,128,.28);color:#58b0f0;border:1px solid rgba(22,72,128,.45)}
.b-fish{background:rgba(8,96,96,.28);color:#30d8d8;border:1px solid rgba(8,96,96,.45)}
.b-insects{background:rgba(112,96,0,.28);color:#e0cc30;border:1px solid rgba(112,96,0,.45)}
.b-amphibians{background:rgba(74,24,120,.28);color:#c070f0;border:1px solid rgba(74,24,120,.45)}
.s-badge{display:inline-block;padding:.08rem .42rem;border-radius:10px;font:bold .64rem/1.4 Arial,sans-serif;text-transform:uppercase}
.s-LC{background:rgba(32,110,32,.2);color:#60d060;border:1px solid rgba(32,110,32,.4)}
.s-NT{background:rgba(190,170,0,.15);color:#d8c840;border:1px solid rgba(190,170,0,.3)}
.s-VU{background:rgba(190,110,0,.15);color:#e09030;border:1px solid rgba(190,110,0,.3)}
.s-EN{background:rgba(190,55,0,.15);color:#e05828;border:1px solid rgba(190,55,0,.3)}
.s-CR{background:rgba(190,0,0,.15);color:#e02828;border:1px solid rgba(190,0,0,.3)}
.bg-mammals{background:linear-gradient(135deg,#0e220a,#183818)}.bg-reptiles{background:linear-gradient(135deg,#200e04,#381808)}
.bg-birds{background:linear-gradient(135deg,#060e28,#0e1e44)}.bg-fish{background:linear-gradient(135deg,#021414,#063030)}
.bg-insects{background:linear-gradient(135deg,#141000,#282002)}.bg-amphibians{background:linear-gradient(135deg,#0e041c,#1c0838)}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--sub);font:1rem Arial,sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#111c11;border:1px solid #2a422a;border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:scale(.94) translateY(10px);transition:transform .22s}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-close{position:absolute;top:.8rem;right:.8rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font:.92rem Arial,sans-serif;line-height:30px;text-align:center;z-index:2}
.modal-close:hover{background:rgba(255,255,255,.22)}
.modal-hero{height:230px;position:relative;overflow:hidden;border-radius:16px 16px 0 0}
.modal-hero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .3s}
.modal-hero img.loaded{opacity:1}
.modal-hero .fallback-hero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6.5rem;z-index:0}
.modal-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(17,28,17,.9) 0%,transparent 55%);z-index:2}
.modal-hero-title{position:absolute;bottom:.9rem;left:1.3rem;z-index:3}
.modal-hero-title h2{font-size:1.6rem;line-height:1.1;margin-bottom:.25rem}
.modal-hero-title em{color:var(--sub);font:.85rem Arial,sans-serif}
.modal-body{padding:1.1rem 1.4rem 1.6rem}
.modal-badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
.modal-desc{font:.88rem/1.72 Georgia,serif;margin-bottom:1rem;color:#ccd8bb}
.facts-head{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.45rem}
.facts-list{list-style:none;margin-bottom:.9rem}
.facts-list li{display:flex;gap:.5rem;align-items:flex-start;padding:.34rem 0;border-bottom:1px solid var(--border);font:.82rem/1.55 Arial,sans-serif;opacity:0;transform:translateX(-8px);transition:opacity .3s,transform .3s}
.facts-list li.visible{opacity:1;transform:none}.facts-list li:last-child{border-bottom:none}
.facts-list li::before{content:'▸';color:var(--accent);flex-shrink:0;margin-top:1px}
.habitat-section{margin-top:.7rem;padding:.75rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px}
.habitat-title{font:bold .66rem Arial,sans-serif;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.35rem}
.habitat-name{font:.8rem Arial,sans-serif;color:var(--sub);margin-bottom:.55rem}
.habitat-btns{display:flex;gap:.45rem;flex-wrap:wrap}
.habitat-btn{padding:.33rem .82rem;border-radius:20px;border:none;cursor:pointer;font:.74rem Arial,sans-serif;font-weight:bold;display:flex;align-items:center;gap:.32rem;transition:transform .15s;text-decoration:none}
.habitat-btn:hover{transform:translateY(-2px)}
.hbtn-sat{background:rgba(19,66,26,.8);color:#90d890}.hbtn-sv{background:rgba(66,19,24,.8);color:#d89090}
.modal-nav{display:flex;justify-content:space-between;margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--border)}
.modal-nav button{padding:.38rem .95rem;background:transparent;border:1px solid var(--border);color:var(--sub);font:.78rem Arial,sans-serif;border-radius:20px;cursor:pointer}
.modal-nav button:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:560px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.6rem}.card-photo,.card-overlay{height:125px}#world-map{height:240px}}
</style>
<script src="icons.js"></script>
<link rel="stylesheet" href="theme.css"/>
</head>
<body>
<header>
  <a class="back-btn" href="hub.html">← All Continents</a>
  <div class="logo">🌍 Europe — Wildlife Explorer</div>
  <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap">
    <div class="ticker-wrap"><span class="ticker-label">Fact:</span><div id="ticker-track"><span id="ticker"></span></div></div>
    <div class="disc-badge" onclick="toggleDisc()"><span id="disc-count">0/60</span> explored</div>
  </div>
</header>
<div class="disc-panel" id="disc-panel">
  <div class="disc-bar-wrap"><div class="disc-bar" id="disc-bar" style="width:0%"></div></div>
  <p>Explored <span id="disc-text">0</span> of <span id="disc-total">60</span> European animals</p>
</div>
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke-linecap="round"/></svg>
    <input class="search-input" id="search-input" type="text" placeholder="Search animals…" autocomplete="off"/>
  </div>
  <button class="pill active" data-cat="all">All</button>
  <button class="pill" data-cat="mammals">🐻 Mammals</button>
  <button class="pill" data-cat="reptiles">🦎 Reptiles</button>
  <button class="pill" data-cat="birds">🦅 Birds</button>
  <button class="pill" data-cat="fish">🐟 Fish</button>
  <button class="pill" data-cat="insects">🐝 Insects</button>
  <button class="pill" data-cat="amphibians">🐸 Amphibians</button>
  <button class="surprise-btn" onclick="surpriseMe()">🎲 Surprise!</button>
</div>
<div class="map-section"><div id="world-map"></div></div>
<p class="map-hint">🛰 Satellite imagery · Click animal pins to explore</p>
<section class="results-section">
  <div class="results-header">
    <h2 id="results-title">All European Animals</h2>
    <span id="results-count"></span>
    <button id="reset-btn" style="display:none" onclick="resetCat()">✕ Clear filter</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none">🔭 No animals found.</div>
</section>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ANIMALS=[
// MAMMALS
{name:'European Brown Bear',scientific:'Ursus arctos arctos',emoji:'🐻',category:'mammals',status:'Least Concern',wiki:'Brown_bear',lat:43.50,lon:22.00,habitat:'Rhodope Mountains, Bulgaria',
desc:'The largest land predator in Europe — once hunted to extinction across most of western Europe, the brown bear survives in fragmented populations from Scandinavia to the Carpathians and is slowly recolonising old haunts.',
facts:['Once hunted to extinction across most of W. Europe; now recovering through protection and reintroduction','Hibernate for up to 6 months — heart rate drops from 40 to 8 beats per minute; body temperature falls only 4–5°C','Females give birth during hibernation — cubs are born helpless and nurse from a sleeping mother','80% of diet is plants — blueberries, hazelnuts, roots; active carnivory is the minority','Extremely intelligent — studies show memory and problem-solving at the level of great apes']},

{name:'Eurasian Lynx',scientific:'Lynx lynx',emoji:'🐱',category:'mammals',status:'Least Concern',wiki:'Eurasian_lynx',lat:52.00,lon:22.00,habitat:'Białowieża Forest, Poland',
desc:'The largest cat in Europe — twice the size of the Iberian lynx — the Eurasian lynx is a solitary ambush predator that can kill deer up to 4× its own weight by delivering a suffocating bite to the throat.',
facts:['Largest wild cat in Europe — males weigh up to 30 kg','Can kill prey 4× its body weight — deer, wild boar, and chamois','Paws are proportionally enormous — act as natural snowshoes for silent movement in deep snow','Reintroduced to Białowieża, Scotland, Switzerland, and the Alps over the past 40 years','Male territories can exceed 400 km² — they need vast connected wild areas to sustain populations']},

{name:'European Bison',scientific:'Bison bonasus',emoji:'🦬',category:'mammals',status:'Near Threatened',wiki:'European_bison',lat:52.70,lon:24.00,habitat:'Białowieża Primeval Forest, Poland/Belarus',
desc:'The heaviest land animal in Europe and one of the greatest conservation success stories — the wisent went extinct in the wild in 1927, but descended from just 12 captive individuals and now numbers over 7,000 wild animals.',
facts:['Extinct in the wild by 1927 — the entire species descended from just 12 captive survivors','Now over 7,000 animals roaming free — one of conservation\'s most remarkable recoveries','Białowieża is Europe\'s last lowland primeval forest and the species\' last natural refuge','Males can weigh 920 kg — heavier than a North American bison','Europe\'s largest land animal and a keystone engineer of forest and meadow ecosystems']},

{name:'Iberian Lynx',scientific:'Lynx pardinus',emoji:'🐱',category:'mammals',status:'Endangered',wiki:'Iberian_lynx',lat:37.50,lon:-6.50,habitat:'Coto Doñana, Andalusia, Spain',
desc:'The most endangered wild cat in the world in 2002 — reduced to just 94 individuals — the Iberian lynx has staged a dramatic recovery to over 1,000 animals through captive breeding and rabbit habitat restoration.',
facts:['Most endangered cat species in the world in 2002 — just 94 individuals survived worldwide','Population has grown to over 1,000 through captive breeding, reintroduction, and habitat restoration','98% of diet is European rabbit — when rabbit populations crash from disease, lynx starve','Spotted coat is more vivid and facial ruff more pronounced than the Eurasian lynx','Flagship species for Mediterranean scrubland (matorral) habitat conservation']},

{name:'Gray Wolf',scientific:'Canis lupus',emoji:'🐺',category:'mammals',status:'Least Concern',wiki:'Gray_wolf',lat:42.00,lon:13.50,habitat:'Abruzzo National Park, Italy',
desc:'Hunted to near-extinction across Europe and now recovering spectacularly — wolves have naturally recolonised France, Germany, Belgium, the Netherlands, and Denmark without human translocation in the past 30 years.',
facts:['Naturally recolonised France, Germany, Belgium, Netherlands, and Denmark since the 1990s — no human help needed','European wolf population grew from 1,000 in 1970 to over 17,000 by 2022','Italian wolves are genetically distinct from all other European wolves — an isolated lineage since prehistory','Pack social dynamics include complex roles — alphas, betas, omegas, scouts, and nursemaids','Europe\'s cultural relationship with the wolf — in myth, fairy tale, and religion — is the deepest of any animal']},

{name:'Mediterranean Monk Seal',scientific:'Monachus monachus',emoji:'🦭',category:'mammals',status:'Endangered',wiki:'Mediterranean_monk_seal',lat:37.50,lon:27.00,habitat:'Aegean Sea, Turkish Coast',
desc:'One of the world\'s rarest marine mammals — fewer than 900 survive in scattered sea cave colonies around the Mediterranean and northeast Atlantic — the last large Mediterranean mammal driven from the open beach.',
facts:['Fewer than 900 individuals remain — one of the 10 most endangered marine mammals','Historically pupped on open beaches; now retreat to caves to avoid human disturbance','Ancient Greeks wrote about them — appeared on coins from 500 BC; one of the longest-documented wild mammals','Can dive to 500 m depth — extraordinarily deep for a phocid seal','Highly sensitive to boat noise — tourist boats near caves cause females to abandon pups']},

{name:'Eurasian Otter',scientific:'Lutra lutra',emoji:'🦦',category:'mammals',status:'Near Threatened',wiki:'Eurasian_otter',lat:56.00,lon:-4.00,habitat:'Scottish Highlands, River Tay',
desc:'Almost eliminated from Britain by pesticide pollution in the 1970s, the Eurasian otter has recovered to inhabit every county in England for the first time in over 40 years — a barometer of clean river water.',
facts:['Their return to every English county is the clearest indicator of improving river water quality in Europe','Whiskers detect fish movement at up to 30 cm distance in turbid water — better than sonar in murky conditions','Males maintain up to 40 km of river territory — marking every 50 m with spraints (scented droppings)','Can hold breath for up to 4 minutes; can close nostrils and ears during dives','Hunted to near-extinction for fur until the 1970s; recovered entirely through legal protection and cleaner rivers']},

{name:'European Beaver',scientific:'Castor fiber',emoji:'🦫',category:'mammals',status:'Least Concern',wiki:'European_beaver',lat:52.50,lon:9.00,habitat:'Lower Saxony Rivers, Germany',
desc:'The largest rodent in Europe and the continent\'s foremost ecosystem engineer — the beaver\'s dams create wetlands that increase local biodiversity, raise water tables, and slow downstream flooding more effectively than human engineering.',
facts:['Largest rodent in Europe — up to 30 kg','Creates wetlands whose downstream flood-reducing effect is worth billions in engineering cost equivalents','Hunted to near-extinction by the 19th century; now fully recovered across Europe through reintroduction','Incisor teeth are orange — from iron-rich enamel that is harder on the front than behind, keeping a chisel-sharp edge','Scent glands produce castoreum — used by humans in perfume since Roman times']},

{name:'Alpine Ibex',scientific:'Capra ibex',emoji:'🐐',category:'mammals',status:'Least Concern',wiki:'Alpine_ibex',lat:45.83,lon:7.37,habitat:'Gran Paradiso National Park, Italy',
desc:'Down to just 60 individuals by the early 1800s — hunted for its horns, which were falsely believed to be medicinal — the Alpine ibex recovered through Italy\'s first national park and now exceeds 50,000 animals in the Alps.',
facts:['Reduced to 60 individuals by 1800s — saved entirely by the private hunting reserve of the House of Savoy','Ancestor of all 600 captive ibex populations in European zoos and parks','Hooves have hard outer rims for gripping rock edges and rubbery inner pads for friction — natural crampons','Males have backward-curving horns up to 1 m long — used in dramatic winter rut battles','Can ascend near-vertical rock faces at a run — observed climbing the near-vertical face of Ceresole Dam']},

{name:'Chamois',scientific:'Rupicapra rupicapra',emoji:'🐐',category:'mammals',status:'Least Concern',wiki:'Chamois',lat:46.50,lon:8.50,habitat:'Swiss Alps, Canton of Uri',
desc:'A supreme alpine mountaineer — the chamois can leap 2 m straight up from a standing start, run at 50 km/h on rocky terrain, and descend cliff faces at full speed using hollow rear hooves as brakes.',
facts:['Can leap 2 m vertically from a standing start','Hooves function as crampons on ascent and brakes on descent — rear hooves are hollow and grip via rim edges','Thick winter coat is so dense it can repel an ice pick — a different texture from the fine summer coat','Chamois leather (chamous) has been prized since ancient Rome — though modern versions are usually synthetic','Sentinel system: one female (leader) watches for eagles and wolves while others graze']},

{name:'Red Deer',scientific:'Cervus elaphus',emoji:'🦌',category:'mammals',status:'Least Concern',wiki:'Red_deer',lat:57.00,lon:-5.00,habitat:'Scottish Highlands',
desc:'Europe\'s largest native land animal — the red deer stag\'s rut in October fills Highland glens with the deep roaring that gave rise to Monarch of the Glen imagery — and their antlers grow at a rate of 2.5 cm per day.',
facts:['Europe\'s largest native land animal — stags stand 1.4 m at the shoulder and weigh 240 kg','Antlers grow at up to 2.5 cm per day — the fastest-growing tissue of any mammal','October rut roaring carries over 3 km on calm days — males lose up to 20% of their body weight in the rut','A stag\'s antler size signals breeding quality — females consistently prefer larger antlers','Lifespan of 18–20 years; antler size peaks at age 8–11 and then declines']},

{name:'Fin Whale',scientific:'Balaenoptera physalus',emoji:'🐋',category:'mammals',status:'Vulnerable',wiki:'Fin_whale',lat:38.00,lon:9.00,habitat:'Ligurian Sea, Pelagos Sanctuary',
desc:'The second-largest animal ever to have lived — reaching 27 m and 74 tonnes — the fin whale is asymmetrically coloured (left jaw dark, right jaw white) in a unique pigmentation used to herd fish during lunge-feeding.',
facts:['Second largest animal ever to live — up to 27 m; the first is the blue whale','Unique asymmetric jaw colouring (right side white) — used to startle and herd fish during right-side lunge-feeding','Produces the lowest frequency vocalisations of any animal — 20 Hz pulses; below human hearing','Fastest whale — bursts of 37 km/h over short distances (nicknamed "greyhound of the sea")','Commercial whaling reduced the population from 700,000 to under 38,000 by 1975; now recovering']},

{name:'European Hedgehog',scientific:'Erinaceus europaeus',emoji:'🦔',category:'mammals',status:'Vulnerable',wiki:'Western_European_hedgehog',lat:51.50,lon:-0.10,habitat:'London Parks, England',
desc:'Europe\'s most familiar wild mammal and a celebrated garden visitor — the hedgehog\'s 5,000 spines are hollow modified hairs of keratin that can be erected independently for defence against any predator except the badger.',
facts:['5,000 spines are hollow modified hairs — erected by two muscle sheets across the skin','The only true rolling defence — rolls into a ball with head tucked; spine tips face every direction','Hibernate for up to 6 months — heart rate drops from 190 to just 20 beats per minute','Immune to some snake venoms — can eat adders with no ill effect','Population has fallen 50% in the UK in 20 years — hedgehogs are now on the national Red List']},

{name:'European Wildcat',scientific:'Felis silvestris silvestris',emoji:'🐱',category:'mammals',status:'Least Concern',wiki:'European_wildcat',lat:38.00,lon:15.00,habitat:'Aspromonte, Calabria, Italy',
desc:'The ancestor of all domestic cats — yet so genetically distinct from domestic and feral cats that interbreeding threatens the survival of the pure wildcat genome; genetic testing is now used to identify true wildcats.',
facts:['Ancestor of all ~600 million domestic cats on Earth','Cannot be tamed — remains ferociously independent even when hand-raised from birth','Hybridisation with feral domestic cats is the primary extinction threat — genetic analysis required to identify pure wildcats','Larger than most domestic cats — up to 8 kg; proportionally longer legs and thicker tail with blunt black tip','Scottish Wildcat is the last wildcat population in Britain — fewer than 300 survive and most are hybrids']},

{name:'European Polecat',scientific:'Mustela putorius',emoji:'🦡',category:'mammals',status:'Least Concern',wiki:'European_polecat',lat:52.00,lon:-3.50,habitat:'Mid-Wales',
desc:'The direct ancestor of the domestic ferret — the polecat was once one of Europe\'s most persecuted predators, eliminated from England for centuries, and has only recently returned to much of its former range through legal protection.',
facts:['Domestic ferret is a domesticated European polecat — polecat hybridisation still occurs in Britain','Was hunted to extinction across England by gamekeepers; returning naturally from a Welsh refuge since the 1980s','Produces one of the most powerful musk secretions of any European mammal — origin of the name (French: putois)','One of very few animals known to hunt exclusively by scent in total darkness','Males are twice the weight of females — one of the most extreme sexual size differences of any mustelid']},

{name:'European Hare',scientific:'Lepus europaeus',emoji:'🐰',category:'mammals',status:'Least Concern',wiki:'European_hare',lat:51.00,lon:0.50,habitat:'Kent, England',
desc:'The animal behind "Mad March Hares" boxing — females box males to test their fitness before mating — the European hare can sprint at 72 km/h and depends entirely on speed and its 300° field of vision for survival.',
facts:['Can sprint at 72 km/h — faster than most predators over short distances','The "boxing" behaviour: females are testing and sometimes rejecting suitors — widely mistaken for males fighting','Unique among European mammals in not using burrows — leverets (young) are born fully furred and open-eyed above ground','Eyes are positioned for near-360° vision — can see behind without turning head','Population declined 80% in the UK since the 1960s due to agricultural intensification']},

{name:'European Mink',scientific:'Mustela lutreola',emoji:'🦡',category:'mammals',status:'Critically Endangered',wiki:'European_mink',lat:46.50,lon:25.50,habitat:'Danube Delta, Romania',
desc:'One of Europe\'s most critically endangered mammals — with fewer than 3,000 individuals surviving primarily in Romania and Spain — the European mink is being replaced almost everywhere by the invasive American mink.',
facts:['Fewer than 3,000 individuals survive — one of Europe\'s most endangered mammals','Being replaced systematically by the introduced American mink — a larger, more aggressive competitor','Differs from the American mink by having white lips on BOTH the upper and lower jaw (American has only lower)','Can dive to 3 m depth and swim 200 m underwater','Eradication of American mink on islands (Hebrides) has allowed European mink to recover locally']},

{name:'Common Seal',scientific:'Phoca vitulina',emoji:'🦭',category:'mammals',status:'Least Concern',wiki:'Harbour_seal',lat:58.50,lon:-3.00,habitat:'Moray Firth, Northern Scotland',
desc:'The most widely distributed pinniped in the Northern Hemisphere — the harbour seal can sleep anchored with just its nostrils above water (called "bottling") and navigates using mental maps of the sea floor.',
facts:['Can sleep with nostrils above water in a vertical posture — called "bottling" or "logging"','Navigate using mental maps of the seafloor — tested by scientists using maze tasks in pools','Can dive to 500 m depth for up to 30 minutes','Whiskers detect water turbulence from fish that passed by up to 35 seconds earlier','One of only two wild seal species regularly seen in the Thames in Central London']},

{name:'Atlantic Bottlenose Dolphin',scientific:'Tursiops truncatus',emoji:'🐬',category:'mammals',status:'Least Concern',wiki:'Common_bottlenose_dolphin',lat:43.50,lon:-8.50,habitat:'Galician Coast, NW Spain',
desc:'The most studied cetacean in the world — the bottlenose dolphin has a named individual identity, uses tools (sponges to protect rostrum while bottom-feeding), and is documented making cultural transmission of new skills.',
facts:['Individuals have unique signature whistles — equivalent to personal names, used their entire lives','Use marine sponges strapped to their rostrum while bottom-foraging — tool use transmitted culturally between females','Can recognise their own reflection in a mirror — one of very few animals to pass the mirror self-recognition test','Can detect objects as small as 2.5 cm at 100 m range through echolocation','The human cognition research done with bottlenose dolphins in the 1970s–90s changed our understanding of animal intelligence']},

{name:'Wolverine',scientific:'Gulo gulo',emoji:'🦡',category:'mammals',status:'Least Concern',wiki:'Wolverine_(animal)',lat:68.00,lon:18.00,habitat:'Scandinavian Mountains, Norway',
desc:'The wolverine of Europe\'s boreal north — identical to its North American cousin — a ferocious mustelid that follows wolves and bear tracks to steal their kills through sheer aggression, punching far above its 18 kg weight class.',
facts:['Called "the glutton" (fjellfross in Norwegian) — mythology of insatiable appetite is accurate; they do follow larger predators to steal food','Cover up to 45 km per day through deep Arctic snow in search of food','Their territories in Scandinavia can reach 1,500 km²','Reindeer herders regard them as the most destructive predator — attack reindeer many times their size','Scent mark territories with musk glands so powerful that carcasses buried under metres of snow can be found']},

// REPTILES
{name:'Loggerhead Sea Turtle',scientific:'Caretta caretta',emoji:'🐢',category:'reptiles',status:'Vulnerable',wiki:'Loggerhead_sea_turtle',lat:37.79,lon:20.90,habitat:'Zakynthos (Laganas Bay), Greece',
desc:'The Mediterranean\'s most important sea turtle — nesting on the beaches of Zakynthos for millions of years — returns to the exact beach where it was born to lay eggs, navigating by Earth\'s magnetic field across thousands of kilometres.',
facts:['Returns to its own birth beach to nest — using Earth\'s magnetic field as a GPS system that is accurate to a few km','Nests at Zakynthos for millions of years — among the oldest documented animal nesting traditions','Can crush conch and clam shells with its powerful beak — the strongest biting force of any sea turtle','Dives to 200 m depth — buoyancy controlled by lung air volume alone','Tourism in Zakynthos directly threatens nests — the nesting beach and the tourist beach are the same beach']},

{name:'Eurasian Green Lizard',scientific:'Lacerta viridis',emoji:'🦎',category:'reptiles',status:'Least Concern',wiki:'Green_lizard',lat:47.50,lon:18.00,habitat:'Danube Plain, Hungary',
desc:'One of Europe\'s most vivid reptiles — the male turns brilliant emerald green with an azure blue throat during breeding season — and is large enough to eat small mice and young birds in addition to insects.',
facts:['Males develop an azure blue throat during breeding season — used for territory display and mate attraction','Large enough to catch and eat mice, small birds, and eggs — unusual dietary range for a European lizard','Can run at 22 km/h — fast enough to catch flying insects','Detaches tail (autotomy) as a distraction for predators — tail regrows over several months','One of the largest lizards native to western Europe — up to 40 cm total length']},

{name:'Horned Viper',scientific:'Vipera ammodytes',emoji:'🐍',category:'reptiles',status:'Least Concern',wiki:'Vipera_ammodytes',lat:43.00,lon:17.50,habitat:'Dalmatian Coast, Croatia',
desc:'The most venomous snake in Europe — the horned viper\'s characteristic nasal horn may amplify chemoreceptor signals from the vomeronasal organ, assisting in prey detection, though its precise function is still debated.',
facts:['Most venomous snake in Europe — venom is 5× more potent than the common European adder','Named for the soft horn on the tip of the snout — function not fully understood; possibly aids chemoreception','Can strike with just one-third of body length coiled, unlike other vipers that require full coil','Bites rarely fatal in healthy adults thanks to relatively small venom yield and available antivenom','Hunted heavily for the illegal pet trade; legally protected across its Balkan range']},

{name:'European Pond Turtle',scientific:'Emys orbicularis',emoji:'🐢',category:'reptiles',status:'Near Threatened',wiki:'European_pond_turtle',lat:44.00,lon:18.00,habitat:'Una River, Bosnia',
desc:'Europe\'s only native freshwater turtle — once widespread from Portugal to Russia — has been driven from most of northern Europe by habitat loss and is now a reliable indicator of the last pristine freshwater wetlands.',
facts:['Only freshwater turtle native to Europe','Can live for over 100 years in the wild — individuals outliving the wetlands they were born in','Hibernates on the bottom of ponds for up to 7 months — buried in mud','Temperature-dependent sex determination — warmer nests produce mostly females','Presence of the species indicates that the wetland has been undisturbed for decades']},

{name:'Asp Viper',scientific:'Vipera aspis',emoji:'🐍',category:'reptiles',status:'Least Concern',wiki:'Asp_viper',lat:44.50,lon:6.50,habitat:'Maritime Alps, France/Italy',
facts:['Responsible for nearly all snakebite deaths in France and Switzerland — most in Alpine hiking accidents','Highly temperature-sensitive — active basking site choice maintains body temperature at precisely 30°C','Gives live birth — born with complete venom apparatus active','Females may go 2–3 years between reproductions, investing heavily in each brood','Shakespeare\'s Cleopatra used an asp in the play — though scholars argue the asp was likely an Egyptian cobra, not this species'],
desc:'The primary cause of snakebite deaths in France — the asp viper inhabits rocky Alpine slopes and is encountered by hikers more than any other European serpent; its neurotoxic venom requires prompt antivenom treatment.',
status:'Least Concern',category:'reptiles'},

{name:'European Glass Lizard',scientific:'Pseudopus apodus',emoji:'🦎',category:'reptiles',status:'Least Concern',wiki:'European_glass_lizard',lat:38.50,lon:21.50,habitat:'Western Greece',
desc:'A legless lizard easily mistaken for a snake — the European glass lizard has vestigial hind legs visible as tiny flaps near the tail, eyelids that blink (snakes cannot blink), and ear openings that snakes lack.',
facts:['A lizard without functional legs — vestigial hind limbs visible as small flaps near the tail','Has eyelids and ear openings — distinguishes it from any snake at close range','Largest legless lizard in Europe — up to 1.5 m long','Tail detachment (autotomy) — the name "glass lizard" refers to the tail shattering when grabbed','Feeds on slow-moving prey: snails, slugs, beetles, and small mammals — powerful jaws crush shells']},

// BIRDS
{name:'White-tailed Eagle',scientific:'Haliaeetus albicilla',emoji:'🦅',category:'birds',status:'Least Concern',wiki:'White-tailed_eagle',lat:54.00,lon:16.50,habitat:'Pomeranian Bay, Poland',
desc:'Europe\'s largest eagle — with a wingspan reaching 2.5 m — was extinct in Britain for over 200 years before being reintroduced to Scotland in 1975; it has now naturally recolonised England and is spreading southward.',
facts:['Largest eagle in Europe and the fourth-largest in the world — wingspan to 2.5 m','Extinct in Britain from the early 1900s; reintroduced to Scotland in 1975; now breeding in England','Eyesight is 8× sharper than a human\'s — can spot a fish from 3 km altitude','Pairs maintain the same nest (eyrie) for decades — some Scottish eyries are over 100 years old and weigh a tonne','Sacred bird in Norse mythology; depicted on the coats of arms of Germany and Poland']},

{name:'Peregrine Falcon',scientific:'Falco peregrinus',emoji:'🦅',category:'birds',status:'Least Concern',wiki:'Peregrine_falcon',lat:53.50,lon:-2.50,habitat:'Northern England, Lancashire',
desc:'The fastest animal on Earth — diving at over 389 km/h (242 mph) — the peregrine falcon was nearly wiped out by DDT in the 1960s and has since recovered to become one of conservation\'s defining success stories.',
facts:['Fastest animal on Earth — stoop (dive) speed measured at 389 km/h in a falconry study','DDT poisoning in the 1960s caused egg-shell thinning; UK population fell to 360 pairs by 1963','Now over 1,500 pairs in the UK — nesting on city cathedrals, bridge towers, and skyscrapers','Nictitating membrane (third eyelid) keeps eyes moist at 389 km/h','Kills prey by striking with a half-closed fist — the impact breaks the quarry\'s neck in mid-air']},

{name:'Great Bustard',scientific:'Otis tarda',emoji:'🐦',category:'birds',status:'Vulnerable',wiki:'Great_bustard',lat:39.50,lon:-5.50,habitat:'Extremadura, Spain',
desc:'The world\'s heaviest flying bird — males weigh up to 18 kg — performs one of the most spectacular courtship displays in the animal kingdom, turning its wing feathers inside-out to reveal a white foam-bath appearance.',
facts:['World\'s heaviest flying bird — males up to 18 kg','Courtship display: males reverse wing and tail feathers to appear covered in white foam — visible from 1 km','Once extinct in Britain; small reintroduced population established on Salisbury Plain, Wiltshire','Highly sensitive to human disturbance — requires undisturbed steppe grassland of at least 1,000 ha','A single Extremadura population holds nearly 10% of the global total; Extremadura is the species\' stronghold']},

{name:'White Stork',scientific:'Ciconia ciconia',emoji:'🦢',category:'birds',status:'Least Concern',wiki:'White_stork',lat:52.30,lon:16.50,habitat:'Wielkopolska, Poland',
desc:'A beloved symbol of good luck across Europe — the white stork migrates 10,000 km to sub-Saharan Africa each autumn and is one of the most precisely tracked long-distance migrants through citizen science and satellite telemetry.',
facts:['Migrates up to 10,000 km to sub-Saharan Africa each autumn — satellite-tracked in real time','Poland hosts 25% of the world\'s white stork population — the most important European country','Mates for life but relationships are maintained to the nest site, not the individual — pairs may separate on wintering grounds','Young storks learn migration routes socially — raised in isolation, they migrate in wrong directions','Historically associated with human good fortune — deliberate nest platform provision in European villages for centuries']},

{name:'Common Kingfisher',scientific:'Alcedo atthis',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Common_kingfisher',lat:51.50,lon:-2.00,habitat:'River Avon, Southern England',
desc:'The jewel of European rivers — the kingfisher\'s iridescent blue-orange plumage has no blue pigment; the blue is structural, and the same physical mechanism that makes soap bubbles shimmer makes this bird impossible to ignore.',
facts:['Blue colour contains zero blue pigment — structural colour from light interference in nanostructured feathers','Dives at 40 km/h and penetrates the water surface at exactly the right angle to cancel glare refraction','Eyes have an oil droplet lens that automatically corrects for underwater refraction while diving','Excavates nest tunnels in river banks up to 1 m deep — incubation chamber at the tunnel end','Population collapsed in the UK in severe winters — the most winter-sensitive European bird species']},

{name:'Eurasian Eagle Owl',scientific:'Bubo bubo',emoji:'🦉',category:'birds',status:'Least Concern',wiki:'Eurasian_eagle-owl',lat:46.00,lon:9.00,habitat:'Swiss Alps, Ticino',
desc:'The world\'s largest owl — with a wingspan reaching 1.88 m — the eagle owl is Europe\'s apex avian predator, regularly taking foxes, hares, and even young deer; only the golden eagle overlaps its position at the top of the food chain.',
facts:['World\'s largest owl — wingspan to 1.88 m','Takes prey as large as young deer, foxes, and hares — apex avian predator','"Ear" tufts are feathers, not ears — actual ears are asymmetrically placed to allow precise sound triangulation','Can live 60 years in the wild — longer than most eagle species','Call (deep double "ooh-hu") audible at over 5 km on a still Alpine night']},

{name:'Eurasian Bee-eater',scientific:'Merops apiaster',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'European_bee-eater',lat:39.00,lon:-6.00,habitat:'Extremadura, Spain',
desc:'One of Europe\'s most exotic-looking birds — brilliant turquoise, green, yellow, and chestnut — the bee-eater migrates from Africa to breed in warm southern Europe and specialises in catching bees and wasps in mid-air.',
facts:['Catches bees and wasps in mid-air — immediately rubs them against a branch to discharge venom and remove the sting','Colonial nester — excavates tunnels up to 1.5 m deep in sandy banks; colonies can contain 500 pairs','Calls with a distinctive burbling "prrrp" — the sound of a southern European summer','Migrates 6,000 km to tropical Africa; returns to same colony site each spring','Recently extending range northward into France, Germany, and Belgium — a visible sign of climate-driven expansion']},

{name:'Eurasian Roller',scientific:'Coracias garrulus',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'European_roller',lat:38.00,lon:-5.00,habitat:'Extremadura Dehesa, Spain',
desc:'Named for its spectacular tumbling courtship flight — the male "rolls" through the air in dizzying gyrations — the Eurasian roller\'s brilliant turquoise-and-chestnut plumage has made it a symbol of European biodiversity hotspots.',
facts:['Courtship "rolling" flight — male tumbles, gyrates, and dives while calling — origin of the name','Brilliant turquoise plumage visible from 500 m — one of Europe\'s most colourful birds','Nests in old woodpecker holes or ancient hollow oaks — critically dependent on veteran trees','Has declined 40% across Europe in 40 years; Extremadura holds the largest remaining population','Chicks protect themselves by vomiting a foul orange liquid on themselves when threatened in the nest']},

{name:'Common Crane',scientific:'Grus grus',emoji:'🦢',category:'birds',status:'Least Concern',wiki:'Common_crane',lat:54.00,lon:12.50,habitat:'Mecklenburg Lakes, Germany',
desc:'One of Europe\'s largest birds — a 1.2 m tall grey giant with red crown and black head — the common crane\'s migration fills European skies with V-formations of thousands in October, accompanied by a haunting bugling call.',
facts:['Mates for life — pairs reinforce their bond with a "unison call" display performed facing each other','Migration flocks of 70,000+ gather at Lac du Der-Chantecoq, France — one of Europe\'s greatest wildlife spectacles','Unbroken guttural call carries 3 km — a primordial sound woven into European mythology and seasonal lore','One of the first birds to have been domesticated — ancient Greeks kept cranes as pets','Extinct in Britain for 400 years; re-established naturally breeding in Norfolk\'s Broadland in 1981']},

{name:'Black Woodpecker',scientific:'Dryocopus martius',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Black_woodpecker',lat:50.00,lon:15.00,habitat:'Šumava National Park, Czech Republic',
desc:'Europe\'s largest woodpecker — crow-sized, jet-black with a crimson cap — hammers 12,000 times a day with a force of 1,200 g, protected from concussion by a brain floating in cerebrospinal fluid with almost no gap to the skull.',
facts:['Hammers at 20 blows per second, 12,000 times per day — brain protected by precisely 0 gap to skull (no concussion)','Tongue is 5 cm longer than its beak — wraps around skull; retrieves insects from 20 cm into dead wood','Nest cavities later used by dozens of other species — a keystone species for woodland biodiversity','Call — a wild descending laugh — carries over 2 km; one of the most distinctive sounds in European forests','Natural architect — creates openings in dead trees that become key habitat for bats, owls, and small mammals']},

{name:'European Nightjar',scientific:'Caprimulgus europaeus',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'European_nightjar',lat:51.00,lon:0.50,habitat:'Surrey Heathland, England',
desc:'A master of camouflage that roosts motionless on bare ground by day — the nightjar\'s plumage perfectly matches dead bracken — and emerges at dusk to catch moths in its enormous gape lined with bristles that act as a net.',
facts:['Roosts on bare ground, bark, or branches by day — completely invisible through camouflage','Has the largest gape relative to body size of any European bird — a built-in insect net lined with stiff bristles','Wing-clapping display by males produces a loud crack audible 200 m away','Migrates to sub-Saharan Africa — discovered by satellite tracking to winter in the Congo Basin','Purring churr call at dusk is one of Britain\'s most evocative summer sounds — duration up to 600 seconds without pause']},

{name:'Barn Swallow',scientific:'Hirundo rustica',emoji:'🐦',category:'birds',status:'Least Concern',wiki:'Barn_swallow',lat:52.00,lon:5.00,habitat:'Dutch Polders, Netherlands',
desc:'Possibly the world\'s most widespread and well-studied migratory bird — the barn swallow travels up to 10,000 km from Europe to South Africa and back each year, timing its arrival in Europe precisely with insect emergence.',
facts:['Migration of 10,000 km to South Africa and back — completed in under 3 months each direction','Arrival date at UK farms has advanced by 15 days since 1970 — the most visible sign of climate-driven phenology shift','Catches all food on the wing — never lands to drink; drinks by skimming water at speed','Tail streamers are an honest signal — longer streamers indicate parasite resistance and male quality','Responsible for one of the longest-running citizen science datasets in the world — BTO ringing data from 1909']},

{name:'Short-toed Snake Eagle',scientific:'Circaetus gallicus',emoji:'🦅',category:'birds',status:'Least Concern',wiki:'Short-toed_snake_eagle',lat:40.00,lon:15.00,habitat:'Cilento, Southern Italy',
desc:'An eagle that specialises entirely in snakes and lizards — the short-toed snake eagle can hover at 100 m height scanning with 8× vision before diving onto a viper or large green lizard below, immune to most snake venom.',
facts:['Dietary specialist: 95% snakes and lizards — including venomous species','Reportedly partially immune to viper venom — scales on legs and thick feathered neck protect against bites','Can hover motionless at 100 m altitude for minutes — scanning ground for reptile movement','Swallows prey whole head-first — a 1 m snake is swallowed without killing it (the acid-lined oesophagus suffocates it)','One of the most thermally dependent raptors — requires hot, open Mediterranean scrubland with basking reptiles']},

{name:'Eurasian Spoonbill',scientific:'Platalea leucorodia',emoji:'🦢',category:'birds',status:'Least Concern',wiki:'Eurasian_spoonbill',lat:52.80,lon:5.20,habitat:'Wadden Sea, Netherlands',
desc:'Extinct as a breeding bird in Britain from the 1600s until 2010 — the Eurasian spoonbill sweeps its spoon-shaped bill through shallow water feeding by touch — and its return to England is a direct result of Wadden Sea protection.',
facts:['Extinct breeding in Britain from 1660; first successful British breeding in 2010 — a conservation milestone','Sweeps bill side to side in water — closure triggered by touch, not sight; can feed in murky zero-visibility water','Yellow breeding spot at bill tip brightens to deep ochre during breeding season','Colonial nesters — UK colony established because Dutch birds were satellite-tracked to Somerset','Post-breeding flocks include birds from Netherlands, Spain, and Portugal — a truly international migratory species']},

// FISH
{name:'Atlantic Bluefin Tuna',scientific:'Thunnus thynnus',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Atlantic_bluefin_tuna',lat:38.00,lon:5.00,habitat:'Western Mediterranean, Ligurian Sea',
desc:'One of the ocean\'s most extraordinary animals — a warm-blooded fish that reaches 680 kg, swims at 72 km/h, and crosses the Atlantic multiple times in its life while maintaining a body temperature 20°C above the surrounding ocean.',
facts:['Warm-blooded (endothermic) — maintains body temperature 20°C above ambient ocean through counter-current heat exchange','Can reach 680 kg and 3 m in length — the largest tuna and one of the largest bony fish on Earth','Recorded swimming at 72 km/h — one of the fastest fish ever measured','Cross the Atlantic 2–3 times per year on known migration routes; spawn only in the Mediterranean and Gulf of Mexico','Commercial fishing reduced the Eastern Atlantic population by 85% by 1990; strict quotas have led to partial recovery']},

{name:'European Eel',scientific:'Anguilla anguilla',emoji:'🐟',category:'fish',status:'Critically Endangered',wiki:'European_eel',lat:51.50,lon:5.00,habitat:'Dutch Rhine-Meuse Delta',
desc:'One of the greatest mysteries in biology — no one has ever seen a European eel reproduce or found a European eel egg; they spawn somewhere in the Sargasso Sea 6,000 km from Europe, and every aspect of their reproduction remains unknown.',
facts:['No adult European eel has ever been observed spawning — reproduction remains one of biology\'s greatest unsolved mysteries','Travel 6,000 km to the Sargasso Sea to breed — and never return (semelparous); first detected by tracking only in 2022','Larvae (leptocephali) spend 3 years drifting across the Atlantic on the Gulf Stream','Can traverse land overland at night through damp grass — documented crossing meadows between rivers','Population has declined 95% since 1980; now Critically Endangered — one of Europe\'s most imperilled vertebrates']},

{name:'Atlantic Salmon',scientific:'Salmo salar',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Atlantic_salmon',lat:57.00,lon:-5.00,habitat:'River Tay, Scottish Highlands',
desc:'The "king of fish" — the Atlantic salmon leaps waterfalls of over 3 m using a series of pools carved in the rock — and some individuals survive spawning to return to the sea and make the 4,000 km migration again.',
facts:['Can leap waterfalls over 3 m high — using a run-up and flipping the body at the apex','Unlike Pacific salmon, some Atlantic salmon survive spawning (called kelts) and return for a second or third run','Navigate back to within metres of their birth river using Earth\'s magnetic field and smell of home-water chemistry','Stop eating entirely during the upstream migration — fuelling it entirely on stored body fat','Population in the River Tay has declined 90% since 1970 — primarily from climate-warmed oceans and sea lice from salmon farms']},

{name:'Wels Catfish',scientific:'Silurus glanis',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Wels_catfish',lat:48.00,lon:17.00,habitat:'Danube River, Slovakia',
desc:'Europe\'s largest freshwater fish — growing to 4 m and 300 kg — the wels catfish is the apex predator of European rivers; individuals in the Tarn River in France have been documented beaching themselves on gravel bars to catch pigeons.',
facts:['Largest freshwater fish in Europe — recorded up to 4 m and 300 kg','Beaching behaviour (varooning) documented in France — catfish intentionally strand to catch drinking pigeons and ducks','Can live over 80 years — individuals may outlive most of the humans alive when they were born','Detect prey through electroreceptors and lateral line system — can "hear" the heartbeat of nearby fish','Introduced across western Europe; now considered invasive in Britain, Spain, and parts of France']},

{name:'Basking Shark',scientific:'Cetorhinus maximus',emoji:'🦈',category:'fish',status:'Endangered',wiki:'Basking_shark',lat:56.50,lon:-5.50,habitat:'Sea of the Hebrides, Scotland',
desc:'The world\'s second-largest fish — up to 12 m and 6 tonnes — the basking shark is a gentle filter-feeder that swims open-mouthed filtering 2,000 tonnes of water per hour for tiny copepods, closing its gills with 1,500 gill rakers.',
facts:['Second-largest fish in the world — up to 12.3 m and 6 tonnes (only the whale shark is larger)','Filters 2,000 tonnes of water per hour through 1,500 gill rakers — no active suction; pure ram-filtration','Liver constitutes 25% of body weight — stores oil (squalene) for buoyancy and energy','Leaps completely out of the water (breaching) — possibly a parasite-removal strategy; reason unknown','Hunted to near-extinction for liver oil; now Critically Endangered in the northeast Atlantic']},

{name:'European Sturgeon',scientific:'Acipenser sturio',emoji:'🐟',category:'fish',status:'Critically Endangered',wiki:'European_sea_sturgeon',lat:44.50,lon:-1.00,habitat:'Gironde Estuary, France',
desc:'Among the most Critically Endangered fish in the world — fewer than 20 wild adults remain in the Gironde River, France — a once-abundant species that ascended every major European river and provided kings with caviar.',
facts:['Fewer than 20 wild adults remain in the entire world — the rarest large freshwater fish','Once ascended the Thames, Rhine, Elbe, and all major European rivers to spawn','Can live for 100 years; does not reach maturity until age 18–25 — making recovery extremely slow','Ancient lineage: unchanged for 200 million years — existed when Europe was under a shallow sea','A captive breeding and reintroduction programme in France and Germany is releasing 100,000 juveniles per year']},

{name:'Zander',scientific:'Sander lucioperca',emoji:'🐟',category:'fish',status:'Least Concern',wiki:'Zander',lat:52.00,lon:14.00,habitat:'German Lakes, Brandenburg',
desc:'Europe\'s most prized freshwater food fish — a sleek predatory perch relative that hunts at dusk and dawn using night-adapted eyes 7× more sensitive than a pike\'s, allowing it to hunt in total darkness in turbid lake water.',
facts:['Eyes are 7× more sensitive to low light than a pike\'s — hunts at twilight and in turbid, dark water conditions','Can detect light polarisation — possibly uses this to identify water surfaces and prey orientation','Introduced across western Europe as a sport fish; now invasive in some catchments where it devastates roach and bream','Reaches 15 kg in large eastern European lakes; grows 50% faster than pike in the same conditions','Most valuable freshwater food fish in Germany and Scandinavia — "Zander fillet" on restaurant menus throughout central Europe']},

{name:'Common Carp',scientific:'Cyprinus carpio',emoji:'🐟',category:'fish',status:'Vulnerable',wiki:'Common_carp',lat:47.50,lon:19.00,habitat:'Danube Floodplain, Hungary',
desc:'Native to Asia but introduced to Europe by Roman soldiers — the common carp has been in European rivers for 2,000 years, is one of the world\'s most productive farmed fish, and is now listed as one of the world\'s worst invasive species.',
facts:['Introduced to Europe by Roman legions as a food fish — now 2,000 years of European history','Can live for 50 years — among the longest-lived freshwater fish','Taste buds on lips and the barbels — can "taste" food by touching it before eating it','Native range is East Asia; in its native range, it is now ironically Vulnerable to extinction','Muddies water by uprooting aquatic vegetation while bottom-feeding — causes turbidity that harms native species']},

// INSECTS
{name:'Stag Beetle',scientific:'Lucanus cervus',emoji:'🪲',category:'insects',status:'Near Threatened',wiki:'Stag_beetle',lat:51.50,lon:-0.10,habitat:'Richmond Park, London',
desc:'Europe\'s largest beetle — the male\'s spectacular mandibles (used for combat, not feeding) can span half the body length — and every larva spends 3–7 years underground in a single rotting oak log before emerging as an adult that lives only 6 weeks.',
facts:['Largest beetle in Europe — males up to 7.5 cm; mandibles are enlarged jaws used only for male-male combat','Larvae spend 3–7 years in a single rotting oak log before emerging','Adults live for only 6 weeks and do not feed — they drink sap from oak wounds','Declined 65% in the UK in 20 years due to loss of dead wood habitat','Males flip rivals upside-down using the mandibles, not bite — a wrestling rather than biting strategy']},

{name:'European Honey Bee',scientific:'Apis mellifera',emoji:'🐝',category:'insects',status:'Data Deficient',wiki:'Western_honey_bee',lat:47.00,lon:8.00,habitat:'Swiss Alps Meadows',
desc:'The most economically important insect on Earth — pollinating a third of all human food — the honey bee communicates the exact direction and distance to food sources using an abstract dance language that took scientists decades to decode.',
facts:['Karl von Frisch won the Nobel Prize in 1973 for decoding the waggle dance — direction and distance encoded in movement','A single bee makes 1/12 of a teaspoon of honey in its entire lifetime; the hive makes 27 kg per year','Colony of 50,000 workers is functionally female — every worker bee, forager, and guard is female','Temperature inside the hive maintained at exactly 35°C year-round — bees shiver to warm and fan to cool','Colony Collapse Disorder has killed up to 40% of managed colonies annually in some European countries since 2006']},

{name:'Stag Beetle',scientific:'Lucanus cervus',emoji:'🪲',category:'insects',status:'Near Threatened',wiki:'Great_yellow_bumblebee',lat:58.50,lon:-4.50,habitat:'Northern Scottish Highlands',
desc:'Once widespread across Britain, the great yellow bumblebee has retreated to the far north of Scotland and the Outer Hebrides as its flower-rich machair habitat has been converted to intensive agriculture.',
facts:['One of Britain\'s most endangered bumblebees — now confined to the far north of Scotland','Long tongue allows it to reach nectar in deep flowers that short-tongued bees cannot access','Queens emerge later in spring than other bumblebees — requiring late-season flowers through August','Can fly at 7°C — more cold-tolerant than most other bumblebees; important Arctic pollinator','Machair grassland (wildflower coastal turf) is its primary habitat — one of Europe\'s rarest habitats'],
name:'Great Yellow Bumblebee',scientific:'Bombus distinguendus'},

{name:'Spanish Moon Moth',scientific:'Graellsia isabellae',emoji:'🦋',category:'insects',status:'Least Concern',wiki:'Graellsia_isabellae',lat:40.50,lon:-1.50,habitat:'Cuenca Mountains, Spain',
desc:'Often described as Europe\'s most beautiful moth — the Spanish moon moth\'s pale green wings with eyespots and trailing hindwing tails rival any tropical species — and is found only in Scots pine forests of Iberia and the Alps.',
facts:['Considered the most beautiful moth in Europe — comparable to tropical saturnid moths worldwide','Adults have vestigial mouthparts — cannot feed; adults live only 3–10 days','Wingspan of up to 10 cm — the largest moth native to western Europe','Caterpillars feed exclusively on Scots and Black pine — highly habitat-specific','Discovered in 1849 by Spanish entomologist Mariano de la Paz Graells — named in his honour']},

{name:'Alpine Longhorn Beetle',scientific:'Rosalia alpina',emoji:'🪲',category:'insects',status:'Vulnerable',wiki:'Rosalia_alpina',lat:46.00,lon:8.00,habitat:'Swiss Ticino Alps',
desc:'One of Europe\'s most beautiful insects — pale blue-grey with distinctive black velvet spots — the Alpine longhorn beetle requires old-growth beech forests with standing dead wood, making it a flagship for ancient woodland conservation.',
facts:['One of Europe\'s most striking beetles — blue-grey elytra with black velvet patches; antennae ringed black and white','Larvae develop for 3–4 years inside dying or dead beech wood','Protected under the EU Habitats Directive — collecting is illegal across the EU','Presence indicates old-growth beech forest with dead wood — a reliable indicator of ancient woodland','Actively thermophilic — sun-basks for hours on dead wood stems in mountain glades; altitude range 400–1,800 m']},

{name:'Violet Ground Beetle',scientific:'Carabus violaceus',emoji:'🪲',category:'insects',status:'Least Concern',wiki:'Carabus_violaceus',lat:52.00,lon:1.00,habitat:'Norfolk, East Anglia',
desc:'One of Britain\'s largest ground beetles — glossy black with a violet iridescent sheen on the wing margins — the violet ground beetle is an important nocturnal predator of slugs, earthworms, and other ground-dwelling invertebrates.',
facts:['Iridescent violet-purple edge to the elytra (wing covers) — structural colour, not pigment','Entirely flightless despite having wings — wing covers (elytra) are permanently fused','Nocturnal hunter of slugs, earthworms, and soft-bodied invertebrates — a biological pest control agent','Lives up to 3 years — very long-lived for a beetle','Indicator species for soil quality and undisturbed ground habitat — abundant only in healthy ecosystems']},

// AMPHIBIANS
{name:'Fire Salamander',scientific:'Salamandra salamandra',emoji:'🔥',category:'amphibians',status:'Least Concern',wiki:'Fire_salamander',lat:48.00,lon:11.50,habitat:'Bavarian Forest, Germany',
desc:'Europe\'s most spectacular salamander — vivid black and yellow warning colours signal skin toxins potent enough to kill small mammals and birds — the fire salamander birth its larvae directly into mountain streams without laying eggs.',
facts:['Black and yellow colouration is aposematic — warning of potent alkaloid skin toxins (samandarin)','Gives birth to live larvae directly into mountain streams — never lays terrestrial eggs like most salamanders','Larvae breathe through external gills and take 4 months to metamorphose in the stream','Toxin can cause convulsions and muscle paralysis in small mammals and dogs','The salamander-in-flames legend: placed logs with salamanders in fires; as heat drove them out, they were thought to be born from fire']},

{name:'Great Crested Newt',scientific:'Triturus cristatus',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Great_crested_newt',lat:52.50,lon:1.00,habitat:'Norfolk Broads, England',
desc:'The most legally protected amphibian in Britain — it is illegal to disturb or handle one without a licence — the male\'s spectacular jagged dorsal crest during breeding season earned it the name "the dragon of British ponds".',
facts:['Most legally protected amphibian in Britain and Europe — disturbing one without a licence is a criminal offence','Males develop a dramatic serrated dorsal crest up to 1 cm tall during breeding season','Skin toxic to most predators — produces glucosamine alkaloids causing paralysis of attacking frogs and fish','Mark their territories with scent trails underwater — males detect female scent and follow it to court her','Has declined 80% in the UK since 1960 — primarily from loss of farm ponds; 50% of UK ponds were filled in during the 20th century']},

{name:'Olm',scientific:'Proteus anguinus',emoji:'🐸',category:'amphibians',status:'Vulnerable',wiki:'Olm',lat:45.80,lon:14.00,habitat:'Postojna Cave System, Slovenia',
desc:'One of the most extraordinary vertebrates on Earth — a blind, cave-dwelling salamander that lives for 100 years, goes without food for 10 years, and never metamorphoses from its permanently larval form.',
facts:['Lives for up to 100 years — the longest-lived amphibian on Earth','Can survive 10 years without food — by slowing metabolism to near-zero','Permanently larval (neotenic) — retains external gills and lives its entire life in underground water','Completely blind — eyes atrophied and covered with skin; navigates using electroreception and smell','Found only in the karst aquifer of the Dinaric Alps — one of the narrowest natural ranges of any European vertebrate']},

{name:'European Tree Frog',scientific:'Hyla arborea',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'European_tree_frog',lat:47.50,lon:8.50,habitat:'Swiss Mittelland',
desc:'Europe\'s most vivid frog — emerald green and thumb-sized — with adhesive toe pads containing millions of hexagonal cells that generate capillary action to grip smooth vertical surfaces with 14× its own body weight.',
facts:['Adhesive toe pads use hexagonal cells creating capillary suction — can hold 14× body weight on glass','Males\' calls can be heard 1 km on a still spring evening — very powerful for an animal weighing 6 g','Changes from green to grey-brown in seconds — colour change is neurological, not hormonal; 30 seconds per change','Most European populations in steep decline — one of the continent\'s most at-risk amphibians','Can survive freezing by producing glycerol as antifreeze in their blood — a natural cryoprotectant']},

{name:'Yellow-bellied Toad',scientific:'Bombina variegata',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Yellow-bellied_toad',lat:48.00,lon:12.50,habitat:'Bavarian Foreland, Germany',
desc:'Named for its vivid orange-and-black belly — displayed by arching the back to reveal it to predators (Unken reflex) — the yellow-bellied toad is a paradox: highly toxic yet dependent on the tiny temporary puddles created by farm vehicles.',
facts:['The Unken reflex: arches back and lifts limbs to show vivid yellow-orange belly when threatened — warning colouration','Skin toxins can cause sneezing, tearing, and skin rash in humans who handle it without washing hands','Uniquely dependent on temporary puddles and wheel ruts for breeding — one of the few animals that benefits from muddy tracks','Can breed in water as little as 2 cm deep and complete metamorphosis in 4 weeks','Heart-shaped pupils rather than round — immediately distinguishes it from all other European toads']},

{name:'Common Midwife Toad',scientific:'Alytes obstetricans',emoji:'🐸',category:'amphibians',status:'Least Concern',wiki:'Common_midwife_toad',lat:43.00,lon:-3.50,habitat:'Pyrenean Foothills, Northern Spain',
desc:'The male midwife toad carries strings of eggs wrapped around his hind legs for up to 8 weeks — moistening them regularly in dew and streams — until he deposits them in water just as they are ready to hatch.',
facts:['Only amphibian where the male carries the eggs — wrapped around his hind legs for 3–8 weeks','Male moisten the eggs nightly and carries them to water just before hatching — one of the most devoted amphibian fathers','Produces a soft melodious "ping" call from underground burrows — the clearest sign of its presence','Tadpoles are unusually large — can be 90 mm long (larger than the adult parent)','At the centre of the famous Paul Kammerer scandal of 1926 — a supposed discovery of Lamarckian inheritance that was exposed as a fraud']
}
];

const SC={'Least Concern':'LC','Near Threatened':'NT','Vulnerable':'VU','Endangered':'EN','Critically Endangered':'CR','Data Deficient':'DD'};
let activeCat='all',searchQ='',currentList=[],currentModal=null;
const disc=new Set(JSON.parse(localStorage.getItem('ae_eu_disc')||'[]'));
const wiki={};let map=null,markers=[];
async function getWikiImg(t){if(wiki[t]!==undefined)return wiki[t];try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`);const d=await r.json();const u=d.originalimage?.source||d.thumbnail?.source||null;wiki[t]=u;return u;}catch{wiki[t]=null;return null;}}
function initMap(){map=L.map('world-map',{center:[52,15],zoom:4,minZoom:2,maxZoom:18});L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:18}).addTo(map);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{attribution:'',maxZoom:18,opacity:0.55}).addTo(map);updateMarkers();map.on('zoomend moveend',updateMarkers);}
function updateMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];if(map.getZoom()<4)return;filtered().forEach(a=>{const el=L.divIcon({html:`<div class="animal-map-marker${disc.has(ANIMALS.indexOf(a))?' discovered':''}" title="${a.name}">${catIcon(a.category)}</div>`,className:'',iconSize:[34,34],iconAnchor:[17,17]});const m=L.marker([a.lat,a.lon],{icon:el}).addTo(map);m.on('click',()=>openModal(ANIMALS.indexOf(a)));markers.push(m);});}
function filtered(){const q=searchQ.toLowerCase().trim();return ANIMALS.filter(a=>{const cm=activeCat==='all'||a.category===activeCat;const sm=!q||a.name.toLowerCase().includes(q)||a.scientific.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q)||a.facts.some(f=>f.toLowerCase().includes(q));return cm&&sm;});}
function renderCards(){const grid=document.getElementById('cards-grid');const empty=document.getElementById('empty-state');const list=filtered();currentList=list;document.getElementById('results-count').textContent=list.length+' animal'+(list.length===1?'':'s');document.getElementById('results-title').textContent=activeCat==='all'?'All European Animals':'European '+cap(activeCat);document.getElementById('reset-btn').style.display=activeCat==='all'?'none':'inline-block';if(!list.length){grid.innerHTML='';empty.style.display='block';return;}empty.style.display='none';grid.innerHTML=list.map((a,i)=>{const idx=ANIMALS.indexOf(a);return `<div class="card" onclick="openModal(${idx})" style="animation-delay:${i*22}ms"><div class="card-photo bg-${a.category}"><span class="card-fallback">${catIcon(a.category)}</span><img data-wiki="${a.wiki}" alt="${a.name}" loading="lazy"/></div><div class="card-overlay"><p>${a.facts[0].substring(0,88)}…</p><small>TAP TO EXPLORE <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></small></div><div class="card-info">${disc.has(idx)?'<span class="card-check"><svg class="svg-ic"><use href="#ic-check"/></svg></span>':''}<div class="card-name">${a.name}</div><div class="card-row"><span class="badge b-${a.category}">${a.category}</span></div></div></div>`;}).join('');grid.querySelectorAll('img[data-wiki]').forEach(img=>{getWikiImg(img.dataset.wiki).then(u=>{if(u){img.src=u;img.onload=()=>{img.classList.add('loaded');img.previousElementSibling.style.opacity=0};}});});}
function openModal(idx){const a=ANIMALS[idx];const sc=SC[a.status]||'LC';const inL=currentList.indexOf(a);const pr=inL>0?ANIMALS.indexOf(currentList[inL-1]):null;const nx=inL<currentList.length-1?ANIMALS.indexOf(currentList[inL+1]):null;const sat=`https://maps.google.com/maps?q=${a.lat},${a.lon}&t=k`;const sv=`https://maps.google.com/maps?q=${a.lat},${a.lon}&layer=c&cbll=${a.lat},${a.lon}`;document.getElementById('modal-content').innerHTML=`<div class="modal-hero bg-${a.category}"><div class="fallback-hero">${catIcon(a.category)}</div><img data-wiki="${a.wiki}" alt="${a.name}"/><div class="modal-hero-grad"></div><div class="modal-hero-title"><h2>${a.name}</h2><em>${a.scientific}</em></div></div><div class="modal-body"><div class="modal-badges"><span class="badge b-${a.category}">${a.category}</span><span class="s-badge s-${sc}">${a.status}</span></div><p class="modal-desc">${a.desc}</p><div class="facts-head">Wild Facts</div><ul class="facts-list" id="facts-list">${a.facts.map(f=>`<li>${f}</li>`).join('')}</ul><div class="habitat-section"><div class="habitat-title">Habitat</div><div class="habitat-name"><svg class="svg-ic"><use href="#ic-pin"/></svg> ${a.habitat}</div><div class="habitat-btns"><a href="${sat}" target="_blank" class="habitat-btn hbtn-sat"><svg class="svg-ic"><use href="#ic-satellite"/></svg> Google Maps Satellite</a><a href="${sv}" target="_blank" class="habitat-btn hbtn-sv"><svg class="svg-ic"><use href="#ic-camera"/></svg> Google Street View</a></div></div><div class="modal-nav"><button onclick="event.stopPropagation();openModal(${pr})" ${pr===null?'disabled style="opacity:.3"':''}><svg class="svg-ic"><use href="#ic-arrow-left"/></svg> Prev</button><button onclick="event.stopPropagation();openModal(${nx})" ${nx===null?'disabled style="opacity:.3"':''}>Next <svg class="svg-ic"><use href="#ic-arrow-right"/></svg></button></div></div>`;document.getElementById('modal-overlay').classList.add('open');document.body.style.overflow='hidden';currentModal=idx;disc.add(idx);localStorage.setItem('ae_eu_disc',JSON.stringify([...disc]));updateDiscUI();const img=document.querySelector('#modal-content .modal-hero img');getWikiImg(a.wiki).then(u=>{if(u&&img){img.src=u;img.onload=()=>img.classList.add('loaded');}});setTimeout(()=>{document.querySelectorAll('#facts-list li').forEach((li,i)=>{setTimeout(()=>li.classList.add('visible'),i*70);});},180);}
function updateDiscUI(){const n=disc.size,t=ANIMALS.length;document.getElementById('disc-count').textContent=`${n}/${t}`;document.getElementById('disc-text').textContent=n;document.getElementById('disc-total').textContent=t;document.getElementById('disc-bar').style.width=`${(n/t)*100}%`;}
function toggleDisc(){const p=document.getElementById('disc-panel');p.style.display=p.style.display==='block'?'none':'block';}
function surpriseMe(){const l=filtered();if(!l.length)return;openModal(ANIMALS.indexOf(l[Math.floor(Math.random()*l.length)]));}
function resetCat(){activeCat='all';document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));renderCards();updateMarkers();}
function cap(s){return s[0].toUpperCase()+s.slice(1)}
function initTicker(){const facts=ANIMALS.flatMap(a=>a.facts.map(f=>a.name+' — '+f)).sort(()=>Math.random()-.5);const track=document.getElementById('ticker-track');const el=document.getElementById('ticker');let idx=0,anim=null,paused=false;function playNext(){el.style.transition='opacity 0.4s';el.style.opacity='0';setTimeout(()=>{el.textContent=facts[idx++%facts.length];el.style.transition='none';const cw=track.clientWidth;el.style.transform=`translateX(${cw}px)`;void el.offsetWidth;el.style.transition='opacity 0.4s';el.style.opacity='1';const tw=el.scrollWidth;const dur=(cw+tw)/50*1000;if(anim)anim.cancel();anim=el.animate([{transform:`translateX(${cw}px)`},{transform:`translateX(-${tw}px)`}],{duration:dur,easing:'linear',fill:'forwards'});if(paused)anim.pause();anim.onfinish=()=>setTimeout(playNext,400);},400);}track.addEventListener('mouseenter',()=>{paused=true;if(anim)anim.pause();});track.addEventListener('mouseleave',()=>{paused=false;if(anim)anim.play();});playNext();}
document.addEventListener('DOMContentLoaded',()=>{initMap();renderCards();updateDiscUI();initTicker();});
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',function(){document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));this.classList.add('active');activeCat=this.dataset.cat;renderCards();updateMarkers();}));
document.getElementById('search-input').addEventListener('input',function(){searchQ=this.value;renderCards();updateMarkers();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
document.getElementById('modal-close').addEventListener('click',closeModal);
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';currentModal=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='ArrowRight'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i<currentList.length-1)openModal(ANIMALS.indexOf(currentList[i+1]));}if(e.key==='ArrowLeft'&&currentModal!==null){const i=currentList.indexOf(ANIMALS[currentModal]);if(i>0)openModal(ANIMALS.indexOf(currentList[i-1]));}});
</script>
<script src="paw-cursor.js" defer></script>
